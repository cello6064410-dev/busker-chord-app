<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Select Song</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: Arial, sans-serif; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
    .container { max-width: 600px; width: 100%; }
    .header { padding: 16px 0 12px 0; border-bottom: 2px solid #2a2a4e; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.3rem; color: #ffcc00; }
    .btn { background: #2a2a4e; border: none; color: white; padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; min-height: 36px; }
    .btn:hover { background: #3a3a6e; }
    .search-box { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-box input { flex: 1; padding: 10px 12px; background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 6px; color: #fff; font-size: 1rem; outline: none; }
    .search-box input:focus { border-color: #ffcc00; }
    .song-item { display: block; width: 100%; padding: 12px 16px; margin-bottom: 4px; background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 6px; color: #fff; font-size: 1rem; cursor: pointer; text-align: left; font-family: Arial, sans-serif; transition: background 0.2s; }
    .song-item:hover { background: #2a2a4e; }
    .song-item:active { transform: scale(0.98); }
    .loading, .empty { text-align: center; padding: 40px 0; color: #666; font-size: 1rem; }
    .back-btn { background: #2a2a4e; border: none; color: white; padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; min-height: 36px; }
    .back-btn:hover { background: #3a3a6e; }
</style>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>📋 Select Song</h1>
        <button onclick="goBack()" class="back-btn">⬅ Back</button>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Search..." oninput="filterSongs()" />
    </div>

    <!-- LIST -->
    <div id="songList">
        <div class="loading">⏳ Loading...</div>
    </div>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
        authDomain: "busker-chord-app.firebaseapp.com",
        projectId: "busker-chord-app"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let allSongs = [];
    const songListEl = document.getElementById('songList');
    const searchInput = document.getElementById('searchInput');

    auth.onAuthStateChanged(function(user) {
        if (!user) { window.location.href = "login.html"; return; }
        loadSongs();
    });

    function loadSongs() {
        songListEl.innerHTML = '<div class="loading">⏳ Loading...</div>';

        db.collection('songs').orderBy('title').get()
            .then(snapshot => {
                allSongs = [];
                if (snapshot.empty) {
                    songListEl.innerHTML = '<div class="empty">📭 No songs found</div>';
                    return;
                }
                snapshot.forEach(doc => {
                    allSongs.push({ id: doc.id, title: doc.data().title || 'Untitled' });
                });
                renderSongs(allSongs);
            })
            .catch(err => {
                songListEl.innerHTML = '<div class="empty">❌ Error loading</div>';
                console.error(err);
            });
    }

    function renderSongs(songs) {
        if (songs.length === 0) {
            songListEl.innerHTML = '<div class="empty">🔍 No matches</div>';
            return;
        }
        let html = '';
        songs.forEach(song => {
            html += `<button class="song-item" onclick="selectSong('${song.id}')">${escapeHtml(song.title)}</button>`;
        });
        songListEl.innerHTML = html;
    }

    function filterSongs() {
        const q = searchInput.value.toLowerCase().trim();
        if (!q) { renderSongs(allSongs); return; }
        const filtered = allSongs.filter(s => s.title.toLowerCase().includes(q));
        renderSongs(filtered);
    }

    function selectSong(songId) {
        sessionStorage.setItem('returnToCreate', window.location.href);
        window.location.href = "create.html?selected=" + songId;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function goBack() {
        window.location.href = "create.html";
    }
</script>

</body>
</html>
