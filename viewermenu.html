<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Viewer Menu</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<div class="index-wrapper">
  <div class="index-card">
    
    <!-- Header -->
    <div class="index-header">
      <div class="index-icon">🎵</div>
      <h1 style="font-size:2rem; background: linear-gradient(135deg, #4fc3f7 0%, #0288d1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Segoe UI', Arial, sans-serif;">Tukang Baca</h1>
      <p class="index-subtitle">Pilih jenis bacaan</p>
    </div>

    <div class="index-divider"></div>

    <!-- Buttons -->
    <div class="index-buttons">
      
      <button onclick="goTo('viewer.html')" class="index-btn viewer-btn">
        <div class="index-btn-icon">📝</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Lirik &amp; Kords</span>
          <span class="index-btn-desc">Baca lirik dengan kords di atas</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>
      
      <button onclick="goTo('leadsheetviewer.html')" class="index-btn dashboard-btn">
        <div class="index-btn-icon">📊</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Leadsheet</span>
          <span class="index-btn-desc">Baca chord chart dengan bar lines</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>

    </div>

    <div class="index-footer">
      <button onclick="logoutUser()" class="back-btn" style="background: #4a2a2a; color: white; padding: 12px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-family: Arial, sans-serif;">🚪 Logout</button>
      <button onclick="goHome()" class="back-btn" style="background: #2a2a4e; color: white; padding: 12px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-family: Arial, sans-serif; margin-left:10px;">⬅ Back</button>
    </div>

  </div>
</div>

<script>
  // ============================================
  // FIREBASE CONFIGURATION
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>

<script>
  // ============================================
  // CHECK LOGIN STATUS
  // ============================================
  auth.onAuthStateChanged(function(user) {
    if (!user) {
      window.location.href = "login.html";
      return;
    }
  });

  function goTo(page) {
    window.location.href = page;
  }

  function goHome() {
    window.location.href = "index.html";
  }

  function logoutUser() {
    auth.signOut().then(() => {
      window.location.href = "login.html";
    }).catch(() => {
      window.location.href = "login.html";
    });
  }
</script>

</body>
</html>
