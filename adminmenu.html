<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Menu</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
</head>
<body>

<div class="index-wrapper">
  <div class="index-card">
    
    <!-- Header -->
    <div class="index-header">
      <div class="index-icon">🎼</div>
      <h1 style="font-size:2rem; background: linear-gradient(135deg, #ffcc00 0%, #ff8800 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Segoe UI', Arial, sans-serif;">Tukang Tulis</h1>
      <p class="index-subtitle">Pilih jenis tulisan</p>
    </div>

    <div class="index-divider"></div>

    <!-- Buttons -->
    <div class="index-buttons">
      
      <button onclick="goTo('create.html')" class="index-btn admin-btn">
        <div class="index-btn-icon">📝</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Lirik &amp; Kords</span>
          <span class="index-btn-desc">Tulis lirik dengan kords di atas</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>
      
      <button onclick="goTo('leadsheetcreate.html')" class="index-btn viewer-btn">
        <div class="index-btn-icon">📊</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Leadsheet</span>
          <span class="index-btn-desc">Tulis chord chart dengan bar lines</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>

    </div>

    <div class="index-footer">
      <button onclick="goHome()" class="back-btn" style="background: #2a2a4e; color: white; padding: 12px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-family: Arial, sans-serif;">⬅ Back to Home</button>
    </div>

  </div>
</div>

<script>
function goTo(page) {
  window.location.href = page;
}

function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
