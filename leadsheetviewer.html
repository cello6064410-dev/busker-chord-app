<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Leadsheet Viewer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0f0f0f;
      color: white;
      font-family: 'Courier New', monospace;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      padding: 10px;
      padding-bottom: 80px;
      background: #0f0f0f;
    }

    .header, .search-container, .song-list, .link-row, .floating-bar {
      flex-shrink: 0;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      background: #1b1b1b;
      padding: 15px 15px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    /* Flow line — atas (section, 1va) */
    .flow-line {
      color: #ff922b;
      font-size: 0.85em;
      min-height: 1.4em;
      padding: 2px 0;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      letter-spacing: 0;
      border-bottom: 1px solid #2a2a4e;
      margin-bottom: 2px;
    }

    /* Stay line — bawah (chords, beats, barline) */
    .stay-line {
      color: #ffffff;
      font-size: 1em;
      min-height: 1.4em;
      padding: 2px 0;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      letter-spacing: 0;
    }

    /* Warna */
    .chord { color: #ffcc00; }
    .beat { color: #ff6b6b; }
    .barline { color: #4fc3f7; }
    .repeat { color: #cc88ff; }
    .section { color: #51cf66; }
    .flow { color: #ff922b; }

    .output.scrolling {
      border-color: #4fc3f7;
    }

    /* ============================================
       HEADER
       ============================================ */
    .header {
      text-align: center;
      padding: 5px 0;
      margin-bottom: 8px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 5px;
    }

    .header h2 {
      font-size: 1.1rem;
      margin: 0;
      color: #ffcc00;
      font-family: Arial, sans-serif;
    }

    #sheetTitle {
      color: #ffcc00;
      font-size: 1rem;
      margin: 4px 0;
      font-weight: normal;
      font-family: Arial, sans-serif;
    }

    #timeDisplay {
      color: #00ffcc;
      font-size: 0.9rem;
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      padding: 2px 12px;
      border-radius: 12px;
      border: 1px solid #2a2a4e;
    }

    .home-btn {
      background: #2a2a4e;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 1.2rem;
      cursor: pointer;
      min-height: 40px;
      min-width: 40px;
    }

    .logout-btn {
      background: #4a2a2a !important;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      min-height: 40px;
      min-width: 40px;
    }

    .search-container {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 0 8px 0;
      position: relative;
    }

    #searchInput {
      flex: 1;
      padding: 10px 14px;
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-family: Arial, sans-serif;
      outline: none;
      min-height: 44px;
    }

    #searchInput:focus {
      border-color: #4fc3f7;
    }

    #searchInput::placeholder {
      color: #666;
    }

    #clearSearchBtn {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      color: #888;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 8px 10px;
      min-height: 44px;
      min-width: 44px;
      display: none;
    }

    .song-list {
      max-height: 160px;
      overflow-y: auto;
      background: #151515;
      border-radius: 10px;
      padding: 5px;
      margin-bottom: 8px;
      display: none;
    }

    .song-list button {
      width: 100%;
      margin: 3px 0;
      padding: 10px 12px;
      text-align: left;
      background: #1a1a2e;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
      min-height: 40px;
      font-family: Arial, sans-serif;
    }

    .song-list button:active {
      background: #2a2a4e;
    }

    .loading-text, .empty-text, .error-text {
      text-align: center;
      padding: 20px;
      color: #888;
      font-family: Arial, sans-serif;
    }

    .error-text { color: #ff4444; }

    .floating-bar {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      background: rgba(15, 15, 15, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px 12px;
      border-radius: 14px;
      z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
      border: 1px solid #2a2a2a;
      flex-wrap: nowrap;
    }

    .floating-bar button {
      font-size: 1rem;
      padding: 8px 12px;
      min-width: 44px;
      min-height: 44px;
      background: #1a1a2e;
      border: none;
      border-radius: 8px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: Arial, sans-serif;
      transition: background 0.2s, transform 0.1s;
    }

    .floating-bar button:active {
      background: #2a2a4e;
      transform: scale(0.92);
    }

    .link-row {
      text-align: center;
      padding: 8px 0;
    }

    .link-row a {
      color: #4fc3f7;
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      text-decoration: none;
      padding: 8px 16px;
      background: #1a1a2e;
      border-radius: 8px;
      border: 1px solid #2a2a4e;
      display: inline-block;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @media (max-width: 768px) {
      .app { padding: 8px; padding-bottom: 80px; }
      .song-list { max-height: 120px; }
      #output { font-size: 14px; padding: 10px; }
      .floating-bar {
        bottom: 0;
        left: 0;
        transform: none;
        width: 100%;
        border-radius: 0;
        justify-content: space-around;
        padding: 8px 5px;
        gap: 4px;
        border: none;
        border-top: 1px solid #2a2a2a;
        background: rgba(15,15,15,0.95);
      }
      .floating-bar button {
        flex: 1;
        font-size: 1.1rem;
        padding: 12px 0;
        min-height: 48px;
        min-width: 0;
        margin: 0 2px;
      }
      #searchInput {
        padding: 8px 12px;
        font-size: 0.9rem;
        min-height: 38px;
      }
      #clearSearchBtn {
        right: 6px;
        min-height: 38px;
        min-width: 38px;
        font-size: 1rem;
      }
    }

    @media (max-width: 400px) {
      .app { padding: 5px; padding-bottom: 75px; }
      .header h2 { font-size: 0.9rem; }
      #sheetTitle { font-size: 0.85rem; }
      #output { font-size: 12px; padding: 8px; }
      .floating-bar button {
        font-size: 0.9rem;
        padding: 10px 0;
        min-height: 42px;
      }
    }

    @media (min-width: 769px) {
      .app { max-width: 100%; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
      #output { font-size: 16px; padding: 15px 20px; }
      .song-list { max-height: 200px; }
      .floating-bar { gap: 10px; padding: 10px 20px; }
      .floating-bar button { padding: 10px 18px; min-width: 50px; }
      .floating-bar button:hover { background: #2a2a4e; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <h2>📊 Leadsheet</h2>
      <div style="display: flex; gap: 8px; align-items: center;">
        <span id="userName" style="color: #aaa; font-size: 0.8rem; font-family: Arial, sans-serif; display: none;"></span>
        <button onclick="logoutUser()" class="logout-btn" title="Logout">🚪</button>
        <button onclick="goHome()" class="home-btn" title="Go to Home">🏠</button>
      </div>
    </div>
    <div style="display: flex; justify-content: center; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 4px;">
      <h3 id="sheetTitle" style="margin:0; font-family:Arial; color:#ffcc00;">No Leadsheet Selected</h3>
      <span id="timeDisplay">4/4</span>
      <button onclick="toggleFullscreen()" title="Fullscreen" style="background: #2a2a4e; border: none; color: white; padding: 4px 14px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; min-height: 32px;">⛶</button>
    </div>
  </div>

  <!-- SEARCH BAR -->
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="🔍 Search leadsheets..." oninput="filterSheets()">
    <button onclick="clearSearch()" id="clearSearchBtn" style="display:none;">✕</button>
  </div>

  <!-- SONG LIST -->
  <div id="sheetList" class="song-list"></div>

  <!-- OUTPUT -->
  <div id="output" class="output">Loading...</div>

  <!-- LINK TO LYRIC VIEW -->
  <div class="link-row">
    <a href="viewer.html">📝 Switch to Lyric View</a>
  </div>

  <!-- FLOATING CONTROL BAR -->
  <div class="floating-bar">
    <button onclick="changeFontSize(2)" title="Increase Font">A+</button>
    <button onclick="changeFontSize(-2)" title="Decrease Font">A-</button>
    <button onclick="toggleScroll()" title="Start/Stop Auto-Scroll" id="playBtn">▶</button>
    <button onclick="stopScroll()" title="Stop Auto-Scroll" id="stopBtn">⏹</button>
  </div>

</div>

<script>
  // ============================================
  // FIREBASE CONFIGURATION
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>

<script>
  // ============================================
  // GLOBAL VARIABLES
  // ============================================
  let sheets = [];
  let currentSheetId = null;
  let fontSize = 16;
  let scrollInterval = null;
  let isScrolling = false;
  let scrollSpeed = 0.4;
  let logoutTimer = null;
  const IDLE_TIMEOUT = 30 * 60 * 1000;
  const MAX_SEARCH_RESULTS = 10;
  const DISPLAY_RESULTS = 5;

  // ============================================
  // DOM REFERENCES
  // ============================================
  const sheetListEl = document.getElementById('sheetList');
  const outputEl = document.getElementById('output');
  const sheetTitleEl = document.getElementById('sheetTitle');
  const timeDisplayEl = document.getElementById('timeDisplay');
  const playBtn = document.getElementById('playBtn');
  const searchInput = document.getElementById('searchInput');
  const clearSearchBtn = document.getElementById('clearSearchBtn');
  const userNameEl = document.getElementById('userName');

  // ============================================
  // AUTH
  // ============================================
  auth.onAuthStateChanged(function(user) {
    if (!user) { window.location.href = "login.html"; return; }
    if (user.displayName) {
      userNameEl.textContent = '👤 ' + user.displayName;
      userNameEl.style.display = 'inline';
    }
    loadSheets();
  });

  // ============================================
  // AUTO-LOGOUT
  // ============================================
  function resetLogoutTimer() {
    if (logoutTimer) clearTimeout(logoutTimer);
    logoutTimer = setTimeout(function() { logoutUser(); }, IDLE_TIMEOUT);
  }

  function setupIdleTimer() {
    ['mousemove', 'mousedown', 'click', 'scroll', 'touchstart', 'keydown'].forEach(event => {
      document.addEventListener(event, resetLogoutTimer);
    });
    resetLogoutTimer();
  }

  function logoutUser() {
    if (logoutTimer) clearTimeout(logoutTimer);
    stopScroll();
    auth.signOut().then(() => { window.location.href = "login.html"; }).catch(() => { window.location.href = "login.html"; });
  }

  // ============================================
  // LOAD LEADSHEETS
  // ============================================
  function loadSheets() {
    db.collection('leadsheets').orderBy('title').get()
      .then((snapshot) => {
        sheets = [];
        if (!snapshot.empty) {
          snapshot.forEach((doc) => {
            sheets.push({ id: doc.id, ...doc.data() });
          });
        }
      })
      .catch(err => console.error('Error loading leadsheets:', err));
  }

  // ============================================
  // SEARCH / FILTER
  // ============================================
  function filterSheets() {
    const query = searchInput.value.toLowerCase().trim();
    clearSearchBtn.style.display = query.length > 0 ? 'block' : 'none';

    if (query === '') {
      sheetListEl.style.display = 'none';
      sheetListEl.innerHTML = '';
      return;
    }

    const results = sheets.filter(s => s.title && s.title.toLowerCase().includes(query));
    sheetListEl.style.display = 'block';

    if (results.length === 0) {
      sheetListEl.innerHTML = '<div class="empty-text">🔍 No leadsheets found</div>';
      return;
    }

    sheetListEl.innerHTML = '';
    const displayResults = results.slice(0, MAX_SEARCH_RESULTS);
    const hiddenResults = results.slice(MAX_SEARCH_RESULTS);

    displayResults.forEach((sheet) => {
      const btn = document.createElement('button');
      btn.textContent = sheet.title || 'Untitled';
      btn.className = 'song-item';
      btn.onclick = () => selectSheet(sheet.id);
      sheetListEl.appendChild(btn);
    });

    if (hiddenResults.length > 0) {
      const hint = document.createElement('div');
      hint.className = 'scroll-hint';
      hint.textContent = '⬇️ ' + hiddenResults.length + ' more results (scroll down)';
      sheetListEl.appendChild(hint);
      hiddenResults.forEach((sheet) => {
        const btn = document.createElement('button');
        btn.textContent = sheet.title || 'Untitled';
        btn.className = 'song-item hidden-result';
        btn.onclick = () => selectSheet(sheet.id);
        sheetListEl.appendChild(btn);
      });
    }
  }

  function clearSearch() {
    searchInput.value = '';
    clearSearchBtn.style.display = 'none';
    sheetListEl.style.display = 'none';
    sheetListEl.innerHTML = '';
    searchInput.focus();
  }

  // ============================================
  // SELECT SHEET
  // ============================================
  function selectSheet(sheetId) {
    stopScroll();
    const sheet = sheets.find(s => s.id === sheetId);
    if (!sheet) { outputEl.textContent = 'Leadsheet not found'; return; }
    sheetTitleEl.textContent = sheet.title || 'Untitled';
    timeDisplayEl.textContent = sheet.timeSignature || '4/4';
    renderLeadsheet(sheet);
  }

  // ============================================
  // RENDER LEADSHEET — SCAN CHAR BY CHAR (SAMA MACAM VIEWER.HTML)
  // ============================================
  function renderLeadsheet(sheet) {
    let content = sheet.content || '';
    if (!content) {
      outputEl.innerHTML = 'No content';
      return;
    }

    let flowLine = '';
    let stayLine = '';

    let currentFlow = null;
    let justStarted = false;

    let i = 0;
    while (i < content.length) {
      // Check for (a) — section marker (flow)
      if (content[i] === '(' && i + 2 < content.length && content[i + 2] === ')') {
        let section = content.substring(i, i + 3);
        flowLine += section;
        stayLine += ' '.repeat(3);
        i += 3;
        continue;
      }

      // Check for {1va}, {2va}, etc. — flow start
      if (content[i] === '{') {
        let j = content.indexOf('}', i);
        if (j !== -1) {
          let inner = content.substring(i + 1, j);
          if (inner !== '.') {
            currentFlow = inner.replace(/va/i, '');
            justStarted = true;
          } else {
            // {.} — flow stop
            currentFlow = null;
          }
          i = j + 1;
          continue;
        }
      }

      // Check for [chord] — stay inside bar
      if (content[i] === '[') {
        let j = content.indexOf(']', i);
        if (j !== -1) {
          let chord = content.substring(i + 1, j);
          stayLine += chord;
          if (currentFlow) {
            if (justStarted) {
              flowLine += currentFlow;
              if (chord.length > 1) {
                flowLine += '.'.repeat(chord.length - 1);
              }
              justStarted = false;
            } else {
              flowLine += '.'.repeat(chord.length);
            }
          } else {
            flowLine += ' '.repeat(chord.length);
          }
          i = j + 1;
          continue;
        }
      }

      // Check for ---- (beat)
      if (content[i] === '-' && i + 3 < content.length && content[i + 1] === '-' && content[i + 2] === '-' && content[i + 3] === '-') {
        stayLine += '----';
        if (currentFlow) {
          flowLine += '....';
        } else {
          flowLine += '    ';
        }
        i += 4;
        continue;
      }

      // Check for |: (repeat start)
      if (content[i] === '|' && i + 1 < content.length && content[i + 1] === ':') {
        stayLine += '|:';
        flowLine += '  ';
        i += 2;
        continue;
      }

      // Check for :| (repeat end)
      if (content[i] === ':' && i + 1 < content.length && content[i + 1] === '|') {
        stayLine += ':|';
        flowLine += '  ';
        i += 2;
        continue;
      }

      // Check for || (double bar)
      if (content[i] === '|' && i + 1 < content.length && content[i + 1] === '|') {
        stayLine += '||';
        flowLine += '  ';
        i += 2;
        continue;
      }

      // Check for | (barline)
      if (content[i] === '|') {
        stayLine += '|';
        flowLine += ' ';
        i++;
        continue;
      }

      // Ignore other characters (spaces, etc.)
      i++;
    }

    // Color stay line
    let stayHTML = stayLine
      .replace(/\|/g, '<span class="barline">|</span>')
      .replace(/\|:/g, '<span class="repeat">|:</span>')
      .replace(/:\|/g, '<span class="repeat">:|</span>')
      .replace(/\|\|/g, '<span class="barline">||</span>')
      .replace(/([A-G])(m|maj|min|dim|aug|sus|add|\d|♯|♭|ø|°)*/g, '<span class="chord">$&</span>')
      .replace(/-/g, '<span class="beat">-</span>');

    // Color flow line
    let flowHTML = flowLine
      .replace(/\(([a-d])\)/g, '<span class="section">($1)</span>')
      .replace(/(\d+va)/g, '<span class="flow">$1</span>')
      .replace(/\./g, '<span class="flow">.</span>');

    let html = `
      <div class="flow-line">${flowHTML}</div>
      <div class="stay-line">${stayHTML}</div>
    `;

    outputEl.innerHTML = html;
    outputEl.scrollTop = 0;
    applyFontSize(fontSize);
  }

  // ============================================
  // FONT SIZE
  // ============================================
  function changeFontSize(delta) {
    fontSize = Math.min(28, Math.max(10, fontSize + delta));
    applyFontSize(fontSize);
  }

  function applyFontSize(size) {
    outputEl.style.fontSize = size + 'px';
  }

  // ============================================
  // AUTO-SCROLL
  // ============================================
  function startScroll() {
    if (isScrolling) return;
    if (!outputEl.innerHTML || outputEl.innerHTML === 'Loading...' || outputEl.innerHTML === 'No content') return;
    if (outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 5) return;
    isScrolling = true;
    playBtn.textContent = '▶️';
    playBtn.style.background = '#2a5a2e';
    outputEl.classList.add('scrolling');
    scrollInterval = setInterval(() => {
      if (outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 5) {
        stopScroll();
        return;
      }
      outputEl.scrollTop += scrollSpeed;
    }, 50);
  }

  function stopScroll() {
    if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
    isScrolling = false;
    playBtn.textContent = '▶';
    playBtn.style.background = '#1a1a2e';
    outputEl.classList.remove('scrolling');
  }

  function toggleScroll() {
    if (isScrolling) { stopScroll(); } else { startScroll(); }
  }

  // ============================================
  // TAP TO STOP
  // ============================================
  function setupTapToStop() {
    let touchStartY = 0, isSwiping = false;
    outputEl.addEventListener('touchstart', function(e) {
      touchStartY = e.touches[0].clientY;
      isSwiping = false;
    }, { passive: true });
    outputEl.addEventListener('touchmove', function(e) {
      const diff = touchStartY - e.touches[0].clientY;
      if (Math.abs(diff) > 10) { isSwiping = true; }
    }, { passive: true });
    outputEl.addEventListener('touchend', function(e) {
      if (!isSwiping && isScrolling) { stopScroll(); e.preventDefault(); }
    }, { passive: true });
    outputEl.addEventListener('click', function() {
      if (isScrolling) { stopScroll(); }
    });
  }

  // ============================================
  // FULLSCREEN
  // ============================================
  function toggleFullscreen() {
    const app = document.querySelector('.app');
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
      app.classList.add('fullscreen-mode');
    } else {
      if (document.exitFullscreen) { document.exitFullscreen(); }
      app.classList.remove('fullscreen-mode');
    }
  }

  document.addEventListener('fullscreenchange', function() {
    const app = document.querySelector('.app');
    if (!document.fullscreenElement) { app.classList.remove('fullscreen-mode'); }
  });

  // ============================================
  // KEYBOARD SHORTCUTS
  // ============================================
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); toggleScroll(); }
    if (e.key === 'ArrowUp' && isScrolling) { e.preventDefault(); scrollSpeed = Math.min(scrollSpeed + 0.3, 3); }
    if (e.key === 'ArrowDown' && isScrolling) { e.preventDefault(); scrollSpeed = Math.max(scrollSpeed - 0.3, 0.3); }
  });

  // ============================================
  // GO HOME
  // ============================================
  function goHome() { window.location.href = "index.html"; }

  // ============================================
  // INITIALIZE
  // ============================================
  document.addEventListener('DOMContentLoaded', function() {
    setupTapToStop();
    outputEl.style.fontSize = fontSize + 'px';
    setupIdleTimer();
  });

  window.addEventListener('beforeunload', function() {
    if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
    if (logoutTimer) { clearTimeout(logoutTimer); logoutTimer = null; }
  });

  console.log('📊 Leadsheet Viewer loaded!');
  console.log('  ▶  - Start auto-scroll');
  console.log('  ⏹  - Stop auto-scroll');
  console.log('  Tap on lyrics - Stop scrolling');
  console.log('  Space bar - Toggle scroll');
  console.log('  ↑/↓ arrows - Adjust scroll speed');
</script>
