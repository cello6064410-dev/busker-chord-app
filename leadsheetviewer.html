<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Leadsheet Viewer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    /* ============================================
       FIX SCROLL FOR LEADSHEET VIEWER
       ============================================ */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh; /* Android fix */
      overflow: hidden;
      background: #0f0f0f;
      padding: 10px;
      padding-bottom: 80px;
    }

    .header,
    .search-container,
    .song-list,
    .floating-bar {
      flex-shrink: 0;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      background: #1b1b1b;
      padding: 15px;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      line-height: 1.6;
      border: 1px solid #2a2a2a;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .output.scrolling {
      border-color: #4fc3f7;
    }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <h2>📊 Leadsheet</h2>
      <div style="display: flex; gap: 8px; align-items: center;">
        <span id="userName" style="color: #aaa; font-size: 0.8rem; font-family: Arial, sans-serif; display: none;"></span>
        <button onclick="logoutUser()" class="logout-btn" title="Logout" style="background: #4a2a2a; border: none; color: white; padding: 6px 12px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; min-height: 40px; min-width: 40px;">🚪</button>
        <button onclick="goHome()" class="home-btn" title="Go to Home">🏠</button>
      </div>
    </div>
    <div style="display: flex; justify-content: center; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 4px;">
      <h3 id="sheetTitle" style="margin:0; font-family:Arial; color:#ffcc00;">No Leadsheet Selected</h3>
      <span id="timeDisplay" style="color: #00ffcc; font-size: 0.9rem; font-family: Arial, sans-serif; background: #1a1a2e; padding: 2px 12px; border-radius: 12px; border: 1px solid #2a2a4e;">4/4</span>
      <button onclick="toggleFullscreen()" title="Fullscreen" style="background: #2a2a4e; border: none; color: white; padding: 4px 14px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; min-height: 32px;">⛶</button>
    </div>
  </div>

  <!-- SEARCH BAR -->
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="🔍 Search leadsheets..." oninput="filterSheets()">
    <button onclick="clearSearch()" id="clearSearchBtn" style="display:none;">✕</button>
  </div>

  <!-- SHEET LIST -->
  <div id="sheetList" class="song-list"></div>

  <!-- OUTPUT - LEADSHEET RENDER -->
  <div id="output" class="output">Loading...</div>

  <!-- LINK TO LYRIC VIEW -->
  <div style="text-align: center; padding: 8px 0; flex-shrink: 0;">
    <a href="viewer.html" style="color: #4fc3f7; font-family: Arial, sans-serif; font-size: 0.9rem; text-decoration: none; padding: 8px 16px; background: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4e; display: inline-block;">
      📝 Switch to Lyric View
    </a>
  </div>

  <!-- FLOATING CONTROL BAR -->
  <div class="floating-bar">
    <button onclick="changeFontSize(2)" title="Increase Font">A+</button>
    <button onclick="changeFontSize(-2)" title="Decrease Font">A-</button>
    <button onclick="toggleScroll()" title="Start/Stop Auto-Scroll" id="playBtn">▶</button>
    <button onclick="stopScroll()" title="Stop Auto-Scroll" id="stopBtn">⏹</button>
  </div>

</div>

<script>
  // ============================================
  // FIREBASE CONFIGURATION
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>

<script>
  // ============================================
  // GLOBAL VARIABLES
  // ============================================
  let sheets = [];
  let filteredSheets = [];
  let currentSheetId = null;
  let currentSheetData = null;
  let fontSize = 15;

  // Auto-scroll variables
  let scrollInterval = null;
  let isScrolling = false;
  let scrollSpeed = 0.4;

  // Auto-logout timer
  let logoutTimer = null;
  const IDLE_TIMEOUT = 30 * 60 * 1000;

  // Search results limit
  const MAX_SEARCH_RESULTS = 10;
  const DISPLAY_RESULTS = 5;

  // ============================================
  // DOM REFERENCES
  // ============================================
  const sheetListEl = document.getElementById('sheetList');
  const outputEl = document.getElementById('output');
  const sheetTitleEl = document.getElementById('sheetTitle');
  const timeDisplayEl = document.getElementById('timeDisplay');
  const playBtn = document.getElementById('playBtn');
  const searchInput = document.getElementById('searchInput');
  const clearSearchBtn = document.getElementById('clearSearchBtn');
  const userNameEl = document.getElementById('userName');

  // ============================================
  // AUTH - CHECK LOGIN STATUS
  // ============================================
  auth.onAuthStateChanged(function(user) {
    if (!user) {
      window.location.href = "login.html";
      return;
    }
    console.log('✅ Logged in as:', user.displayName || user.email);
    if (user.displayName) {
      userNameEl.textContent = '👤 ' + user.displayName;
      userNameEl.style.display = 'inline';
    }
    db.collection('users').doc(user.uid).set({
      lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
      loginCount: firebase.firestore.FieldValue.increment(1)
    }, { merge: true }).catch(err => console.error('Error updating login:', err));
    loadSheets();
  });

  // ============================================
  // AUTO-LOGOUT
  // ============================================
  function resetLogoutTimer() {
    if (logoutTimer) clearTimeout(logoutTimer);
    logoutTimer = setTimeout(function() {
      console.log('⏰ Auto-logout: Idle for 30 minutes');
      logoutUser();
    }, IDLE_TIMEOUT);
  }

  function setupIdleTimer() {
    const events = ['mousemove', 'mousedown', 'click', 'scroll', 'touchstart', 'keydown'];
    events.forEach(event => {
      document.addEventListener(event, resetLogoutTimer);
    });
    resetLogoutTimer();
  }

  function logoutUser() {
    if (logoutTimer) clearTimeout(logoutTimer);
    stopScroll();
    auth.signOut().then(() => {
      window.location.href = "login.html";
    }).catch(() => {
      window.location.href = "login.html";
    });
  }

  // ============================================
  // LOAD LEADSHEETS
  // ============================================
  function loadSheets() {
    outputEl.textContent = '⏳ Loading leadsheets...';
    sheetListEl.innerHTML = '<div class="loading-text">⏳ Loading leadsheets...</div>';

    db.collection('leadsheets')
      .orderBy('title')
      .get()
      .then((snapshot) => {
        sheets = [];
        sheetListEl.innerHTML = '';
        if (snapshot.empty) {
          outputEl.textContent = '📭 No leadsheets found. Go to Admin to create one.';
          sheetListEl.innerHTML = `
            <div class="empty-text">
              📭 No leadsheets found<br>
              <small>Go to Admin to create your first leadsheet!</small>
            </div>
          `;
          return;
        }
        snapshot.forEach((doc) => {
          const sheet = { id: doc.id, ...doc.data() };
          sheets.push(sheet);
        });
        outputEl.textContent = 'Select a leadsheet to view';
        sheetListEl.innerHTML = `
          <div class="empty-text">
            🔍 Type a leadsheet title to search
          </div>
        `;
        console.log(`✅ ${sheets.length} leadsheets loaded`);
      })
      .catch((error) => {
        console.error('Error loading leadsheets:', error);
        outputEl.textContent = '❌ Error loading leadsheets. Please refresh.';
        sheetListEl.innerHTML = `
          <div class="error-text">
            ❌ Error loading leadsheets<br>
            <small>${error.message}</small>
          </div>
        `;
      });
  }

  // ============================================
  // SEARCH / FILTER
  // ============================================
  function filterSheets() {
    const query = searchInput.value.toLowerCase().trim();
    if (query.length > 0) {
      clearSearchBtn.style.display = 'block';
    } else {
      clearSearchBtn.style.display = 'none';
    }
    if (query === '') {
      sheetListEl.innerHTML = `
        <div class="empty-text">
          🔍 Type a leadsheet title to search
        </div>
      `;
      return;
    }
    const results = sheets.filter(sheet =>
      sheet.title && sheet.title.toLowerCase().includes(query)
    );
    const limitedResults = results.slice(0, MAX_SEARCH_RESULTS);
    renderSheetList(limitedResults, results.length);
  }

  function renderSheetList(results, totalFound) {
    sheetListEl.innerHTML = '';
    if (results.length === 0) {
      sheetListEl.innerHTML = `
        <div class="empty-text">
          🔍 No leadsheets found matching "<span id="searchTerm">${searchInput.value}</span>"
        </div>
      `;
      return;
    }
    const resultCount = document.createElement('div');
    resultCount.className = 'result-count';
    resultCount.textContent = `Showing ${results.length} of ${totalFound} results`;
    sheetListEl.appendChild(resultCount);
    const displayResults = results.slice(0, DISPLAY_RESULTS);
    const hiddenResults = results.slice(DISPLAY_RESULTS);
    displayResults.forEach((sheet) => {
      const btn = createSheetButton(sheet);
      sheetListEl.appendChild(btn);
    });
    if (hiddenResults.length > 0) {
      const hint = document.createElement('div');
      hint.className = 'scroll-hint';
      hint.textContent = `⬇️ ${hiddenResults.length} more results (scroll down)`;
      sheetListEl.appendChild(hint);
      hiddenResults.forEach((sheet) => {
        const btn = createSheetButton(sheet);
        btn.className += ' hidden-result';
        sheetListEl.appendChild(btn);
      });
    }
  }

  function createSheetButton(sheet) {
    const btn = document.createElement('button');
    btn.textContent = sheet.title || 'Untitled';
    btn.className = 'song-item';
    btn.setAttribute('data-id', sheet.id);
    btn.onclick = () => selectSheet(sheet.id);
    return btn;
  }

  function clearSearch() {
    searchInput.value = '';
    clearSearchBtn.style.display = 'none';
    sheetListEl.innerHTML = `
      <div class="empty-text">
        🔍 Type a leadsheet title to search
      </div>
    `;
    searchInput.focus();
  }

  // ============================================
  // SELECT SHEET
  // ============================================
  function selectSheet(sheetId) {
    stopScroll();
    currentSheetId = sheetId;
    const sheet = sheets.find(s => s.id === sheetId);
    if (!sheet) {
      outputEl.textContent = 'Leadsheet not found';
      return;
    }
    currentSheetData = sheet;
    sheetTitleEl.textContent = sheet.title || 'Untitled';
    timeDisplayEl.textContent = sheet.timeSignature || '4/4';
    
    renderLeadsheet(sheet);
  }

  // ============================================
  // RENDER LEADSHEET
  // ============================================
  function renderLeadsheet(sheet) {
    let content = sheet.content || '';
    if (!content) {
      outputEl.textContent = 'No content';
      return;
    }

    let rendered = content;

    // Replace bar lines and repeats
    rendered = rendered.replace(/\|\|:/g, '‖:');
    rendered = rendered.replace(/:\|\|/g, ':‖');
    rendered = rendered.replace(/\|/g, '│');
    
    // Replace backslashes with beat markers
    rendered = rendered.replace(/\\\\/g, '  \\  ');
    
    // Convert chord symbols
    rendered = rendered.replace(/m7b5/g, 'ø');
    rendered = rendered.replace(/dim/g, '°');
    rendered = rendered.replace(/#/g, '♯');
    rendered = rendered.replace(/b/g, '♭');
    
    // Process endings - [1va] etc with line
    rendered = rendered.replace(/\[1,2,3,4va\]/g, '1,2,3,4va─────────────────');
    rendered = rendered.replace(/\[1,2,3va\]/g, '1,2,3va─────────────────');
    rendered = rendered.replace(/\[1,2va\]/g, '1,2va─────────────────');
    rendered = rendered.replace(/\[1va\]/g, '1va─────────────────');
    rendered = rendered.replace(/\[2va\]/g, '2va─────────────────');
    rendered = rendered.replace(/\[3va\]/g, '3va─────────────────');
    rendered = rendered.replace(/\[4va\]/g, '4va─────────────────');
    rendered = rendered.replace(/\[\.\]/g, '');

    outputEl.innerHTML = rendered;
    outputEl.scrollTop = 0;
    applyFontSize(fontSize);
  }

  // ============================================
  // FONT SIZE
  // ============================================
  function changeFontSize(delta) {
    fontSize = Math.min(28, Math.max(10, fontSize + delta));
    applyFontSize(fontSize);
  }

  function applyFontSize(size) {
    outputEl.style.fontSize = size + 'px';
  }

  // ============================================
  // AUTO-SCROLL
  // ============================================
  function startScroll() {
    const output = document.getElementById('output');
    if (isScrolling) return;
    if (!output.innerHTML || output.innerHTML === 'Loading...' || output.innerHTML === 'Select a leadsheet to view') return;
    if (output.scrollTop + output.clientHeight >= output.scrollHeight - 5) return;
    isScrolling = true;
    const playBtn = document.getElementById('playBtn');
    if (playBtn) {
      playBtn.textContent = '▶️';
      playBtn.style.background = '#2a5a2e';
    }
    output.classList.add('scrolling');
    scrollInterval = setInterval(() => {
      const output = document.getElementById('output');
      if (output.scrollTop + output.clientHeight >= output.scrollHeight - 5) {
        stopScroll();
        return;
      }
      output.scrollTop += scrollSpeed;
    }, 50);
  }

  function stopScroll() {
    if (scrollInterval) {
      clearInterval(scrollInterval);
      scrollInterval = null;
    }
    isScrolling = false;
    const playBtn = document.getElementById('playBtn');
    if (playBtn) {
      playBtn.textContent = '▶';
      playBtn.style.background = '#1a1a2e';
    }
    const output = document.getElementById('output');
    if (output) {
      output.classList.remove('scrolling');
    }
  }

  function toggleScroll() {
    if (isScrolling) {
      stopScroll();
    } else {
      startScroll();
    }
  }

  // ============================================
  // TAP TO STOP
  // ============================================
  function setupTapToStop() {
    const output = document.getElementById('output');
    if (!output) return;
    
    let touchStartY = 0;
    let isSwiping = false;
    
    output.addEventListener('touchstart', function(e) {
      touchStartY = e.touches[0].clientY;
      isSwiping = false;
    }, { passive: true });
    
    output.addEventListener('touchmove', function(e) {
      const touchEndY = e.touches[0].clientY;
      const diff = touchStartY - touchEndY;
      if (Math.abs(diff) > 10) {
        isSwiping = true;
      }
    }, { passive: true });
    
    output.addEventListener('touchend', function(e) {
      if (!isSwiping && isScrolling) {
        stopScroll();
        e.preventDefault();
      }
    }, { passive: true });
    
    output.addEventListener('click', function() {
      if (isScrolling) {
        stopScroll();
      }
    });
  }

  // ============================================
  // FULLSCREEN
  // ============================================
  function toggleFullscreen() {
    const app = document.querySelector('.app');
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
      app.classList.add('fullscreen-mode');
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
      app.classList.remove('fullscreen-mode');
    }
  }

  document.addEventListener('fullscreenchange', function() {
    const app = document.querySelector('.app');
    if (!document.fullscreenElement) {
      app.classList.remove('fullscreen-mode');
    }
  });

  // ============================================
  // KEYBOARD SHORTCUTS
  // ============================================
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Space') {
      e.preventDefault();
      toggleScroll();
    }
    if (e.key === 'ArrowUp' && isScrolling) {
      e.preventDefault();
      scrollSpeed = Math.min(scrollSpeed + 0.3, 3);
    }
    if (e.key === 'ArrowDown' && isScrolling) {
      e.preventDefault();
      scrollSpeed = Math.max(scrollSpeed - 0.3, 0.3);
    }
    if (e.key === 'Escape') {
      // Close any modals if needed
    }
  });

  // ============================================
  // GO HOME
  // ============================================
  function goHome() {
    window.location.href = "index.html";
  }

  // ============================================
  // INITIALIZE
  // ============================================
  document.addEventListener('DOMContentLoaded', function() {
    setupTapToStop();
    outputEl.style.fontSize = fontSize + 'px';
    setupIdleTimer();
  });

  // ============================================
  // CLEANUP
  // ============================================
  window.addEventListener('beforeunload', function() {
    if (scrollInterval) {
      clearInterval(scrollInterval);
      scrollInterval = null;
    }
    if (logoutTimer) {
      clearTimeout(logoutTimer);
      logoutTimer = null;
    }
  });

  console.log('📊 Leadsheet Viewer loaded!');
  console.log('Controls:');
  console.log('  ▶  - Start auto-scroll');
  console.log('  ⏹  - Stop auto-scroll');
  console.log('  Tap (not swipe) on lyrics - Stop scrolling');
  console.log('  Space bar - Toggle scroll');
  console.log('  ↑/↓ arrows - Adjust scroll speed');
  console.log('  🔍 Search - Type to filter leadsheets');
  console.log('  ⛶ Fullscreen - Only leadsheet');
</script>

</body>
</html>
