<!DOCTYPE html>

    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="stylesheet" href="style.css" />

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0f0f0f;
        color: #fff;
        font-family: 'Courier New', monospace;
        padding: 10px;
        display: flex;
        justify-content: center;
        min-height: 100vh;
    }

    .container {
        max-width: 900px;
        width: 100%;
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding-bottom: 80px;
    }

    .header {
        flex-shrink: 0;
        text-align: center;
        padding: 5px 0;
        margin-bottom: 8px;
        border-bottom: 1px solid #2a2a4e;
    }

    .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 5px;
    }

    .header-top h2 {
        font-size: 1.1rem;
        color: #ffcc00;
        font-family: Arial, sans-serif;
        margin: 0;
    }

    .header-top .btn-group {
        display: flex;
        gap: 6px;
        align-items: center;
    }

    .header-btn {
        background: #2a2a4e;
        border: none;
        color: white;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 0.9rem;
        cursor: pointer;
        min-height: 36px;
        font-family: Arial, sans-serif;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: background 0.2s;
    }

    .header-btn:hover {
        background: #3a3a6e;
    }

    .header-btn.logout {
        background: #4a2a2a;
    }

    .header-btn.logout:hover {
        background: #5a3a3a;
    }

    .info-bar {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 4px 0 8px 0;
    }

    .info-bar #songTitle {
        font-size: 1rem;
        color: #ffcc00;
        font-family: Arial, sans-serif;
        margin: 0;
    }

    .info-bar #keyDisplay {
        color: #00ffcc;
        font-size: 0.85rem;
        font-family: Arial, sans-serif;
        background: #1a1a2e;
        padding: 2px 12px;
        border-radius: 12px;
        border: 1px solid #2a2a4e;
    }

    .info-bar .transpose-group {
        display: flex;
        align-items: center;
        gap: 4px;
        background: #1a1a2e;
        padding: 2px 8px;
        border-radius: 16px;
        border: 1px solid #2a2a4e;
    }

    .info-bar .transpose-group button {
        background: none;
        border: none;
        color: #fff;
        font-size: 1.1rem;
        cursor: pointer;
        padding: 2px 6px;
        font-weight: bold;
        min-height: 28px;
        min-width: 28px;
        font-family: 'Courier New', monospace;
        transition: color 0.2s;
    }

    .info-bar .transpose-group button.sharp {
        color: #ffcc00;
    }

    .info-bar .transpose-group button.sharp:hover {
        color: #ffd633;
    }

    .info-bar .transpose-group button.flat {
        color: #4fc3f7;
    }

    .info-bar .transpose-group button.flat:hover {
        color: #6dd5fa;
    }

    .info-bar .transpose-group .divider {
        color: #444;
        font-size: 0.8rem;
    }

    /* ============================================================
       OUTPUT — LINE-BASED RENDERING WITH WRAP (OPTION B)
       ============================================================ */
    #output {
        flex: 1;
        background: #0a0a0a;
        border-radius: 10px;
        padding: 16px;
        min-height: 200px;
        border: 1px solid #1a1a2e;
        font-family: 'Courier New', monospace;
        display: flex;
        flex-direction: column;
        gap: 0px;
        overflow-y: auto;
        font-size: 16px;
    }

    #output .loading-text {
        color: #666;
        font-family: Arial, sans-serif;
        font-size: 0.9rem;
        width: 100%;
        text-align: center;
        padding: 40px 0;
    }

    /* ----- MUSIC SYSTEM (kumpulan baris yang di-wrap) ----- */
    .music-system {
        display: flex;
        flex-direction: column;
        gap: 0px;
        margin-bottom: 2px;
    }

    /* ----- MUSIC ROW (baris fizikal yang di-wrap) ----- */
    .music-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0;
        padding: 2px 2px 0px 2px;
        min-height: 28px;
        width: 100%;
    }

    .music-row > * {
        margin-right: 6px;
        flex-shrink: 0;
    }

    .music-row > *:last-child {
        margin-right: 0;
    }

    /* ----- SEPARATOR ROW — untuk setiap baris fizikal ----- */
    .separator-row {
        width: 100%;
        border-bottom: 2px solid #4fc3f7;
        opacity: 0.25;
        margin: 1px 0 3px 0;
        padding: 0;
        height: 4px;
        transition: width 0.05s ease;
    }

    /* ----- INDIVIDUAL ELEMENTS ----- */
    .chord-block {
        display: inline-flex;
        align-items: center;
        gap: 1px;
        vertical-align: middle;
        flex-shrink: 0;
    }

    .chord {
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        color: #ffcc00;
        flex-shrink: 0;
    }

    .beat {
        font-family: 'Courier New', monospace;
        font-size: 16px;
        letter-spacing: 1px;
        white-space: nowrap;
        color: #e0e0f0;
        flex-shrink: 0;
    }

    .section-marker {
        display: inline-block;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        color: #b197fc;
        flex-shrink: 0;
    }

    .text-label {
        display: inline-block;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        background: #1f1f3a;
        padding: 0 6px;
        border-radius: 4px;
        color: #f0f0ff;
        flex-shrink: 0;
    }

    .sep-repeat1 {
        display: inline-block;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        color: #4fc3f7;
        flex-shrink: 0;
    }

    .sep-repeat2 {
        display: inline-block;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        color: #69db7c;
        flex-shrink: 0;
    }

    .sep-default {
        display: inline-block;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        color: #8888aa;
        flex-shrink: 0;
    }

    .sep-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        vertical-align: middle;
        flex-shrink: 0;
        font-weight: bold;
        background: #1a1a3a;
        padding: 0 6px;
        border-radius: 6px;
        border: 1px solid #3a3a6a;
        min-width: 28px;
        min-height: 28px;
    }

    .sep-icon img {
        display: inline-block;
        height: 22px;
        width: auto;
        vertical-align: middle;
        filter: drop-shadow(0 0 4px rgba(79, 195, 247, 0.3));
    }

    .icon-line-header .sep-icon {
        background: #2a2a5a;
        border-color: #5a5a9a;
        box-shadow: 0 0 12px rgba(79, 195, 247, 0.15);
    }

    .icon-line-header .sep-icon img {
        filter: drop-shadow(0 0 6px rgba(79, 195, 247, 0.5));
    }

    .region-marker {
        display: inline-block;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        padding: 0 6px;
        border-radius: 4px;
        background: #2a2a4e;
        color: #ffcc00;
        flex-shrink: 0;
    }

    .placeholder {
        color: #3f3f5a;
        font-family: Arial, sans-serif;
        font-size: 0.9rem;
        width: 100%;
        text-align: center;
        padding: 30px 0;
        letter-spacing: 0.5px;
    }

    .floating-bar {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        background: rgba(15, 15, 15, 0.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 8px 12px;
        border-radius: 14px;
        z-index: 9999;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        border: 1px solid #2a2a2a;
        flex-wrap: nowrap;
    }

    .floating-bar button {
        font-size: 1rem;
        padding: 8px 12px;
        min-width: 44px;
        min-height: 44px;
        background: #1a1a2e;
        border: none;
        border-radius: 8px;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-family: Arial, sans-serif;
        transition: background 0.2s, transform 0.1s;
    }

    .floating-bar button:active {
        background: #2a2a4e;
        transform: scale(0.92);
    }

    .floating-bar button:hover {
        background: #2a2a4e;
    }

    .floating-bar button.play-btn {
        background: #2a5a2e;
    }

    .floating-bar button.play-btn:hover {
        background: #3a6a3e;
    }

    .floating-bar button.stop-btn {
        background: #4a2a2a;
    }

    .floating-bar button.stop-btn:hover {
        background: #5a3a3a;
    }

    @media (max-width: 600px) {
        body { padding: 6px; }
        .container { padding-bottom: 75px; }
        .header-top h2 { font-size: 0.95rem; }
        .header-btn { font-size: 0.8rem; padding: 4px 8px; min-height: 32px; }
        .info-bar #songTitle { font-size: 0.85rem; }
        .info-bar #keyDisplay { font-size: 0.75rem; padding: 1px 8px; }
        #output { padding: 10px; font-size: 14px; }
        .chord { font-size: 14px; }
        .beat { font-size: 14px; }
        .text-label { font-size: 14px; }
        .section-marker { font-size: 14px; }
        .sep-repeat1, .sep-repeat2, .sep-default { font-size: 14px; }
        .music-row > * { margin-right: 4px; }
        .separator-row { height: 3px; border-bottom-width: 2px; }
        .sep-icon { min-width: 24px; min-height: 24px; padding: 0 4px; }
        .sep-icon img { height: 18px; }
        .floating-bar { gap: 4px; padding: 6px 8px; border-radius: 12px; bottom: 6px; width: 98%; justify-content: space-around; }
        .floating-bar button { font-size: 0.9rem; padding: 6px 8px; min-width: 36px; min-height: 38px; }
    }

    @media (min-width: 769px) {
        .container { max-width: 800px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        #output { min-height: 300px; padding: 20px; }
        .floating-bar { gap: 10px; padding: 10px 20px; }
        .floating-bar button { padding: 10px 18px; min-width: 50px; }
    }

    .fullscreen-mode .header,
    .fullscreen-mode .info-bar,
    .fullscreen-mode .floating-bar {
        display: none !important;
    }

    .fullscreen-mode .container {
        padding: 0 !important;
        height: 100vh !important;
    }

    .fullscreen-mode #output {
        border-radius: 0 !important;
        border: none !important;
        min-height: 100vh !important;
        padding: 20px 15px !important;
        font-size: 18px !important;
        background: #0f0f0f !important;
    }

    .fullscreen-mode .chord {
        font-size: 18px !important;
    }
    .fullscreen-mode .beat {
        font-size: 18px !important;
    }
    .fullscreen-mode .text-label {
        font-size: 18px !important;
    }
    .fullscreen-mode .section-marker {
        font-size: 18px !important;
    }
    .fullscreen-mode .sep-icon img {
        height: 26px !important;
    }
</style>

<div class="container">

    <div class="header">
        <div class="header-top">
            <h2>🎵 Leadsheet Viewer</h2>
            <div class="btn-group">
                <button onclick="openList()" class="header-btn" title="Leadsheet List">📋 List</button>
                <button onclick="goHome()" class="header-btn" title="Go Home">🏠</button>
                <button onclick="logoutUser()" class="header-btn logout" title="Logout">🚪</button>

        <button onclick="toggleFullscreen()" title="Toggle Fullscreen">⛶</button>

</div>

<script>
    // ============================================================
    // FIREBASE CONFIG
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
        authDomain: "busker-chord-app.firebaseapp.com",
        projectId: "busker-chord-app"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ============================================================
    // GLOBALS
    // ============================================================
    let currentData = null;
    let currentId = null;
    let fontSize = 16;
    let scrollInterval = null;
    let isScrolling = false;
    let scrollSpeed = 0.4;

    const REGION_COLORS = {
        1: '#ff6b6b',
        2: '#69db7c',
        3: '#4fc3f7',
        4: '#ffd93d'
    };

    const DEFAULT_COLORS = {
        chord: '#ffcc00',
        beat: '#e0e0f0',
        separator: '#8888aa',
        repeat1: '#4fc3f7',
        repeat2: '#69db7c',
        section: '#b197fc',
        textlabel: '#f0f0ff'
    };

    // ============================================================
    // DOM REFS
    // ============================================================
    const outputEl = document.getElementById('output');
    const songTitleEl = document.getElementById('songTitle');
    const keyDisplayEl = document.getElementById('keyDisplay');
    const playBtn = document.getElementById('playBtn');

    // ============================================================
    // AUTH CHECK
    // ============================================================
    auth.onAuthStateChanged(function(user) {
        if (!user) {
            window.location.href = "login.html";
            return;
        }
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id) {
            loadLeadsheet(id);
        } else {
            window.location.href = "leadsheetslist.html";
        }
    });

    // ============================================================
    // LOAD LEADSHEET
    // ============================================================
    function loadLeadsheet(id) {
        currentId = id;
        outputEl.innerHTML = '<div class="loading-text">⏳ Loading leadsheet...</div>';

        db.collection('leadsheets').doc(id).get()
            .then((doc) => {
                if (doc.exists) {
                    currentData = doc.data();
                    songTitleEl.textContent = currentData.title || 'Untitled';
                    keyDisplayEl.textContent = `Key: ${currentData.key || 'C'}`;
                    renderLeadsheet(currentData.content || '');
                } else {
                    outputEl.innerHTML = '<div class="loading-text">❌ Leadsheet not found</div>';
                }
            })
            .catch((err) => {
                outputEl.innerHTML = `<div class="loading-text">❌ Error: ${err.message}</div>`;
            });
    }

    // ============================================================
    // TOKENIZER
    // ============================================================
    function tokenize(input) {
        let text = input.replace(/-/g, '/');
        text = text.replace(/\/+/g, (m) => '/'.repeat(m.length));

        const tokens = [];
        let i = 0;
        let activeRegions = [];

        while (i < text.length) {
            if (text[i] === ' ' || text[i] === '\t') { i++; continue; }

            const regionStartMatch = text.substring(i).match(/^\(([0-9,]+)va\)/);
            if (regionStartMatch) {
                const numbers = regionStartMatch[1].split(',').map(Number);
                const validNumbers = numbers.filter(n => n >= 1 && n <= 4);
                if (validNumbers.length > 0) {
                    for (let n of validNumbers) {
                        if (!activeRegions.includes(n)) activeRegions.push(n);
                    }
                    tokens.push({ type: 'region_start', value: regionStartMatch[0], numbers: validNumbers });
                    i += regionStartMatch[0].length;
                    continue;
                }
            }

            if (text.substring(i, i + 3) === '(.)') {
                tokens.push({ type: 'region_end' });
                activeRegions = [];
                i += 3;
                continue;
            }

            const iconMatch = text.substring(i).match(/^\|([A-Za-z])\|/);
            if (iconMatch) {
                const letter = iconMatch[1].toUpperCase();
                tokens.push({ type: 'icon', letter: letter, region: [...activeRegions] });
                i += iconMatch[0].length;
                continue;
            }

            if (text[i] === '"') {
                const j = text.indexOf('"', i + 1);
                if (j !== -1) {
                    const val = text.substring(i + 1, j);
                    tokens.push({ type: 'textlabel', value: val, region: [...activeRegions] });
                    i = j + 1;
                    continue;
                }
            }

            if (text.substring(i, i + 3) === '||:') {
                tokens.push({ type: 'separator', value: '||:', section: 'repeat1', region: [...activeRegions] });
                i += 3; continue;
            }
            if (text.substring(i, i + 3) === ':||') {
                tokens.push({ type: 'separator', value: ':||', section: 'repeat1', region: [...activeRegions] });
                i += 3; continue;
            }
            if (text.substring(i, i + 3) === ':.|') {
                tokens.push({ type: 'separator', value: ':.|', section: 'repeat1', region: [...activeRegions] });
                i += 3; continue;
            }
            if (text.substring(i, i + 2) === '||') {
                tokens.push({ type: 'separator', value: '||', section: 'repeat2', region: [...activeRegions] });
                i += 2; continue;
            }
            if (text[i] === '|') {
                tokens.push({ type: 'separator', value: '|', section: 'default', region: [...activeRegions] });
                i++; continue;
            }

            if (text[i] === '[') {
                const j = text.indexOf(']', i);
                if (j !== -1) {
                    const content = text.substring(i + 1, j);
                    if (/^[0-9]+$/.test(content)) {
                        tokens.push({ type: 'section', value: content, region: [...activeRegions] });
                    } else {
                        tokens.push({ type: 'chord', value: content, region: [...activeRegions] });
                    }
                    i = j + 1;
                    continue;
                }
            }

            if (text.substring(i, i + 4) === '////') {
                tokens.push({ type: 'slash', value: '////', region: [...activeRegions] });
                i += 4; continue;
            }
            if (text.substring(i, i + 2) === '//') {
                tokens.push({ type: 'slash', value: '//', region: [...activeRegions] });
                i += 2; continue;
            }
            if (text[i] === '/') {
                tokens.push({ type: 'slash', value: '/', region: [...activeRegions] });
                i++; continue;
            }

            i++;
        }

        return tokens;
    }

    // ============================================================
    // BUILD BLOCKS
    // ============================================================
    function buildBlocks(tokens) {
        const blocks = [];
        let currentChord = null;
        let currentSlash = '';
        let currentRegion = [];
        let pendingSeparator = null;
        let pendingSeparatorSection = 'default';
        let pendingSeparatorRegion = [];

        function flushChord() {
            if (currentChord !== null) {
                const slash = currentSlash || '';
                blocks.push({ type: 'chord-block', chord: currentChord, dash: slash, region: [...currentRegion] });
                currentChord = null;
                currentSlash = '';
                currentRegion = [];
            }
        }

        function flushSeparator() {
            if (pendingSeparator !== null) {
                blocks.push({ type: 'separator', value: pendingSeparator, section: pendingSeparatorSection, region: [...pendingSeparatorRegion] });
                pendingSeparator = null;
                pendingSeparatorSection = 'default';
                pendingSeparatorRegion = [];
            }
        }

        for (let t of tokens) {
            if (t.type === 'chord') {
                flushSeparator();
                flushChord();
                currentChord = t.value;
                currentRegion = t.region || [];
            } else if (t.type === 'slash') {
                if (currentChord !== null) {
                    let spaced = t.value.split('').map(() => '/').join(' ');
                    if (currentSlash) currentSlash += ' ' + spaced;
                    else currentSlash = spaced;
                } else {
                    let spaced = t.value.split('').map(() => '/').join(' ');
                    flushSeparator();
                    flushChord();
                    blocks.push({ type: 'dash-block', dash: spaced, region: t.region || [] });
                }
            } else if (t.type === 'separator') {
                flushChord();
                if (pendingSeparator !== null) {
                    pendingSeparator += t.value;
                } else {
                    pendingSeparator = t.value;
                    pendingSeparatorSection = t.section || 'default';
                    pendingSeparatorRegion = t.region || [];
                }
            } else if (t.type === 'section') {
                flushSeparator();
                flushChord();
                blocks.push({ type: 'section', value: t.value, region: t.region || [] });
            } else if (t.type === 'textlabel') {
                flushSeparator();
                flushChord();
                blocks.push({ type: 'textlabel', value: t.value, region: t.region || [] });
            } else if (t.type === 'icon') {
                flushSeparator();
                flushChord();
                blocks.push({ type: 'icon', letter: t.letter, region: t.region || [] });
            } else if (t.type === 'region_start') {
                flushSeparator();
                flushChord();
                blocks.push({ type: 'region_start', value: t.value, numbers: t.numbers });
            } else if (t.type === 'region_end') {
                flushSeparator();
                flushChord();
            }
        }

        flushSeparator();
        flushChord();

        return blocks;
    }

    // ============================================================
    // GROUP INTO SYSTEMS — ICON = LINE BREAKER
    // ============================================================
    function groupIntoSystems(blocks) {
        const systems = [];
        let currentSystem = [];

        function isMajorSeparator(block) {
            if (block.type !== 'separator') return false;
            const v = block.value;
            return v.includes('||:') || v.includes(':||') || v === '||' || v === ':.|';
        }

        function flushSystem() {
            if (currentSystem.length > 0) {
                systems.push([...currentSystem]);
                currentSystem = [];
            }
        }

        for (let i = 0; i < blocks.length; i++) {
            const block = blocks[i];
            const prev = currentSystem.length > 0 ? currentSystem[currentSystem.length - 1] : null;

            // ICON = force new system
            if (block.type === 'icon') {
                flushSystem();
                currentSystem.push(block);
                continue;
            }

            // SPECIAL RULE: If previous is ICON → NEVER break on separator
            const prevIsIcon = prev && prev.type === 'icon';

            if (isMajorSeparator(block) && !prevIsIcon) {
                currentSystem.push(block);
                flushSystem();
            } else {
                currentSystem.push(block);
            }
        }

        if (currentSystem.length > 0) {
            systems.push([...currentSystem]);
        }

        return systems;
    }

    // ============================================================
    // CREATE DOM ELEMENT DARI BLOCK
    // ============================================================
    function createElementFromBlock(block) {
        const region = block.region || [];
        const regionColor = region.length > 0 ? REGION_COLORS[region[0]] : null;

        if (block.type === 'chord-block') {
            const div = document.createElement('span');
            div.className = 'chord-block';
            const chordEl = document.createElement('span');
            chordEl.className = 'chord';
            chordEl.textContent = block.chord || '';
            if (regionColor) chordEl.style.color = regionColor;
            const beatEl = document.createElement('span');
            beatEl.className = 'beat';
            beatEl.textContent = block.dash || '';
            if (regionColor) beatEl.style.color = regionColor;
            div.appendChild(chordEl);
            div.appendChild(beatEl);
            return div;
        }

        if (block.type === 'dash-block') {
            const span = document.createElement('span');
            span.className = 'beat';
            span.textContent = block.dash || '';
            if (regionColor) span.style.color = regionColor;
            return span;
        }

        if (block.type === 'separator') {
            const span = document.createElement('span');
            if (block.section === 'repeat1') {
                span.className = 'sep-repeat1';
                if (regionColor) span.style.color = regionColor;
            } else if (block.section === 'repeat2') {
                span.className = 'sep-repeat2';
                if (regionColor) span.style.color = regionColor;
            } else {
                span.className = 'sep-default';
                if (regionColor) span.style.color = regionColor;
            }
            span.textContent = block.value;
            return span;
        }

        if (block.type === 'section') {
            const span = document.createElement('span');
            span.className = 'section-marker';
            span.textContent = `[${block.value}]`;
            if (regionColor) span.style.color = regionColor;
            return span;
        }

        if (block.type === 'textlabel') {
            const span = document.createElement('span');
            span.className = 'text-label';
            span.textContent = `"${block.value}"`;
            if (regionColor) {
                span.style.color = regionColor;
                span.style.border = `1px solid ${regionColor}`;
            }
            return span;
        }

        if (block.type === 'icon') {
            const div = document.createElement('span');
            div.className = 'sep-icon';
            const img = document.createElement('img');
            img.src = `icons/${block.letter}100.png`;
            img.alt = block.letter;
            img.style.height = '22px';
            img.style.width = 'auto';
            img.style.verticalAlign = 'middle';
            if (regionColor) img.style.filter = `drop-shadow(0 0 2px ${regionColor})`;
            img.onerror = function() {
                this.style.display = 'none';
                div.textContent = block.letter;
                div.style.fontWeight = 'bold';
                div.style.fontSize = '18px';
                div.style.color = '#4fc3f7';
            };
            div.appendChild(img);
            return div;
        }

        if (block.type === 'region_start') {
            const span = document.createElement('span');
            span.className = 'region-marker';
            const colors = block.numbers.map(n => REGION_COLORS[n]).join(' ');
            span.textContent = block.value;
            span.style.color = '#fff';
            span.style.background = `linear-gradient(90deg, ${colors.split(' ').join(', ')})`;
            span.style.padding = '0 6px';
            span.style.borderRadius = '4px';
            return span;
        }

        return null;
    }

    // ============================================================
    // WRAP ELEMENTS INTO ROWS (based on container width)
    // ============================================================
    function wrapIntoRows(elements, containerWidth) {
        const rows = [];
        let currentRow = [];
        let currentRowWidth = 0;

        // Estimate width of an element (rough but works with monospace)
        function getElementWidth(el) {
            const text = el.textContent || '';
            // Approximate width: each char ~ fontSize * 0.6, plus margin/padding
            const charWidth = fontSize * 0.6;
            let extra = 0;
            if (el.classList.contains('sep-icon')) {
                extra = 28 + 12; // icon size + padding
            }
            if (el.classList.contains('text-label')) {
                extra = 12; // padding
            }
            return (text.length * charWidth) + extra + 6; // + margin-right
        }

        for (let el of elements) {
            const elWidth = getElementWidth(el);
            if (currentRow.length > 0 && (currentRowWidth + elWidth) > containerWidth) {
                rows.push(currentRow);
                currentRow = [];
                currentRowWidth = 0;
            }
            currentRow.push(el);
            currentRowWidth += elWidth;
        }

        if (currentRow.length > 0) {
            rows.push(currentRow);
        }

        return rows;
    }

    // ============================================================
    // RENDER LEADSHEET — OPTION B (separator setiap baris fizikal)
    // ============================================================
    function renderLeadsheet(input) {
        if (!input || !input.trim()) {
            outputEl.innerHTML = '<div class="loading-text">⚠️ Empty leadsheet</div>';
            return;
        }

        const tokens = tokenize(input);
        const blocks = buildBlocks(tokens);
        const systems = groupIntoSystems(blocks);

        if (systems.length === 0) {
            outputEl.innerHTML = '<div class="loading-text">✅ Rendered — no visible elements</div>';
            return;
        }

        outputEl.innerHTML = '';

        // Get container width for wrapping
        const containerWidth = outputEl.clientWidth - 32; // padding

        for (let system of systems) {
            // Build elements for this system
            const elements = [];
            const isIconLine = system.length > 0 && system[0].type === 'icon';

            for (let block of system) {
                const el = createElementFromBlock(block);
                if (el) elements.push(el);
            }

            if (elements.length === 0) continue;

            // Wrap into rows based on container width
            const rows = wrapIntoRows(elements, containerWidth);

            // Create system container
            const systemDiv = document.createElement('div');
            systemDiv.className = 'music-system';

            // Add each row with its separator
            for (let rowElements of rows) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'music-row';

                if (isIconLine && rowElements.length > 0) {
                    rowDiv.classList.add('icon-line-header');
                }

                for (let el of rowElements) {
                    rowDiv.appendChild(el);
                }

                systemDiv.appendChild(rowDiv);

                // Separator AFTER each row
                const sepRow = document.createElement('div');
                sepRow.className = 'separator-row';
                // Width akan di-set via updateSeparatorWidths
                systemDiv.appendChild(sepRow);
            }

            outputEl.appendChild(systemDiv);
        }

        // Apply font size
        applyFontSize(fontSize);

        // Auto-align separator width
        requestAnimationFrame(() => {
            updateSeparatorWidths();
        });

        outputEl.scrollTop = 0;
    }

    // ============================================================
    // UPDATE SEPARATOR WIDTH — match content width
    // ============================================================
    function updateSeparatorWidths() {
        const rows = outputEl.querySelectorAll('.music-row');
        const separators = outputEl.querySelectorAll('.separator-row');

        // Match each separator with its row (they are siblings in same system)
        let sepIndex = 0;
        const systems = outputEl.querySelectorAll('.music-system');

        for (let system of systems) {
            const rowList = system.querySelectorAll('.music-row');
            const sepList = system.querySelectorAll('.separator-row');

            for (let i = 0; i < Math.min(rowList.length, sepList.length); i++) {
                const row = rowList[i];
                const sep = sepList[i];
                if (row && sep) {
                    const contentWidth = row.scrollWidth;
                    sep.style.width = Math.max(contentWidth, 20) + 'px';
                    sep.style.marginLeft = '0px';
                    sep.style.marginRight = 'auto';
                }
            }
        }
    }

    // ============================================================
    // FONT SIZE
    // ============================================================
    function changeFontSize(delta) {
        fontSize = Math.min(32, Math.max(10, fontSize + delta));
        applyFontSize(fontSize);
        // Re-render with new font size
        if (currentData) {
            renderLeadsheet(currentData.content || '');
        }
    }

    function applyFontSize(size) {
        outputEl.style.fontSize = size + 'px';
        document.querySelectorAll('.chord, .beat, .section-marker, .text-label, .sep-repeat1, .sep-repeat2, .sep-default, .region-marker')
            .forEach(el => {
                el.style.fontSize = size + 'px';
            });
        document.querySelectorAll('.sep-icon img').forEach(el => {
            el.style.height = (size * 1.4) + 'px';
        });
        document.querySelectorAll('.sep-icon').forEach(el => {
            el.style.minWidth = (size * 1.6) + 'px';
            el.style.minHeight = (size * 1.6) + 'px';
        });
        setTimeout(updateSeparatorWidths, 100);
    }

    // ============================================================
    // AUTO-SCROLL
    // ============================================================
    function startScroll() {
        if (isScrolling) return;
        if (!outputEl.innerHTML || outputEl.innerHTML.includes('No leadsheet')) return;
        if (outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 5) return;
        isScrolling = true;
        playBtn.textContent = '▶️';
        playBtn.style.background = '#2a5a2e';
        outputEl.classList.add('scrolling');
        scrollInterval = setInterval(() => {
            if (outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 5) {
                stopScroll();
                return;
            }
            outputEl.scrollTop += scrollSpeed;
        }, 50);
    }

    function stopScroll() {
        if (scrollInterval) {
            clearInterval(scrollInterval);
            scrollInterval = null;
        }
        isScrolling = false;
        playBtn.textContent = '▶';
        playBtn.style.background = '#1a1a2e';
        outputEl.classList.remove('scrolling');
    }

    function toggleScroll() {
        if (isScrolling) stopScroll();
        else startScroll();
    }

    // ============================================================
    // FULLSCREEN
    // ============================================================
    function toggleFullscreen() {
        const container = document.querySelector('.container');
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
            container.classList.add('fullscreen-mode');
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            container.classList.remove('fullscreen-mode');
        }
    }

    document.addEventListener('fullscreenchange', function() {
        const container = document.querySelector('.container');
        if (!document.fullscreenElement) {
            container.classList.remove('fullscreen-mode');
        }
    });

    // ============================================================
    // TRANSPOSE (visual only)
    // ============================================================
    function transposeUp() {
        console.log('Transpose Up');
    }

    function transposeDown() {
        console.log('Transpose Down');
    }

    // ============================================================
    // NAVIGATION
    // ============================================================
    function openList() {
        window.location.href = "leadsheetslist.html";
    }

    function goHome() {
        window.location.href = "index.html";
    }

    function logoutUser() {
        stopScroll();
        auth.signOut().then(() => {
            window.location.href = "login.html";
        }).catch(() => {
            window.location.href = "login.html";
        });
    }

    // ============================================================
    // KEYBOARD SHORTCUTS
    // ============================================================
    document.addEventListener('keydown', function(e) {
        if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            toggleScroll();
        }
        if (e.key === 'ArrowUp' && isScrolling) {
            e.preventDefault();
            scrollSpeed = Math.min(scrollSpeed + 0.3, 3);
        }
        if (e.key === 'ArrowDown' && isScrolling) {
            e.preventDefault();
            scrollSpeed = Math.max(scrollSpeed - 0.3, 0.3);
        }
        if (e.key === 'Escape') {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        }
    });

    // ============================================================
    // INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id && auth.currentUser) {
            loadLeadsheet(id);
        }
    });

    // ============================================================
    // CLEANUP
    // ============================================================
    window.addEventListener('beforeunload', function() {
        if (scrollInterval) {
            clearInterval(scrollInterval);
            scrollInterval = null;
        }
    });

    // Handle resize untuk update separator widths
    let resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            if (currentData) {
                renderLeadsheet(currentData.content || '');
            }
        }, 200);
    });

    console.log('🎵 Leadsheet Viewer loaded!');
    console.log('✅ Option B: Wrap + separator setiap baris fizikal');
    console.log('✅ Icon = system breaker, separator stays inline');
</script>
