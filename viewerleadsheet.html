<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Leadsheet Viewer</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0f0f0f;
        color: #fff;
        font-family: 'Courier New', monospace;
        padding: 10px;
        display: flex;
        justify-content: center;
        min-height: 100vh;
    }

    .container {
        max-width: 900px;
        width: 100%;
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding-bottom: 80px;
    }

    .header {
        flex-shrink: 0;
        text-align: center;
        padding: 5px 0;
        margin-bottom: 8px;
        border-bottom: 1px solid #2a2a4e;
    }

    .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 5px;
    }

    .header-top h2 {
        font-size: 1.1rem;
        color: #ffcc00;
        font-family: Arial, sans-serif;
        margin: 0;
    }

    .header-top .btn-group {
        display: flex;
        gap: 6px;
        align-items: center;
    }

    .header-btn {
        background: #2a2a4e;
        border: none;
        color: white;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 0.9rem;
        cursor: pointer;
        min-height: 36px;
        font-family: Arial, sans-serif;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: background 0.2s;
    }

    .header-btn:hover {
        background: #3a3a6e;
    }

    .header-btn.logout {
        background: #4a2a2a;
    }

    .header-btn.logout:hover {
        background: #5a3a3a;
    }

    .info-bar {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 4px 0 8px 0;
    }

    .info-bar #songTitle {
        font-size: 1rem;
        color: #ffcc00;
        font-family: Arial, sans-serif;
        margin: 0;
    }

    .info-bar #keyDisplay {
        color: #00ffcc;
        font-size: 0.85rem;
        font-family: Arial, sans-serif;
        background: #1a1a2e;
        padding: 2px 12px;
        border-radius: 12px;
        border: 1px solid #2a2a4e;
    }

    .info-bar .transpose-group {
        display: flex;
        align-items: center;
        gap: 4px;
        background: #1a1a2e;
        padding: 2px 8px;
        border-radius: 16px;
        border: 1px solid #2a2a4e;
    }

    .info-bar .transpose-group button {
        background: none;
        border: none;
        color: #fff;
        font-size: 1.1rem;
        cursor: pointer;
        padding: 2px 6px;
        font-weight: bold;
        min-height: 28px;
        min-width: 28px;
        font-family: 'Courier New', monospace;
        transition: color 0.2s;
    }

    .info-bar .transpose-group button.sharp {
        color: #ffcc00;
    }

    .info-bar .transpose-group button.sharp:hover {
        color: #ffd633;
    }

    .info-bar .transpose-group button.flat {
        color: #4fc3f7;
    }

    .info-bar .transpose-group button.flat:hover {
        color: #6dd5fa;
    }

    .info-bar .transpose-group .divider {
        color: #444;
        font-size: 0.8rem;
    }

    #output {
        flex: 1;
        background: #0a0a0a;
        border-radius: 10px;
        padding: 16px;
        min-height: 200px;
        border: 1px solid #1a1a2e;
        font-family: 'Courier New', monospace;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 2px 4px;
        overflow-y: auto;
        line-height: 1.8;
        align-content: flex-start;
    }

    #output .loading-text {
        color: #666;
        font-family: Arial, sans-serif;
        font-size: 0.9rem;
        width: 100%;
        text-align: center;
        padding: 40px 0;
    }

    /* ===== HORIZONTAL ELEMENTS ===== */
    .chord-block {
        display: inline-block;
        text-align: center;
        margin: 0 2px;
        vertical-align: middle;
        min-width: 20px;
    }

    .chord {
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        transition: color 0.2s;
        display: inline;
    }

    .beat {
        font-family: 'Courier New', monospace;
        font-size: 16px;
        letter-spacing: 1px;
        white-space: nowrap;
        transition: color 0.2s;
        display: inline;
        margin-left: 2px;
    }

    .section-marker {
        display: inline-block;
        text-align: center;
        margin: 0 2px;
        vertical-align: middle;
        min-width: 20px;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        transition: color 0.2s;
    }

    .text-label {
        display: inline-block;
        text-align: center;
        margin: 0 2px;
        vertical-align: middle;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        background: #2a2a4e;
        padding: 0 6px;
        border-radius: 4px;
        transition: color 0.2s, background 0.2s;
    }

    .sep-repeat1 {
        display: inline-block;
        text-align: center;
        margin: 0 2px;
        vertical-align: middle;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        transition: color 0.2s;
    }

    .sep-repeat2 {
        display: inline-block;
        text-align: center;
        margin: 0 2px;
        vertical-align: middle;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        transition: color 0.2s;
    }

    .sep-default {
        display: inline-block;
        text-align: center;
        margin: 0 2px;
        vertical-align: middle;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        transition: color 0.2s;
    }

    .sep-icon {
        display: inline-block;
        text-align: center;
        margin: 0 2px;
        vertical-align: middle;
        min-width: 20px;
    }

    .sep-icon img {
        display: inline-block;
        height: 18px;
        width: auto;
        vertical-align: middle;
    }

    .ending-marker {
        display: inline-block;
        text-align: center;
        margin: 0 2px;
        vertical-align: middle;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        transition: color 0.2s;
    }

    .region-marker {
        display: inline-block;
        text-align: center;
        margin: 0 2px;
        vertical-align: middle;
        font-weight: bold;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        padding: 0 4px;
        border-radius: 4px;
        transition: color 0.2s, background 0.2s;
    }

    .region-marker.region-start {
        background: #2a2a4e;
        color: #ffcc00;
    }

    /* ===== SEPARATOR LINE ===== */
    .separator-line {
        width: 100%;
        text-align: center;
        padding: 4px 0;
        margin: 4px 0;
        color: #4fc3f7;
        font-size: 14px;
        font-family: 'Courier New', monospace;
        letter-spacing: 1px;
        opacity: 0.4;
        line-height: 1.2;
        white-space: pre-wrap;
        word-break: break-all;
    }

    .floating-bar {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        background: rgba(15, 15, 15, 0.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 8px 12px;
        border-radius: 14px;
        z-index: 9999;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        border: 1px solid #2a2a2a;
        flex-wrap: nowrap;
    }

    .floating-bar button {
        font-size: 1rem;
        padding: 8px 12px;
        min-width: 44px;
        min-height: 44px;
        background: #1a1a2e;
        border: none;
        border-radius: 8px;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-family: Arial, sans-serif;
        transition: background 0.2s, transform 0.1s;
    }

    .floating-bar button:active {
        background: #2a2a4e;
        transform: scale(0.92);
    }

    .floating-bar button:hover {
        background: #2a2a4e;
    }

    .floating-bar button.play-btn {
        background: #2a5a2e;
    }

    .floating-bar button.play-btn:hover {
        background: #3a6a3e;
    }

    .floating-bar button.stop-btn {
        background: #4a2a2a;
    }

    .floating-bar button.stop-btn:hover {
        background: #5a3a3a;
    }

    @media (max-width: 600px) {
        body { padding: 6px; }
        .container { padding-bottom: 75px; }
        .header-top h2 { font-size: 0.95rem; }
        .header-btn { font-size: 0.8rem; padding: 4px 8px; min-height: 32px; }
        .info-bar #songTitle { font-size: 0.85rem; }
        .info-bar #keyDisplay { font-size: 0.75rem; padding: 1px 8px; }
        #output { padding: 10px; font-size: 14px; gap: 1px 3px; }
        .chord { font-size: 14px; }
        .beat { font-size: 14px; }
        .text-label { font-size: 14px; }
        .section-marker { font-size: 14px; }
        .sep-repeat1, .sep-repeat2, .sep-default { font-size: 14px; }
        .floating-bar { gap: 4px; padding: 6px 8px; border-radius: 12px; bottom: 6px; width: 98%; justify-content: space-around; }
        .floating-bar button { font-size: 0.9rem; padding: 6px 8px; min-width: 36px; min-height: 38px; }
        .separator-line { font-size: 12px; padding: 2px 0; }
    }

    @media (min-width: 769px) {
        .container { max-width: 800px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        #output { min-height: 300px; padding: 20px; gap: 2px 6px; }
        .floating-bar { gap: 10px; padding: 10px 20px; }
        .floating-bar button { padding: 10px 18px; min-width: 50px; }
        .separator-line { font-size: 14px; padding: 6px 0; }
    }

    .fullscreen-mode .header,
    .fullscreen-mode .info-bar,
    .fullscreen-mode .floating-bar {
        display: none !important;
    }

    .fullscreen-mode .container {
        padding: 0 !important;
        height: 100vh !important;
    }

    .fullscreen-mode #output {
        border-radius: 0 !important;
        border: none !important;
        min-height: 100vh !important;
        padding: 20px 15px !important;
        font-size: 18px !important;
        background: #0f0f0f !important;
    }

    .fullscreen-mode .chord {
        font-size: 18px !important;
    }
    .fullscreen-mode .beat {
        font-size: 18px !important;
    }
    .fullscreen-mode .text-label {
        font-size: 18px !important;
    }
    .fullscreen-mode .section-marker {
        font-size: 18px !important;
    }
    .fullscreen-mode .separator-line {
        font-size: 16px !important;
        padding: 8px 0 !important;
    }
</style>

<div class="container">

    <div class="header">
        <div class="header-top">
            <h2>🎵 Leadsheet Viewer</h2>
            <div class="btn-group">
                <button onclick="openList()" class="header-btn" title="Leadsheet List">📋 List</button>
                <button onclick="goHome()" class="header-btn" title="Go Home">🏠</button>
                <button onclick="logoutUser()" class="header-btn logout" title="Logout">🚪</button>
            </div>
        </div>
        <div class="info-bar">
            <span id="songTitle">No Leadsheet Loaded</span>

                <button onclick="transposeUp()" class="sharp" title="Transpose Up">♯+</button>
                <span class="divider">|</span>
                <button onclick="transposeDown()" class="flat" title="Transpose Down">♭−</button>
            </div>
        </div>

    <div id="output">
        <div class="loading-text">⏳ Loading leadsheet...</div>

        <button onclick="toggleFullscreen()" title="Toggle Fullscreen">⛶</button>
    </div>

</div>

<script>
    // ============================================================
    // FIREBASE CONFIG
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
        authDomain: "busker-chord-app.firebaseapp.com",
        projectId: "busker-chord-app"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ============================================================
    // GLOBALS
    // ============================================================
    let currentData = null;
    let currentId = null;
    let fontSize = 16;
    let scrollInterval = null;
    let isScrolling = false;
    let scrollSpeed = 0.4;

    const REGION_COLORS = {
        1: '#ff6b6b',
        2: '#69db7c',
        3: '#4fc3f7',
        4: '#ffd93d'
    };

    const DEFAULT_COLORS = {
        chord: '#ffcc00',
        beat: '#ffffff',
        separator: '#666',
        repeat1: '#4fc3f7',
        repeat2: '#69db7c',
        section: '#b197fc',
        textlabel: '#ffffff',
        ending: '#ff6b6b'
    };

    // ============================================================
    // DOM REFS
    // ============================================================
    const outputEl = document.getElementById('output');
    const songTitleEl = document.getElementById('songTitle');
    const keyDisplayEl = document.getElementById('keyDisplay');
    const playBtn = document.getElementById('playBtn');

    // ============================================================
    // AUTH CHECK
    // ============================================================
    auth.onAuthStateChanged(function(user) {
        if (!user) {
            window.location.href = "login.html";
            return;
        }
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id) {
            loadLeadsheet(id);
        } else {
            window.location.href = "leadsheetslist.html";
        }
    });

    // ============================================================
    // LOAD LEADSHEET
    // ============================================================
    function loadLeadsheet(id) {
        currentId = id;
        outputEl.innerHTML = '<div class="loading-text">⏳ Loading leadsheet...</div>';

        db.collection('leadsheets').doc(id).get()
            .then((doc) => {
                if (doc.exists) {
                    currentData = doc.data();
                    songTitleEl.textContent = currentData.title || 'Untitled';
                    keyDisplayEl.textContent = `Key: ${currentData.key || 'C'}`;
                    renderLeadsheet(currentData.content || '');
                } else {
                    outputEl.innerHTML = '<div class="loading-text">❌ Leadsheet not found</div>';
                }
            })
            .catch((err) => {
                outputEl.innerHTML = `<div class="loading-text">❌ Error: ${err.message}</div>`;
            });
    }

    // ============================================================
    // RENDER LEADSHEET — HORIZONTAL + WRAP + SEPARATOR
    // ============================================================
    function renderLeadsheet(input) {
        if (!input.trim()) {
            outputEl.innerHTML = '<div class="loading-text">⚠️ Empty leadsheet</div>';
            return;
        }

        // Normalize: semua dash → slash
        input = input.replace(/-/g, '/');
        input = input.replace(/\/+/g, (m) => '/'.repeat(m.length));

        // --- Tokenize ---
        const tokens = [];
        let i = 0;
        let activeRegions = [];

        while (i < input.length) {
            if (input[i] === ' ' || input[i] === '\t') {
                i++;
                continue;
            }

            // Track if we're at a section boundary
            const isTextLabel = input[i] === '"';
            const isSectionMarker = input[i] === '[' && i + 1 < input.length && /^[0-9]+$/.test(input[i + 1]);

            // If text label or section marker, and not the first token, add separator
            if ((isTextLabel || isSectionMarker) && tokens.length > 0) {
                const lastToken = tokens[tokens.length - 1];
                if (lastToken && lastToken.type !== 'separator_line') {
                    tokens.push({ type: 'separator_line' });
                }
            }

            // --- Regular tokenization ---
            const regionStartMatch = input.substring(i).match(/^\(([0-9,]+)va\)/);
            if (regionStartMatch) {
                const numbers = regionStartMatch[1].split(',').map(Number);
                const validNumbers = numbers.filter(n => n >= 1 && n <= 4);
                if (validNumbers.length > 0) {
                    for (let n of validNumbers) {
                        if (!activeRegions.includes(n)) activeRegions.push(n);
                    }
                    tokens.push({ type: 'region_start', value: regionStartMatch[0], numbers: validNumbers });
                    i += regionStartMatch[0].length;
                    continue;
                }
            }

            if (input.substring(i, i + 3) === '(.)') {
                tokens.push({ type: 'region_end' });
                activeRegions = [];
                i += 3;
                continue;
            }

            const iconMatch = input.substring(i).match(/^\|([A-Za-z])\|/);
            if (iconMatch) {
                const letter = iconMatch[1].toUpperCase();
                tokens.push({ type: 'icon', letter: letter, region: [...activeRegions] });
                i += iconMatch[0].length;
                continue;
            }

            if (input[i] === '"') {
                const j = input.indexOf('"', i + 1);
                if (j !== -1) {
                    const text = input.substring(i + 1, j);
                    tokens.push({ type: 'textlabel', value: text, region: [...activeRegions] });
                    i = j + 1;
                    continue;
                }
            }

            if (input.substring(i, i + 3) === '||:') {
                tokens.push({ type: 'separator', value: '||:', section: 'repeat1', region: [...activeRegions] });
                i += 3;
                continue;
            }

            if (input.substring(i, i + 3) === ':||') {
                tokens.push({ type: 'separator', value: ':||', section: 'repeat1', region: [...activeRegions] });
                i += 3;
                continue;
            }

            if (input.substring(i, i + 3) === ':.|') {
                tokens.push({ type: 'separator', value: ':.|', section: 'repeat1', region: [...activeRegions] });
                i += 3;
                continue;
            }

            if (input.substring(i, i + 2) === '||') {
                tokens.push({ type: 'separator', value: '||', section: 'repeat2', region: [...activeRegions] });
                i += 2;
                continue;
            }

            if (input[i] === '|') {
                tokens.push({ type: 'separator', value: '|', section: 'default', region: [...activeRegions] });
                i++;
                continue;
            }

            if (input[i] === '[') {
                const j = input.indexOf(']', i);
                if (j !== -1) {
                    const content = input.substring(i + 1, j);
                    if (/^[0-9]+$/.test(content)) {
                        tokens.push({ type: 'section', value: content, region: [...activeRegions] });
                        i = j + 1;
                        continue;
                    } else {
                        tokens.push({ type: 'chord', value: content, region: [...activeRegions] });
                        i = j + 1;
                        continue;
                    }
                }
            }

            // Slash detection
            if (input.substring(i, i + 4) === '////') {
                tokens.push({ type: 'slash', value: '////', region: [...activeRegions] });
                i += 4;
                continue;
            }

            if (input.substring(i, i + 2) === '//') {
                tokens.push({ type: 'slash', value: '//', region: [...activeRegions] });
                i += 2;
                continue;
            }

            if (input[i] === '/') {
                tokens.push({ type: 'slash', value: '/', region: [...activeRegions] });
                i++;
                continue;
            }

            i++;
        }

        // --- Build blocks ---
        const blocks = [];
        let currentChord = null;
        let currentSlash = '';
        let currentRegion = [];
        let pendingSeparator = null;
        let pendingSeparatorSection = 'default';
        let pendingSeparatorRegion = [];

        function flushChord() {
            if (currentChord !== null) {
                const slash = currentSlash || '/ / / /';
                blocks.push({ type: 'chord-block', chord: currentChord, dash: slash, region: [...currentRegion] });
                currentChord = null;
                currentSlash = '';
                currentRegion = [];
            }
        }

        function flushSeparator() {
            if (pendingSeparator !== null) {
                blocks.push({ type: 'separator', value: pendingSeparator, section: pendingSeparatorSection, region: [
                        ...pendingSeparatorRegion
                    ] });
                pendingSeparator = null;
                pendingSeparatorSection = 'default';
                pendingSeparatorRegion = [];
            }
        }

        for (let t of tokens) {
            if (t.type === 'chord') {
                flushSeparator();
                flushChord();
                currentChord = t.value;
                currentRegion = t.region || [];
            } else if (t.type === 'slash') {
                if (currentChord !== null) {
                    let spaced = t.value.split('').map(() => '/').join(' ');
                    if (currentSlash) currentSlash += ' ' + spaced;
                    else currentSlash = spaced;
                } else {
                    let spaced = t.value.split('').map(() => '/').join(' ');
                    flushSeparator();
                    flushChord();
                    blocks.push({ type: 'dash-block', dash: spaced, region: t.region || [] });
                }
            } else if (t.type === 'separator') {
                flushChord();
                if (pendingSeparator !== null) {
                    pendingSeparator += t.value;
                } else {
                    pendingSeparator = t.value;
                    pendingSeparatorSection = t.section || 'default';
                    pendingSeparatorRegion = t.region || [];
                }
            } else if (t.type === 'section') {
                flushSeparator();
                flushChord();
                blocks.push({ type: 'section', value: t.value, region: t.region || [] });
            } else if (t.type === 'textlabel') {
                flushSeparator();
                flushChord();
                blocks.push({ type: 'textlabel', value: t.value, region: t.region || [] });
            } else if (t.type === 'icon') {
                flushSeparator();
                flushChord();
                blocks.push({ type: 'icon', letter: t.letter, region: t.region || [] });
            } else if (t.type === 'region_start') {
                flushSeparator();
                flushChord();
                blocks.push({ type: 'region_start', value: t.value, numbers: t.numbers });
            } else if (t.type === 'region_end') {
                flushSeparator();
                flushChord();
                // Do nothing — hidden
            } else if (t.type === 'separator_line') {
                flushSeparator();
                flushChord();
                blocks.push({ type: 'separator_line' });
            }
        }

        flushSeparator();
        flushChord();

        // --- Render ---
        outputEl.innerHTML = '';

        for (let block of blocks) {
            const region = block.region || [];
            const regionColor = region.length > 0 ? REGION_COLORS[region[0]] : null;

            if (block.type === 'chord-block') {
                const div = document.createElement('div');
                div.className = 'chord-block';
                const chordEl = document.createElement('span');
                chordEl.className = 'chord';
                chordEl.textContent = block.chord;
                chordEl.style.color = regionColor || DEFAULT_COLORS.chord;
                const beatEl = document.createElement('span');
                beatEl.className = 'beat';
                beatEl.textContent = block.dash;
                beatEl.style.color = regionColor || DEFAULT_COLORS.beat;
                div.appendChild(chordEl);
                div.appendChild(beatEl);
                outputEl.appendChild(div);

            } else if (block.type === 'dash-block') {
                const div = document.createElement('div');
                div.className = 'chord-block';
                const beatEl = document.createElement('span');
                beatEl.className = 'beat';
                beatEl.textContent = block.dash;
                beatEl.style.color = regionColor || DEFAULT_COLORS.beat;
                div.appendChild(beatEl);
                outputEl.appendChild(div);

            } else if (block.type === 'separator') {
                const div = document.createElement('span');
                if (block.section === 'repeat1') {
                    div.className = 'sep-repeat1';
                    div.style.color = regionColor || DEFAULT_COLORS.repeat1;
                } else if (block.section === 'repeat2') {
                    div.className = 'sep-repeat2';
                    div.style.color = regionColor || DEFAULT_COLORS.repeat2;
                } else {
                    div.className = 'sep-default';
                    div.style.color = regionColor || DEFAULT_COLORS.separator;
                }
                div.textContent = block.value;
                outputEl.appendChild(div);

            } else if (block.type === 'section') {
                const div = document.createElement('span');
                div.className = 'section-marker';
                div.textContent = `[${block.value}]`;
                div.style.color = regionColor || DEFAULT_COLORS.section;
                outputEl.appendChild(div);

            } else if (block.type === 'textlabel') {
                const div = document.createElement('span');
                div.className = 'text-label';
                div.textContent = `"${block.value}"`;
                div.style.color = regionColor || DEFAULT_COLORS.textlabel;
                if (regionColor) {
                    div.style.border = `1px solid ${regionColor}`;
                }
                outputEl.appendChild(div);

            } else if (block.type === 'icon') {
                const div = document.createElement('span');
                div.className = 'sep-icon';
                const img = document.createElement('img');
                img.src = `icons/${block.letter}100.png`;
                img.alt = block.letter;
                img.style.height = '18px';
                img.style.width = 'auto';
                img.style.verticalAlign = 'middle';
                if (regionColor) {
                    img.style.filter = `drop-shadow(0 0 2px ${regionColor})`;
                }
                div.appendChild(img);
                outputEl.appendChild(div);

            } else if (block.type === 'region_start') {
                const div = document.createElement('span');
                div.className = 'region-marker region-start';
                const colors = block.numbers.map(n => REGION_COLORS[n]).join(' ');
                div.textContent = block.value;
                div.style.color = '#fff';
                div.style.background = `linear-gradient(90deg, ${colors.split(' ').join(', ')})`;
                div.style.padding = '0 6px';
                div.style.borderRadius = '4px';
                outputEl.appendChild(div);

            } else if (block.type === 'separator_line') {
                const div = document.createElement('div');
                div.className = 'separator-line';
    
                // Cari text label terdekat (sebelum separator)
                let textLength = 10; // default
                for (let j = blocks.indexOf(block) - 1; j >= 0; j--) {
                    if (blocks[j].type === 'textlabel') {
                        textLength = blocks[j].value.length;
                        break;
                    }
                }
                const separatorCount = textLength + 2;
                const separatorText = '_'.repeat(separatorCount);
                div.textContent = separatorText;
                outputEl.appendChild(div);
            }
        }

        applyFontSize(fontSize);
        outputEl.scrollTop = 0;
    }

    // ============================================================
    // FONT SIZE
    // ============================================================
    function changeFontSize(delta) {
        fontSize = Math.min(32, Math.max(10, fontSize + delta));
        applyFontSize(fontSize);
    }

    function applyFontSize(size) {
        outputEl.style.fontSize = size + 'px';
        document.querySelectorAll('.chord, .beat, .section-marker, .text-label, .sep-repeat1, .sep-repeat2, .sep-default, .ending-marker, .region-marker, .separator-line')
            .forEach(el => {
                el.style.fontSize = size + 'px';
            });
        document.querySelectorAll('.sep-icon img').forEach(el => {
            el.style.height = (size * 1.2) + 'px';
        });
    }

    // ============================================================
    // AUTO-SCROLL
    // ============================================================
    function startScroll() {
        if (isScrolling) return;
        if (!outputEl.innerHTML || outputEl.innerHTML.includes('No leadsheet')) return;
        if (outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 5) return;
        isScrolling = true;
        playBtn.textContent = '▶️';
        playBtn.style.background = '#2a5a2e';
        outputEl.classList.add('scrolling');
        scrollInterval = setInterval(() => {
            if (outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 5) {
                stopScroll();
                return;
            }
            outputEl.scrollTop += scrollSpeed;
        }, 50);
    }

    function stopScroll() {
        if (scrollInterval) {
            clearInterval(scrollInterval);
            scrollInterval = null;
        }
        isScrolling = false;
        playBtn.textContent = '▶';
        playBtn.style.background = '#1a1a2e';
        outputEl.classList.remove('scrolling');
    }

    function toggleScroll() {
        if (isScrolling) stopScroll();
        else startScroll();
    }

    // ============================================================
    // FULLSCREEN
    // ============================================================
    function toggleFullscreen() {
        const container = document.querySelector('.container');
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
            container.classList.add('fullscreen-mode');
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            container.classList.remove('fullscreen-mode');
        }
    }

    document.addEventListener('fullscreenchange', function() {
        const container = document.querySelector('.container');
        if (!document.fullscreenElement) {
            container.classList.remove('fullscreen-mode');
        }
    });

    // ============================================================
    // TRANSPOSE (visual only)
    // ============================================================
    function transposeUp() {
        console.log('Transpose Up');
    }

    function transposeDown() {
        console.log('Transpose Down');
    }

    // ============================================================
    // NAVIGATION
    // ============================================================
    function openList() {
        window.location.href = "leadsheetslist.html";
    }

    function goHome() {
        window.location.href = "index.html";
    }

    function logoutUser() {
        stopScroll();
        auth.signOut().then(() => {
            window.location.href = "login.html";
        }).catch(() => {
            window.location.href = "login.html";
        });
    }

    // ============================================================
    // KEYBOARD SHORTCUTS
    // ============================================================
    document.addEventListener('keydown', function(e) {
        if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            toggleScroll();
        }
        if (e.key === 'ArrowUp' && isScrolling) {
            e.preventDefault();
            scrollSpeed = Math.min(scrollSpeed + 0.3, 3);
        }
        if (e.key === 'ArrowDown' && isScrolling) {
            e.preventDefault();
            scrollSpeed = Math.max(scrollSpeed - 0.3, 0.3);
        }
        if (e.key === 'Escape') {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        }
    });

    // ============================================================
    // INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id && auth.currentUser) {
            loadLeadsheet(id);
        }
    });

    // ============================================================
    // CLEANUP
    // ============================================================
    window.addEventListener('beforeunload', function() {
        if (scrollInterval) {
            clearInterval(scrollInterval);
            scrollInterval = null;
        }
    });

    console.log('🎵 Leadsheet Viewer loaded!');
    console.log('✅ Horizontal render with wrap');
    console.log('✅ Separator: 20 underscore');
</script>

</body>
</html>
