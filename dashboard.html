<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Dashboard - Busker App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<div class="dashboard-wrapper">
  <div class="dashboard-card">
    
    <!-- Header -->
    <div class="dashboard-header">
      <div class="dashboard-header-top">
        <h2>📊 Dashboard</h2>
        <button onclick="goHome()" class="home-btn" title="Go to Home">🏠</button>
      </div>
      <p class="dashboard-subtitle">Statistik Pengguna &amp; Lagu</p>
    </div>

    <!-- Divider -->
    <div class="dashboard-divider"></div>

    <!-- Stats Grid -->
    <div class="dashboard-stats">
      <div class="stat-card">
        <span class="stat-number" id="totalUsers">0</span>
        <span class="stat-label">👥 Jumlah Pengguna</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="totalSongs">0</span>
        <span class="stat-label">🎵 Jumlah Lagu</span>
      </div>
    </div>

    <!-- User List -->
    <div class="dashboard-section">
      <h3>👤 Senarai Pengguna</h3>
      <div id="userList" class="user-list">⏳ Loading users...</div>
    </div>

    <!-- Song List -->
    <div class="dashboard-section">
      <h3>🎵 Senarai Lagu</h3>
      <div id="songList" class="song-list-dashboard">⏳ Loading songs...</div>
    </div>

    <!-- Footer -->
    <div class="dashboard-footer">
      <button onclick="goHome()" class="back-btn">⬅ Back to Home</button>
    </div>

  </div>
</div>

<script>
  // ============================================
  // FIREBASE CONFIG
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>

<script>
  // ============================================
  // DOM REFERENCES
  // ============================================
  const totalUsersEl = document.getElementById('totalUsers');
  const totalSongsEl = document.getElementById('totalSongs');
  const userListEl = document.getElementById('userList');
  const songListEl = document.getElementById('songList');

  // ============================================
  // GO HOME
  // ============================================
  function goHome() {
    window.location.href = "index.html";
  }

  // ============================================
  // LOAD DATA
  // ============================================
  function loadDashboard() {
    // Load Users
    db.collection('users')
      .orderBy('lastLogin', 'desc')
      .get()
      .then((snapshot) => {
        totalUsersEl.textContent = snapshot.size;

        if (snapshot.empty) {
          userListEl.innerHTML = '<div class="empty-text">No users yet</div>';
          return;
        }

        userListEl.innerHTML = '';
        snapshot.forEach((doc) => {
          const user = doc.data();
          const div = document.createElement('div');
          div.className = 'user-item';

          const lastLogin = user.lastLogin 
            ? new Date(user.lastLogin.seconds * 1000).toLocaleString() 
            : 'Never';

          div.innerHTML = `
            <div class="user-avatar">
              ${user.photoURL ? `<img src="${user.photoURL}" alt="${user.displayName}">` : '👤'}
            </div>
            <div class="user-info">
              <div class="user-name">${user.displayName || 'Unknown'}</div>
              <div class="user-email">${user.email || 'No email'}</div>
              <div class="user-login">Last login: ${lastLogin}</div>
            </div>
            <div class="user-count">${user.loginCount || 1} logins</div>
          `;
          userListEl.appendChild(div);
        });
      })
      .catch((error) => {
        console.error('Error loading users:', error);
        userListEl.innerHTML = '<div class="error-text">❌ Error loading users</div>';
      });

    // Load Songs
    db.collection('songs')
      .orderBy('title')
      .get()
      .then((snapshot) => {
        totalSongsEl.textContent = snapshot.size;

        if (snapshot.empty) {
          songListEl.innerHTML = '<div class="empty-text">No songs yet</div>';
          return;
        }

        songListEl.innerHTML = '';
        snapshot.forEach((doc) => {
          const song = doc.data();
          const div = document.createElement('div');
          div.className = 'song-item-dashboard';
          div.textContent = song.title || 'Untitled';
          songListEl.appendChild(div);
        });
      })
      .catch((error) => {
        console.error('Error loading songs:', error);
        songListEl.innerHTML = '<div class="error-text">❌ Error loading songs</div>';
      });
  }

  // ============================================
  // CHECK AUTH - REDIRECT IF NOT ADMIN
  // ============================================
  // For now, password protection is handled by index.html
  // But we can add an extra check if needed

  // ============================================
  // INITIALIZE
  // ============================================
  document.addEventListener('DOMContentLoaded', function() {
    loadDashboard();
  });
</script>

<style>

    max-width: 800px;

  }

    display: flex;

  }

  .user-item {

  }

  .user-avatar {

    flex-shrink: 0;
  }

  .user-avatar img {
    width: 100%;

    object-fit: cover;
  }

  .user-info {
    flex: 1;

  }

  .user-name {
    font-weight: bold;

  }

  .user-email {
    font-size: 0.8rem;

  }

  .user-login {
    font-size: 0.7rem;

  }

  .user-count {

  }

  .song-list-dashboard {
    max-height: 250px;
    overflow-y: auto;
    background: #151515;
    border-radius: 10px;
    padding: 5px;
  }

  .song-item-dashboard {
    padding: 10px 14px;
    background: #1a1a2e;
    border-radius: 8px;
    margin-bottom: 4px;
    border: 1px solid #2a2a4e;
    color: #fff;
    font-family: Arial, sans-serif;
  }

  .empty-text,
  .error-text {
    text-align: center;
    padding: 20px;
    color: #888;
    font-family: Arial, sans-serif;
  }

  .error-text {
    color: #ff4444;
  }

  .dashboard-footer {
    margin-top: 25px;
    text-align: center;
  }

  .back-btn {
    background: #2a2a4e;
    color: white;
    padding: 12px 30px;
    font-size: 1rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    transition: background 0.3s;
  }

  .back-btn:hover {
    background: #3a3a6e;
  }

  .back-btn:active {
    transform: scale(0.96);
  }

  /* ============================================
     RESPONSIVE
     ============================================ */
  @media (max-width: 480px) {
    .dashboard-card {
      padding: 25px 20px;
      border-radius: 24px;
    }

    .dashboard-header h2 {
      font-size: 1.5rem;
    }

    .stat-number {
      font-size: 2rem;
    }

    .user-item {
      flex-wrap: wrap;
      gap: 10px;
    }

    .user-count {
      width: 100%;
      text-align: right;
    }

    .user-list {
      max-height: 200px;
    }

    .song-list-dashboard {
      max-height: 180px;
    }
  }
</style>

</body>
</html>
