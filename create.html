<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Create Song</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
</head>
<body>

<div class="container create-container">
  <div class="app-card">
    <h2>🎼 Manage Songs</h2>
    <p class="subtitle">Create, edit, or delete songs</p>
    
    <!-- Song List for Editing/Deleting -->
    <div class="form-group">
      <label>Select a song to edit or delete</label>
      <div id="songListForAdmin" class="admin-song-list"></div>
    </div>
    
    <hr style="border-color: #2a2a4e; margin: 20px 0;">
    
    <!-- Create/Edit Form -->
    <div class="form-group">
      <label for="songId" style="display: none;">Song ID</label>
      <input id="songId" type="hidden">
      
      <label for="title">Song Title</label>
      <input id="title" placeholder="Enter song title..." class="form-input">
    </div>
    
    <div class="form-group">
      <label for="input">Lyrics with Chords</label>
      <textarea id="input" placeholder="Example: [C]Hello [G]world" class="form-textarea"></textarea>
      <small class="hint">Use [Chord] format. Example: [C]Hello [G]world</small>
    </div>
    
    <div class="button-group">
      <button onclick="saveSong()" class="save-btn" id="saveBtn">💾 Save Song</button>
      <button onclick="clearForm()" class="clear-btn">🔄 Clear</button>
      <button onclick="goBack()" class="back-btn">⬅ Back</button>
    </div>
    
    <div id="statusMessage" class="status-message"></div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
  authDomain: "busker-chord-app.firebaseapp.com",
  projectId: "busker-chord-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>
// ============================================
// DOM REFERENCES
// ============================================
const titleInput = document.getElementById('title');
const lyricsInput = document.getElementById('input');
const statusMsg = document.getElementById('statusMessage');
const songIdInput = document.getElementById('songId');
const songListAdmin = document.getElementById('songListForAdmin');

// ============================================
// LOAD SONGS FOR ADMIN
// ============================================
function loadSongsForAdmin() {
  songListAdmin.innerHTML = '<div class="loading-text">⏳ Loading songs...</div>';
  
  db.collection('songs')
    .orderBy('title')
    .get()
    .then((snapshot) => {
      songListAdmin.innerHTML = '';
      
      if (snapshot.empty) {
        songListAdmin.innerHTML = '<div class="empty-text">📭 No songs found</div>';
        return;
      }
      
      snapshot.forEach((doc) => {
        const song = { id: doc.id, ...doc.data() };
        
        const songItem = document.createElement('div');
        songItem.className = 'admin-song-item';
        
        const titleSpan = document.createElement('span');
        titleSpan.textContent = song.title || 'Untitled';
        titleSpan.className = 'song-title';
        
        const btnGroup = document.createElement('div');
        btnGroup.className = 'admin-btn-group';
        
        // Edit button
        const editBtn = document.createElement('button');
        editBtn.textContent = '✏️ Edit';
        editBtn.className = 'edit-btn';
        editBtn.onclick = () => loadSongForEdit(song.id);
        
        // Delete button
        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = '🗑️ Delete';
        deleteBtn.className = 'delete-btn';
        deleteBtn.onclick = () => deleteSong(song.id);
        
        btnGroup.appendChild(editBtn);
        btnGroup.appendChild(deleteBtn);
        
        songItem.appendChild(titleSpan);
        songItem.appendChild(btnGroup);
        songListAdmin.appendChild(songItem);
      });
    })
    .catch((error) => {
      console.error('Error loading songs:', error);
      songListAdmin.innerHTML = '<div class="error-text">❌ Error loading songs</div>';
    });
}

// ============================================
// LOAD SONG FOR EDIT
// ============================================
function loadSongForEdit(songId) {
  statusMsg.textContent = '⏳ Loading song...';
  statusMsg.className = 'status-message info';
  
  db.collection('songs')
    .doc(songId)
    .get()
    .then((doc) => {
      if (doc.exists) {
        const song = doc.data();
        songIdInput.value = songId;
        titleInput.value = song.title || '';
        lyricsInput.value = song.lyrics || song.content || '';
        
        document.getElementById('saveBtn').textContent = '✏️ Update Song';
        statusMsg.textContent = '✅ Song loaded for editing';
        statusMsg.className = 'status-message success';
        
        // Scroll to form
        titleInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else {
        statusMsg.textContent = '❌ Song not found';
        statusMsg.className = 'status-message error';
      }
    })
    .catch((error) => {
      console.error('Error loading song:', error);
      statusMsg.textContent = '❌ Error loading song: ' + error.message;
      statusMsg.className = 'status-message error';
    });
}

// ============================================
// SAVE OR UPDATE SONG
// ============================================
function saveSong() {
  const title = titleInput.value.trim();
  const lyrics = lyricsInput.value.trim();
  const songId = songIdInput.value;
  
  if (!title) {
    statusMsg.textContent = '⚠️ Please enter a song title';
    statusMsg.className = 'status-message error';
    return;
  }
  
  if (!lyrics) {
    statusMsg.textContent = '⚠️ Please enter lyrics';
    statusMsg.className = 'status-message error';
    return;
  }
  
  const songData = {
    title: title,
    lyrics: lyrics,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  
  statusMsg.textContent = '⏳ Saving song...';
  statusMsg.className = 'status-message info';
  
  let savePromise;
  let action;
  
  if (songId) {
    // Update existing song
    savePromise = db.collection('songs').doc(songId).update(songData);
    action = 'updated';
  } else {
    // Create new song
    songData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    savePromise = db.collection('songs').add(songData);
    action = 'saved';
  }
  
  savePromise
    .then(() => {
      statusMsg.textContent = `✅ Song ${action} successfully!`;
      statusMsg.className = 'status-message success';
      
      if (!songId) {
        clearForm();
      }
      
      // Refresh the admin song list
      loadSongsForAdmin();
      
      // Reset save button text
      document.getElementById('saveBtn').textContent = '💾 Save Song';
      
      // Auto clear after 3 seconds
      setTimeout(() => {
        if (songId) {
          clearForm();
          document.getElementById('saveBtn').textContent = '💾 Save Song';
        }
      }, 3000);
    })
    .catch((error) => {
      console.error('Error saving song:', error);
      statusMsg.textContent = '❌ Error saving song: ' + error.message;
      statusMsg.className = 'status-message error';
    });
}

// ============================================
// DELETE SONG
// ============================================
function deleteSong(songId) {
  if (!confirm('Are you sure you want to delete this song?')) {
    return;
  }
  
  statusMsg.textContent = '⏳ Deleting song...';
  statusMsg.className = 'status-message info';
  
  db.collection('songs')
    .doc(songId)
    .delete()
    .then(() => {
      statusMsg.textContent = '✅ Song deleted successfully!';
      statusMsg.className = 'status-message success';
      
      // Refresh the admin song list
      loadSongsForAdmin();
      
      // Clear form if this was the song being edited
      if (songIdInput.value === songId) {
        clearForm();
        document.getElementById('saveBtn').textContent = '💾 Save Song';
      }
      
      setTimeout(() => {
        statusMsg.textContent = '';
        statusMsg.className = 'status-message';
      }, 3000);
    })
    .catch((error) => {
      console.error('Error deleting song:', error);
      statusMsg.textContent = '❌ Error deleting song: ' + error.message;
      statusMsg.className = 'status-message error';
    });
}

// ============================================
// CLEAR FORM
// ============================================
function clearForm() {
  songIdInput.value = '';
  titleInput.value = '';
  lyricsInput.value = '';
  document.getElementById('saveBtn').textContent = '💾 Save Song';
  statusMsg.textContent = '';
  statusMsg.className = 'status-message';
  titleInput.focus();
}

// ============================================
// GO BACK
// ============================================
function goBack() {
  window.location.href = "index.html";
}

// ============================================
// INITIALIZE
// ============================================
document.addEventListener('DOMContentLoaded', function() {
  loadSongsForAdmin();
});
</script>

</body>
</html>
