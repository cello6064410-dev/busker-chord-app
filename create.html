<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024">
  <title>Create Song - Desktop Only</title>
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* ============================================
       FORCE DESKTOP VIEW WITH SCROLLBARS
       ============================================ */
    
    html {
      overflow: scroll !important;
      min-width: 1024px !important;
    }
    
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      min-width: 1024px !important;
      overflow: auto !important;
    }
    
    .create-container {
      display: block !important;
      min-width: 900px !important;
      max-width: none !important;
      padding: 40px !important;
      background: #1a1a2e;
      min-height: 100vh;
      overflow: visible !important;
    }
    
    .app-card {
      max-width: 900px !important;
      margin: 0 auto !important;
      padding: 40px !important;
      background: #1a1a2e;
      border: 2px solid #2a2a4e;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      overflow: visible !important;
    }
    
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .header-top h2 {
      font-size: 32px !important;
      color: #ffcc00 !important;
      margin: 0;
    }
    
    .home-btn {
      background: #2a2a4e;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 1.4rem;
      cursor: pointer;
      min-height: 48px;
      min-width: 48px;
      transition: background 0.2s;
    }
    
    .home-btn:hover {
      background: #3a3a6e;
    }
    
    .form-input, .form-textarea {
      width: 100% !important;
      font-size: 18px !important;
      padding: 15px !important;
      background: #0f0f0f;
      border: 2px solid #2a2a4e;
      border-radius: 10px;
      color: white;
      box-sizing: border-box;
    }
    
    .form-textarea {
      min-height: 300px !important;
      font-size: 18px !important;
      font-family: 'Courier New', monospace !important;
      resize: vertical !important;
    }
    
    .button-group {
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: wrap !important;
      gap: 20px !important;
      justify-content: center !important;
      margin: 30px 0 !important;
      padding: 25px !important;
      background: #2a2a4e !important;
      border: 3px solid #ffcc00 !important;
      border-radius: 12px !important;
      min-height: 80px !important;
      overflow: visible !important;
    }
    
    .button-group button {
      flex: 0 1 auto !important;
      min-width: 160px !important;
      padding: 16px 30px !important;
      font-size: 18px !important;
      font-weight: bold !important;
      border: none !important;
      border-radius: 10px !important;
      cursor: pointer !important;
      transition: transform 0.2s !important;
    }
    
    .button-group button:hover {
      transform: scale(1.05) !important;
    }
    
    .save-btn, #saveBtn {
      background: #00c853 !important;
      color: #fff !important;
      border: 2px solid #fff !important;
    }
    
    .clear-btn {
      background: #4a4a4a !important;
      color: #fff !important;
      border: 2px solid #888 !important;
    }
    
    .back-btn {
      background: #2a4a6e !important;
      color: #fff !important;
      border: 2px solid #6a9abe !important;
    }
    
    .delete-btn {
      background: #6e2a2a !important;
      color: #fff !important;
      border: 2px solid #ff4444 !important;
      display: none !important;
    }
    
    .delete-btn.active {
      display: inline-block !important;
    }
    
    .status-message {
      padding: 15px !important;
      border-radius: 10px !important;
      font-size: 18px !important;
      text-align: center !important;
      margin: 20px 0 !important;
    }
    
    .status-message.success {
      background: rgba(0, 200, 83, 0.2) !important;
      color: #00e676 !important;
      border: 2px solid #00c853 !important;
    }
    
    .status-message.error {
      background: rgba(255, 68, 68, 0.2) !important;
      color: #ff4444 !important;
      border: 2px solid #ff4444 !important;
    }
    
    .status-message.info {
      background: rgba(79, 195, 247, 0.2) !important;
      color: #4fc3f7 !important;
      border: 2px solid #4fc3f7 !important;
    }
    
    .subtitle {
      font-size: 18px !important;
      color: #aaa !important;
      margin-bottom: 30px !important;
    }
    
    label {
      font-size: 18px !important;
      color: #aaa !important;
      display: block !important;
      margin-bottom: 8px !important;
    }
    
    .hint {
      font-size: 14px !important;
      color: #666 !important;
      display: block !important;
      margin-top: 8px !important;
    }
    
    hr {
      border-color: #2a2a4e !important;
      margin: 30px 0 !important;
    }
    
    .top-links {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .top-links a {
      color: #4fc3f7;
      text-decoration: none;
      font-size: 18px;
      font-family: Arial, sans-serif;
      padding: 8px 16px;
      background: #1a1a2e;
      border-radius: 8px;
      border: 1px solid #2a2a4e;
      transition: background 0.2s;
    }
    
    .top-links a:hover {
      background: #2a2a4e;
    }
    
    ::-webkit-scrollbar {
      width: 12px !important;
      height: 12px !important;
    }
    
    ::-webkit-scrollbar-track {
      background: #0f0f0f !important;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #2a2a4e !important;
      border-radius: 6px !important;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #4a4a6e !important;
    }
    
    * {
      scrollbar-width: auto !important;
      scrollbar-color: #2a2a4e #0f0f0f !important;
    }
  </style>
</head>
<body>

<div class="container create-container">
  <div class="app-card">
    
    <!-- TOP LINKS -->
    <div class="top-links">
      <a href="songslist.html">📋 All Songs</a>
    </div>
    
    <!-- HEADER WITH HOME BUTTON -->
    <div class="header-top">
      <h2>🎼 Manage Songs</h2>
      <button onclick="goHome()" class="home-btn" title="Go to Home">🏠</button>
    </div>
    
    <p class="subtitle" id="modeLabel">Create a new song</p>
    
    <!-- Create/Edit Form -->
    <div class="form-group">
      <label for="songId" style="display: none;">Song ID</label>
      <input id="songId" type="hidden">
      
      <label for="title">Song Title</label>
      <input id="title" placeholder="Enter song title..." class="form-input">
    </div>
    
    <div class="form-group">
      <label for="input">Lyrics with Chords</label>
      <textarea id="input" placeholder="Example: [C]Hello [G]world" class="form-textarea"></textarea>
      <small class="hint">Use [Chord] format. Example: [C]Hello [G]world</small>
    </div>
    
    <!-- BUTTONS -->
    <div class="button-group">
      <button onclick="saveSong()" id="saveBtn">💾 Save Song</button>
      <button onclick="deleteSong()" id="deleteBtn" class="delete-btn">🗑️ Delete</button>
      <button onclick="clearForm()" class="clear-btn">🔄 Clear</button>
      <button onclick="goBack()" class="back-btn">⬅ Back</button>
    </div>
    
    <div id="statusMessage" class="status-message"></div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
  authDomain: "busker-chord-app.firebaseapp.com",
  projectId: "busker-chord-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const titleInput = document.getElementById('title');
const lyricsInput = document.getElementById('input');
const statusMsg = document.getElementById('statusMessage');
const songIdInput = document.getElementById('songId');
const saveBtn = document.getElementById('saveBtn');
const deleteBtn = document.getElementById('deleteBtn');
const modeLabel = document.getElementById('modeLabel');

let currentSongId = null;

// ============================================
// GO HOME
// ============================================
function goHome() {
  window.location.href = "index.html";
}

// ============================================
// CHECK URL PARAMETER FOR EDIT MODE
// ============================================
function checkForEditMode() {
  const urlParams = new URLSearchParams(window.location.search);
  const songId = urlParams.get('edit');
  
  if (songId) {
    loadSongForEdit(songId);
  }
}

// ============================================
// LOAD SONG FOR EDIT
// ============================================
function loadSongForEdit(songId) {
  currentSongId = songId;
  songIdInput.value = songId;
  
  statusMsg.textContent = '⏳ Loading song...';
  statusMsg.className = 'status-message info';
  
  db.collection('songs').doc(songId).get()
    .then((doc) => {
      if (doc.exists) {
        const song = doc.data();
        titleInput.value = song.title || '';
        lyricsInput.value = song.lyrics || song.content || '';
        saveBtn.textContent = '✏️ Update Song';
        modeLabel.textContent = 'Editing: ' + (song.title || 'Untitled');
        deleteBtn.classList.add('active');
        statusMsg.textContent = '✅ Song loaded for editing';
        statusMsg.className = 'status-message success';
      } else {
        statusMsg.textContent = '❌ Song not found';
        statusMsg.className = 'status-message error';
        clearForm();
      }
    })
    .catch(err => {
      statusMsg.textContent = '❌ Error: ' + err.message;
      statusMsg.className = 'status-message error';
    });
}

// ============================================
// SAVE SONG (CREATE OR UPDATE)
// ============================================
function saveSong() {
  const title = titleInput.value.trim();
  const lyrics = lyricsInput.value.trim();
  const songId = songIdInput.value;
  
  if (!title || !lyrics) {
    statusMsg.textContent = '⚠️ Please enter both title and lyrics';
    statusMsg.className = 'status-message error';
    return;
  }
  
  const data = { 
    title, 
    lyrics, 
    updatedAt: firebase.firestore.FieldValue.serverTimestamp() 
  };
  
  let promise;
  let action;
  
  if (songId) {
    promise = db.collection('songs').doc(songId).update(data);
    action = 'updated';
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    promise = db.collection('songs').add(data);
    action = 'saved';
  }
  
  statusMsg.textContent = '⏳ Saving...';
  statusMsg.className = 'status-message info';
  
  promise
    .then(() => {
      statusMsg.textContent = `✅ Song ${action} successfully!`;
      statusMsg.className = 'status-message success';
      
      if (!songId) {
        clearForm();
      } else {
        saveBtn.textContent = '✏️ Update Song';
      }
    })
    .catch(err => {
      statusMsg.textContent = '❌ Error: ' + err.message;
      statusMsg.className = 'status-message error';
    });
}

// ============================================
// DELETE SONG
// ============================================
function deleteSong() {
  const songId = songIdInput.value;
  
  if (!songId) {
    statusMsg.textContent = '⚠️ No song to delete';
    statusMsg.className = 'status-message error';
    return;
  }
  
  if (!confirm('Delete this song permanently?')) {
    return;
  }
  
  statusMsg.textContent = '⏳ Deleting...';
  statusMsg.className = 'status-message info';
  
  db.collection('songs').doc(songId).delete()
    .then(() => {
      statusMsg.textContent = '✅ Song deleted successfully!';
      statusMsg.className = 'status-message success';
      clearForm();
    })
    .catch(err => {
      statusMsg.textContent = '❌ Delete failed: ' + err.message;
      statusMsg.className = 'status-message error';
    });
}

// ============================================
// CLEAR FORM
// ============================================
function clearForm() {
  songIdInput.value = '';
  currentSongId = null;
  titleInput.value = '';
  lyricsInput.value = '';
  saveBtn.textContent = '💾 Save Song';
  modeLabel.textContent = 'Create a new song';
  deleteBtn.classList.remove('active');
  statusMsg.textContent = '';
  statusMsg.className = 'status-message';
  titleInput.focus();
  
  if (window.history && window.history.replaceState) {
    const url = window.location.href.split('?')[0];
    window.history.replaceState({}, document.title, url);
  }
}

// ============================================
// GO BACK
// ============================================
function goBack() {
  window.location.href = "index.html";
}

// ============================================
// INITIALIZE
// ============================================
document.addEventListener('DOMContentLoaded', function() {
  checkForEditMode();
});
</script>

</body>
</html>
