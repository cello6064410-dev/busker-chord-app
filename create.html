<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024">
  <title>Create Song - Desktop Only</title>
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* ============================================
       FORCE DESKTOP VIEW - NO MOBILE RESPONSIVE
       ============================================ */
    
    /* Force minimum width */
    html, body {
      min-width: 1024px !important;
      overflow-x: auto !important;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
    }
    
    /* Desktop container - no max-width restrictions */
    .create-container {
      display: block !important;
      min-width: 900px !important;
      max-width: none !important;
      padding: 40px !important;
      background: #1a1a2e;
      min-height: 100vh;
    }
    
    .app-card {
      max-width: 900px !important;
      margin: 0 auto !important;
      padding: 40px !important;
      background: #1a1a2e;
      border: 2px solid #2a2a4e;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    
    /* Large form elements */
    .form-input, .form-textarea {
      width: 100% !important;
      font-size: 18px !important;
      padding: 15px !important;
      background: #0f0f0f;
      border: 2px solid #2a2a4e;
      border-radius: 10px;
      color: white;
      box-sizing: border-box;
    }
    
    .form-textarea {
      min-height: 300px !important;
      font-size: 18px !important;
      font-family: 'Courier New', monospace !important;
      resize: vertical !important;
    }
    
    /* BUTTONS - Large and always visible */
    .button-group {
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: wrap !important;
      gap: 20px !important;
      justify-content: center !important;
      margin: 30px 0 !important;
      padding: 25px !important;
      background: #2a2a4e !important;
      border: 3px solid #ffcc00 !important;
      border-radius: 12px !important;
      min-height: 80px !important;
    }
    
    .button-group button {
      flex: 0 1 auto !important;
      min-width: 160px !important;
      padding: 16px 30px !important;
      font-size: 18px !important;
      font-weight: bold !important;
      border: none !important;
      border-radius: 10px !important;
      cursor: pointer !important;
      transition: transform 0.2s !important;
    }
    
    .button-group button:hover {
      transform: scale(1.05) !important;
    }
    
    .save-btn, #saveBtn {
      background: #00c853 !important;
      color: #fff !important;
      border: 2px solid #fff !important;
    }
    
    .clear-btn {
      background: #4a4a4a !important;
      color: #fff !important;
      border: 2px solid #888 !important;
    }
    
    .back-btn {
      background: #2a4a6e !important;
      color: #fff !important;
      border: 2px solid #6a9abe !important;
    }
    
    /* Admin song list - desktop style */
    .admin-song-list {
      max-height: 400px !important;
      overflow-y: auto !important;
      background: #151515 !important;
      border-radius: 10px !important;
      padding: 10px !important;
      margin: 15px 0 !important;
    }
    
    .admin-song-item {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      padding: 15px 20px !important;
      background: #1a1a2e !important;
      border-radius: 8px !important;
      margin-bottom: 8px !important;
      border: 1px solid #2a2a4e !important;
    }
    
    .admin-song-item .song-title {
      font-size: 18px !important;
      font-weight: bold !important;
      color: #fff !important;
    }
    
    .admin-btn-group {
      display: flex !important;
      gap: 12px !important;
    }
    
    .admin-btn-group button {
      padding: 10px 20px !important;
      font-size: 16px !important;
      border: none !important;
      border-radius: 8px !important;
      cursor: pointer !important;
      min-width: 80px !important;
      font-weight: bold !important;
    }
    
    .edit-btn {
      background: #2a4a6e !important;
      color: #fff !important;
    }
    
    .edit-btn:hover {
      background: #3a6a8e !important;
    }
    
    .delete-btn {
      background: #6e2a2a !important;
      color: #fff !important;
    }
    
    .delete-btn:hover {
      background: #8e3a3a !important;
    }
    
    /* Status messages */
    .status-message {
      padding: 15px !important;
      border-radius: 10px !important;
      font-size: 18px !important;
      text-align: center !important;
      margin: 20px 0 !important;
    }
    
    .status-message.success {
      background: rgba(0, 200, 83, 0.2) !important;
      color: #00e676 !important;
      border: 2px solid #00c853 !important;
    }
    
    .status-message.error {
      background: rgba(255, 68, 68, 0.2) !important;
      color: #ff4444 !important;
      border: 2px solid #ff4444 !important;
    }
    
    .status-message.info {
      background: rgba(79, 195, 247, 0.2) !important;
      color: #4fc3f7 !important;
      border: 2px solid #4fc3f7 !important;
    }
    
    /* Headings */
    h2 {
      font-size: 32px !important;
      color: #ffcc00 !important;
    }
    
    .subtitle {
      font-size: 18px !important;
      color: #aaa !important;
      margin-bottom: 30px !important;
    }
    
    label {
      font-size: 18px !important;
      color: #aaa !important;
      display: block !important;
      margin-bottom: 8px !important;
    }
    
    .hint {
      font-size: 14px !important;
      color: #666 !important;
      display: block !important;
      margin-top: 8px !important;
    }
    
    hr {
      border-color: #2a2a4e !important;
      margin: 30px 0 !important;
    }
  </style>
</head>
<body>

<div class="container create-container">
  <div class="app-card">
    <h2>🎼 Manage Songs</h2>
    <p class="subtitle">Create, edit, or delete songs (Desktop Only)</p>
    
    <!-- Song List for Editing/Deleting -->
    <div class="form-group">
      <label>Select a song to edit or delete</label>
      <div id="songListForAdmin" class="admin-song-list"></div>
    </div>
    
    <hr>
    
    <!-- Create/Edit Form -->
    <div class="form-group">
      <label for="songId" style="display: none;">Song ID</label>
      <input id="songId" type="hidden">
      
      <label for="title">Song Title</label>
      <input id="title" placeholder="Enter song title..." class="form-input">
    </div>
    
    <div class="form-group">
      <label for="input">Lyrics with Chords</label>
      <textarea id="input" placeholder="Example: [C]Hello [G]world" class="form-textarea"></textarea>
      <small class="hint">Use [Chord] format. Example: [C]Hello [G]world</small>
    </div>
    
    <!-- BUTTONS - Desktop Only -->
    <div class="button-group">
      <button onclick="saveSong()" id="saveBtn">💾 Save Song</button>
      <button onclick="clearForm()" class="clear-btn">🔄 Clear</button>
      <button onclick="goBack()" class="back-btn">⬅ Back</button>
    </div>
    
    <div id="statusMessage" class="status-message"></div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
  authDomain: "busker-chord-app.firebaseapp.com",
  projectId: "busker-chord-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const titleInput = document.getElementById('title');
const lyricsInput = document.getElementById('input');
const statusMsg = document.getElementById('statusMessage');
const songIdInput = document.getElementById('songId');
const songListAdmin = document.getElementById('songListForAdmin');

function loadSongsForAdmin() {
  songListAdmin.innerHTML = '⏳ Loading songs...';
  db.collection('songs').orderBy('title').get()
    .then((snapshot) => {
      songListAdmin.innerHTML = '';
      if (snapshot.empty) {
        songListAdmin.innerHTML = '📭 No songs found';
        return;
      }
      snapshot.forEach((doc) => {
        const song = doc.data();
        const div = document.createElement('div');
        div.className = 'admin-song-item';
        div.innerHTML = `
          <span class="song-title">${song.title || 'Untitled'}</span>
          <div class="admin-btn-group">
            <button class="edit-btn" onclick="loadSongForEdit('${doc.id}')">✏️ Edit</button>
            <button class="delete-btn" onclick="deleteSong('${doc.id}')">🗑️ Delete</button>
          </div>
        `;
        songListAdmin.appendChild(div);
      });
    })
    .catch(err => {
      songListAdmin.innerHTML = '❌ Error loading songs';
      console.error(err);
    });
}

function loadSongForEdit(songId) {
  db.collection('songs').doc(songId).get()
    .then((doc) => {
      if (doc.exists) {
        const song = doc.data();
        songIdInput.value = songId;
        titleInput.value = song.title || '';
        lyricsInput.value = song.lyrics || song.content || '';
        document.getElementById('saveBtn').textContent = '✏️ Update Song';
        statusMsg.textContent = '✅ Song loaded for editing';
        statusMsg.className = 'status-message success';
      }
    })
    .catch(err => {
      statusMsg.textContent = '❌ Error: ' + err.message;
      statusMsg.className = 'status-message error';
    });
}

function saveSong() {
  const title = titleInput.value.trim();
  const lyrics = lyricsInput.value.trim();
  const songId = songIdInput.value;
  
  if (!title || !lyrics) {
    statusMsg.textContent = '⚠️ Please enter both title and lyrics';
    statusMsg.className = 'status-message error';
    return;
  }
  
  const data = { title, lyrics, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  
  let promise;
  if (songId) {
    promise = db.collection('songs').doc(songId).update(data);
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    promise = db.collection('songs').add(data);
  }
  
  statusMsg.textContent = '⏳ Saving...';
  statusMsg.className = 'status-message info';
  
  promise
    .then(() => {
      statusMsg.textContent = '✅ Song saved successfully!';
      statusMsg.className = 'status-message success';
      if (!songId) { clearForm(); }
      loadSongsForAdmin();
      document.getElementById('saveBtn').textContent = '💾 Save Song';
    })
    .catch(err => {
      statusMsg.textContent = '❌ Error: ' + err.message;
      statusMsg.className = 'status-message error';
    });
}

function deleteSong(songId) {
  if (!confirm('Delete this song?')) return;
  db.collection('songs').doc(songId).delete()
    .then(() => {
      statusMsg.textContent = '✅ Deleted!';
      statusMsg.className = 'status-message success';
      loadSongsForAdmin();
      clearForm();
    })
    .catch(err => {
      statusMsg.textContent = '❌ Delete failed: ' + err.message;
      statusMsg.className = 'status-message error';
    });
}

function clearForm() {
  songIdInput.value = '';
  titleInput.value = '';
  lyricsInput.value = '';
  statusMsg.textContent = '';
  statusMsg.className = 'status-message';
  document.getElementById('saveBtn').textContent = '💾 Save Song';
}

function goBack() {
  window.location.href = "index.html";
}

loadSongsForAdmin();
</script>

</body>
</html>
