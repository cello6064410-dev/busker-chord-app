<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Song Viewer Pro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <h2>🎵 Song Viewer</h2>
      <button onclick="goHome()" class="home-btn" title="Go to Home">🏠</button>
    </div>
    <h3 id="songTitle">No Song Selected</h3>
    <div id="keyDisplay">Key: 0</div>
  </div>

  <!-- LOAD BUTTON -->
  <div class="topbar">
    <button onclick="loadSongs()" id="loadBtn">📂 Load Songs</button>
  </div>

  <!-- SONG LIST -->
  <div id="songList" class="song-list"></div>

  <!-- LYRICS OUTPUT -->
  <div id="output" class="output">Select a song to begin</div>

  <!-- FLOATING CONTROL BAR -->
  <div class="floating-bar">
    <button onclick="transpose(1)" title="Transpose +1">➕</button>
    <button onclick="transpose(-1)" title="Transpose -1">➖</button>
    <button onclick="changeFontSize(2)" title="Increase Font">A+</button>
    <button onclick="changeFontSize(-2)" title="Decrease Font">A-</button>
    <button onclick="toggleScroll()" title="Start/Stop Auto-Scroll" id="playBtn">▶</button>
    <button onclick="stopScroll()" title="Stop Auto-Scroll" id="stopBtn">⏹</button>
    <button onclick="toggleFullscreen()" title="Toggle Fullscreen">⛶</button>
  </div>

</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  // ============================================
  // FIREBASE CONFIGURATION
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<script>
  // ============================================
  // GLOBAL VARIABLES
  // ============================================
  let songs = [];
  let currentSongId = null;
  let currentKey = 0;
  let fontSize = 16;

  // Auto-scroll variables
  let scrollInterval = null;
  let isScrolling = false;
  let scrollSpeed = 0.8;

  // ============================================
  // DOM REFERENCES
  // ============================================
  const songListEl = document.getElementById('songList');
  const outputEl = document.getElementById('output');
  const songTitleEl = document.getElementById('songTitle');
  const keyDisplayEl = document.getElementById('keyDisplay');
  const playBtn = document.getElementById('playBtn');
  const loadBtn = document.getElementById('loadBtn');

  // ============================================
  // LOAD SONGS FROM FIREBASE
  // ============================================
  function loadSongs() {
    loadBtn.disabled = true;
    loadBtn.textContent = '⏳ Loading...';
    songListEl.innerHTML = '<div class="loading-text">⏳ Loading songs...</div>';

    db.collection('songs')
      .orderBy('title')
      .get()
      .then((snapshot) => {
        songs = [];
        songListEl.innerHTML = '';

        if (snapshot.empty) {
          songListEl.innerHTML = `
            <div class="empty-text">
              📭 No songs found<br>
              <small>Go to Admin to create your first song!</small>
            </div>
          `;
          loadBtn.textContent = '📂 Load Songs';
          loadBtn.disabled = false;
          return;
        }

        snapshot.forEach((doc) => {
          const song = { id: doc.id, ...doc.data() };
          songs.push(song);

          const btn = document.createElement('button');
          btn.textContent = song.title || 'Untitled';
          btn.className = 'song-item';
          btn.setAttribute('data-id', song.id);
          btn.onclick = () => selectSong(song.id);
          songListEl.appendChild(btn);
        });

        loadBtn.textContent = '✅ Loaded!';
        setTimeout(() => {
          loadBtn.textContent = '📂 Load Songs';
          loadBtn.disabled = false;
        }, 1500);
      })
      .catch((error) => {
        console.error('Error loading songs:', error);
        songListEl.innerHTML = `
          <div class="error-text">
            ❌ Error loading songs<br>
            <small>${error.message}</small>
          </div>
        `;
        loadBtn.textContent = '🔄 Retry';
        loadBtn.disabled = false;
      });
  }

  // ============================================
  // SELECT AND DISPLAY A SONG
  // ============================================
  function selectSong(songId) {
    stopScroll();

    currentSongId = songId;
    const song = songs.find(s => s.id === songId);

    if (!song) {
      outputEl.textContent = 'Song not found';
      return;
    }

    songTitleEl.textContent = song.title || 'Untitled';

    currentKey = 0;
    keyDisplayEl.textContent = 'Key: 0';

    displaySong(song);
  }

  // ============================================
  // DISPLAY SONG
  // ============================================
  function displaySong(song) {
    let lyrics = song.lyrics || song.content || '';

    if (!lyrics) {
      outputEl.innerHTML = '<div class="no-lyrics">No lyrics available</div>';
      return;
    }

    if (currentKey !== 0) {
      lyrics = transposeLyrics(lyrics, currentKey);
    }

    lyrics = formatChordsAboveLyrics(lyrics);

    outputEl.innerHTML = lyrics;
    outputEl.scrollTop = 0;

    // Apply current font size to new content
    applyFontSize(fontSize);
  }

  // ============================================
  // FORMAT CHORDS ABOVE LYRICS
  // ============================================
  function formatChordsAboveLyrics(text) {
    const lines = text.split('\n');
    const result = [];

    for (let line of lines) {
      if (!line.trim()) {
        result.push('<br>');
        continue;
      }

      const parts = [];
      let current = '';
      let i = 0;

      while (i < line.length) {
        if (line[i] === '[') {
          const j = line.indexOf(']', i);
          if (j !== -1) {
            if (current) {
              parts.push({ type: 'text', content: current });
              current = '';
            }
            parts.push({ type: 'chord', content: line.substring(i + 1, j) });
            i = j + 1;
          } else {
            current += line[i];
            i++;
          }
        } else {
          current += line[i];
          i++;
        }
      }
      if (current) {
        parts.push({ type: 'text', content: current });
      }

      let lyricLine = '';
      const chordMap = [];

      for (let part of parts) {
        if (part.type === 'text') {
          const startPos = lyricLine.length;
          lyricLine += part.content;
          if (chordMap.length > 0 && chordMap[chordMap.length - 1].position === undefined) {
            chordMap[chordMap.length - 1].position = startPos;
          }
        } else if (part.type === 'chord') {
          chordMap.push({
            chord: part.content,
            position: lyricLine.length
          });
        }
      }

      let chordLine = '';
      for (let item of chordMap) {
        const spaces = item.position - chordLine.length;
        if (spaces > 0) {
          chordLine += ' '.repeat(spaces);
        }
        chordLine += item.chord;
      }

      chordLine = chordLine.trimEnd();

      if (chordMap.length > 0) {
        result.push(`<div class="chord-row">${chordLine}</div>`);
      }
      result.push(`<div class="lyric-row">${lyricLine}</div>`);
    }

    return result.join('\n');
  }

  // ============================================
  // TRANSPOSE LYRICS
  // ============================================
  function transposeLyrics(lyrics, steps) {
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

    return lyrics.replace(/\[([^\]]+)\]/g, (match, chord) => {
      let transposed = chord;

      for (let i = 0; i < notes.length; i++) {
        if (chord.startsWith(notes[i])) {
          const newIndex = (i + steps + 12) % 12;
          transposed = notes[newIndex] + chord.substring(notes[i].length);
          break;
        }
      }

      return `[${transposed}]`;
    });
  }

  // ============================================
  // TRANSPOSE FUNCTION
  // ============================================
  function transpose(steps) {
    currentKey += steps;
    keyDisplayEl.textContent = `Key: ${currentKey}`;

    if (currentSongId) {
      const song = songs.find(s => s.id === currentSongId);
      if (song) {
        displaySong(song);
      }
    }
  }

  // ============================================
  // CHANGE FONT SIZE - FIXED
  // ============================================
  function changeFontSize(delta) {
    fontSize = Math.min(32, Math.max(10, fontSize + delta));
    applyFontSize(fontSize);
  }

  function applyFontSize(size) {
    // Set on output container
    outputEl.style.fontSize = size + 'px';
    
    // Set on all chord and lyric rows
    document.querySelectorAll('.chord-row, .lyric-row').forEach(el => {
      el.style.fontSize = size + 'px';
    });
  }

  // ============================================
  // AUTO-SCROLL FUNCTIONS
  // ============================================
  function startScroll() {
    const output = document.getElementById('output');
    
    if (isScrolling) {
      return;
    }
    
    if (!output.innerHTML || output.innerHTML === 'Select a song to begin') {
      return;
    }
    
    if (output.scrollTop + output.clientHeight >= output.scrollHeight - 5) {
      return;
    }
    
    isScrolling = true;
    
    const playBtn = document.getElementById('playBtn');
    if (playBtn) {
      playBtn.textContent = '▶️';
      playBtn.style.background = '#2a5a2e';
    }
    
    output.classList.add('scrolling');
    
    scrollInterval = setInterval(() => {
      const output = document.getElementById('output');
      
      if (output.scrollTop + output.clientHeight >= output.scrollHeight - 5) {
        stopScroll();
        return;
      }
      
      output.scrollTop += scrollSpeed;
    }, 50);
  }

  function stopScroll() {
    if (scrollInterval) {
      clearInterval(scrollInterval);
      scrollInterval = null;
    }
    
    isScrolling = false;
    
    const playBtn = document.getElementById('playBtn');
    if (playBtn) {
      playBtn.textContent = '▶';
      playBtn.style.background = '#1a1a2e';
    }
    
    const output = document.getElementById('output');
    if (output) {
      output.classList.remove('scrolling');
    }
  }

  function toggleScroll() {
    if (isScrolling) {
      stopScroll();
    } else {
      startScroll();
    }
  }

  // ============================================
  // TAP TO STOP
  // ============================================
  function setupTapToStop() {
    const output = document.getElementById('output');
    
    if (!output) {
      return;
    }
    
    output.addEventListener('touchstart', function(e) {
      if (isScrolling) {
        stopScroll();
        e.preventDefault();
      }
    });
    
    output.addEventListener('click', function() {
      if (isScrolling) {
        stopScroll();
      }
    });
  }

  // ============================================
  // TOGGLE FULLSCREEN
  // ============================================
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
    }
  }

  // ============================================
  // KEYBOARD SHORTCUTS
  // ============================================
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Space') {
      e.preventDefault();
      toggleScroll();
    }

    if (e.key === 'ArrowUp' && isScrolling) {
      e.preventDefault();
      scrollSpeed = Math.min(scrollSpeed + 0.3, 3);
    }
    if (e.key === 'ArrowDown' && isScrolling) {
      e.preventDefault();
      scrollSpeed = Math.max(scrollSpeed - 0.3, 0.3);
    }
  });

  // ============================================
  // GO HOME
  // ============================================
  function goHome() {
    window.location.href = "index.html";
  }

  // ============================================
  // INITIALIZE
  // ============================================
  document.addEventListener('DOMContentLoaded', function() {
    setupTapToStop();
    outputEl.style.fontSize = fontSize + 'px';
    loadSongs();
  });

  // ============================================
  // CLEANUP
  // ============================================
  window.addEventListener('beforeunload', function() {
    if (scrollInterval) {
      clearInterval(scrollInterval);
      scrollInterval = null;
    }
  });

  console.log('🎵 Song Viewer Pro loaded!');
  console.log('Controls:');
  console.log('  ▶  - Start auto-scroll');
  console.log('  ⏹  - Stop auto-scroll');
  console.log('  Tap on lyrics - Stop scrolling');
  console.log('  Space bar - Toggle scroll');
  console.log('  ↑/↓ arrows - Adjust scroll speed');
</script>

</body>
</html>
