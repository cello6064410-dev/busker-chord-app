<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Song Viewer Pro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <h2>🎵 Song Viewer</h2>
      <div style="display: flex; gap: 8px; align-items: center;">
        <span id="userName" style="color: #aaa; font-size: 0.8rem; font-family: Arial, sans-serif; display: none;"></span>
        <button onclick="openSongsList()" class="songs-list-btn" title="Songs List" style="background: #2a4a6e; border: none; color: white; padding: 6px 14px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; min-height: 40px; font-family: Arial, sans-serif; display: flex; align-items: center; gap: 6px;">
          📋 Songs List
        </button>
        <button onclick="logoutUser()" class="logout-btn" title="Logout" style="background: #4a2a2a; border: none; color: white; padding: 6px 12px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; min-height: 40px; min-width: 40px;">🚪</button>
        <button onclick="goHome()" class="home-btn" title="Go to Home">🏠</button>
      </div>
    </div>
    <div style="display: flex; justify-content: center; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 4px;">
      <h3 id="songTitle" style="margin:0;">No Song Selected</h3>
      <span id="keyDisplay" style="color: #00ffcc; font-size: 0.9rem; font-family: Arial, sans-serif; background: #1a1a2e; padding: 2px 12px; border-radius: 12px; border: 1px solid #2a2a4e;">Key: 0</span>
      <button onclick="openTransposePopup()" id="transposeBtn" title="Transpose" style="background: #2a2a4e; border: none; color: white; padding: 4px 14px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; min-height: 32px;">🎵 Transpose</button>
    </div>
  </div>

  <!-- LYRICS OUTPUT -->
  <div id="output" class="output" style="flex: 1; height: auto; min-height: 300px;">Loading songs...</div>

  <!-- FLOATING CONTROL BAR -->
  <div class="floating-bar">
    <button onclick="transposeUp()" title="Transpose Up (Sharp)" style="color: #ffcc00; font-weight: bold; font-size: 1.1rem;">♯+</button>
    <button onclick="transposeDown()" title="Transpose Down (Flat)" style="color: #4fc3f7; font-weight: bold; font-size: 1.1rem;">♭−</button>
    <button onclick="changeFontSize(2)" title="Increase Font">A+</button>
    <button onclick="changeFontSize(-2)" title="Decrease Font">A-</button>
    <button onclick="toggleScroll()" title="Start/Stop Auto-Scroll" id="playBtn">▶</button>
    <button onclick="stopScroll()" title="Stop Auto-Scroll" id="stopBtn">⏹</button>
    <button onclick="toggleFullscreen()" title="Toggle Fullscreen">⛶</button>
  </div>

  <!-- TRANSPOSE POPUP MODAL -->
  <div id="transposeModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🎵 Transpose</h2>
        <button onclick="closeTransposePopup()" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-current-key">
          <span>Current Key: </span>
          <span id="modalCurrentKey" style="color: #ffcc00; font-weight: bold;">C / Am</span>
        </div>
        <div class="modal-enharmonic">
          <label class="toggle-switch">
            <input type="checkbox" id="enharmonicToggle" onchange="toggleEnharmonic()">
            <span class="toggle-slider"></span>
          </label>
          <span id="enharmonicLabel" style="color: #888; font-size: 0.9rem;">Enharmonic: OFF</span>
          <span style="color: #666; font-size: 0.8rem; margin-left: 8px;">(6♯/7♯/6♭/7♭ only)</span>
        </div>
        <div id="keyListContainer" class="key-list-container">
          <!-- Key list will be rendered here -->
        </div>
      </div>
      <div class="modal-footer">
        <button onclick="closeTransposePopup()" class="modal-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

<script>
  // ============================================
  // FIREBASE CONFIGURATION
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ============================================
  // GLOBAL VARIABLES
  // ============================================
  let songs = [];
  let currentSongId = null;
  let currentKeyIndex = 7; // Default C = index 7
  let currentKeyMajor = 'C';
  let currentKeyMinor = 'Am';
  let currentKeySignature = '0';
  let fontSize = 16;
  let isEnharmonicMode = false;

  // Auto-scroll variables
  let scrollInterval = null;
  let isScrolling = false;
  let scrollSpeed = 0.4;

  // Auto-logout timer
  let logoutTimer = null;
  const IDLE_TIMEOUT = 30 * 60 * 1000;

  // ============================================
  // CIRCLE OF FIFTHS - WITH SEMITONE MAPPING
  // ============================================
  const circleOfFifths = [
    { id: '7♭',  major: 'C♭', minor: 'A♭m', sig: '7♭',  index: 0, semitone: 11, keySig: '♭' },
    { id: '6♭',  major: 'G♭', minor: 'E♭m', sig: '6♭',  index: 1, semitone: 6, keySig: '♭' },
    { id: '5♭',  major: 'D♭', minor: 'B♭m', sig: '5♭',  index: 2, semitone: 1, keySig: '♭' },
    { id: '4♭',  major: 'A♭', minor: 'Fm',  sig: '4♭',  index: 3, semitone: 8, keySig: '♭' },
    { id: '3♭',  major: 'E♭', minor: 'Cm',  sig: '3♭',  index: 4, semitone: 3, keySig: '♭' },
    { id: '2♭',  major: 'B♭', minor: 'Gm',  sig: '2♭',  index: 5, semitone: 10, keySig: '♭' },
    { id: '1♭',  major: 'F',  minor: 'Dm',  sig: '1♭',  index: 6, semitone: 5, keySig: '♭' },
    { id: '0',   major: 'C',  minor: 'Am',  sig: '0',   index: 7, semitone: 0, keySig: '' },
    { id: '1♯',  major: 'G',  minor: 'Em',  sig: '1♯',  index: 8, semitone: 7, keySig: '♯' },
    { id: '2♯',  major: 'D',  minor: 'Bm',  sig: '2♯',  index: 9, semitone: 2, keySig: '♯' },
    { id: '3♯',  major: 'A',  minor: 'F♯m', sig: '3♯',  index: 10, semitone: 9, keySig: '♯' },
    { id: '4♯',  major: 'E',  minor: 'C♯m', sig: '4♯',  index: 11, semitone: 4, keySig: '♯' },
    { id: '5♯',  major: 'B',  minor: 'G♯m', sig: '5♯',  index: 12, semitone: 11, keySig: '♯' },
    { id: '6♯',  major: 'F♯', minor: 'D♯m', sig: '6♯',  index: 13, semitone: 6, keySig: '♯' },
    { id: '7♯',  major: 'C♯', minor: 'A♯m', sig: '7♯',  index: 14, semitone: 1, keySig: '♯' }
  ];

  const enharmonicMap = {
    '6♯': { targetId: '6♭', label: 'F♯ / G♭' },
    '7♯': { targetId: '5♭', label: 'C♯ / D♭' },
    '6♭': { targetId: '6♯', label: 'G♭ / F♯' },
    '7♭': { targetId: '5♯', label: 'C♭ / B' }
  };

  // ============================================
  // SCALES FOR TRANSPOSE - WITH SYMBOLS ♭ ♯
  // ============================================
  const sharpScale = ['C', 'C♯', 'D', 'D♯', 'E', 'F', 'F♯', 'G', 'G♯', 'A', 'A♯', 'B'];
  const flatScale = ['C', 'D♭', 'D', 'E♭', 'E', 'F', 'G♭', 'G', 'A♭', 'A', 'B♭', 'B'];
  const neutralScale = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

  // ============================================
  // DOM REFERENCES
  // ============================================
  const outputEl = document.getElementById('output');
  const songTitleEl = document.getElementById('songTitle');
  const keyDisplayEl = document.getElementById('keyDisplay');
  const playBtn = document.getElementById('playBtn');
  const userNameEl = document.getElementById('userName');

  const modal = document.getElementById('transposeModal');
  const modalCurrentKey = document.getElementById('modalCurrentKey');
  const keyListContainer = document.getElementById('keyListContainer');
  const enharmonicToggle = document.getElementById('enharmonicToggle');
  const enharmonicLabel = document.getElementById('enharmonicLabel');

  // ============================================
  // HELPER: GET SEMITONE OFFSET
  // ============================================
  function getSemitoneOffset(currentIndex, originalIndex) {
    const current = circleOfFifths[currentIndex];
    const original = circleOfFifths[originalIndex];
    
    let offset = current.semitone - original.semitone;
    
    const diff = currentIndex - originalIndex;
    if (diff > 0) {
      offset = ((offset % 12) + 12) % 12;
    } else if (diff < 0) {
      offset = -(((12 - offset) % 12) || 0);
    }
    
    return offset;
  }

  // ============================================
  // HELPER: Normalize key name
  // ============================================
  function normalizeKeyName(key) {
    if (!key) return 'C';
    return key.replace(/b/g, '♭').replace(/#/g, '♯');
  }

  // ============================================
  // HELPER: Find key data from any format
  // ============================================
  function findKeyData(keyName) {
    if (!keyName) return circleOfFifths[7];
    
    const normalized = normalizeKeyName(keyName);
    
    let found = circleOfFifths.find(k => 
      k.major === normalized || 
      k.minor === normalized
    );
    
    if (!found) {
      const plain = keyName.replace(/[♭♯]/g, '');
      found = circleOfFifths.find(k => 
        k.major.replace(/[♭♯]/g, '') === plain ||
        k.minor.replace(/[♭♯]/g, '') === plain
      );
    }
    
    return found || circleOfFifths[7];
  }

  // ============================================
  // AUTH - CHECK LOGIN STATUS
  // ============================================
  auth.onAuthStateChanged(function(user) {
    if (!user) {
      window.location.href = "login.html";
      return;
    }
    console.log('✅ Logged in as:', user.displayName || user.email);
    if (user.displayName) {
      userNameEl.textContent = '👤 ' + user.displayName;
      userNameEl.style.display = 'inline';
    }
    db.collection('users').doc(user.uid).set({
      lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
      loginCount: firebase.firestore.FieldValue.increment(1)
    }, { merge: true }).catch(err => console.error('Error updating login:', err));
    
    const urlParams = new URLSearchParams(window.location.search);
    const songId = urlParams.get('id');

    if (songId) {
      loadSongsWithCallback(function() {
        const song = songs.find(s => s.id === songId);
        if (song) {
          selectSong(songId);
        } else {
          window.location.href = "songslist.html";
        }
      });
    } else {
      window.location.href = "songslist.html";
    }
  });

  // ============================================
  // LOAD SONGS
  // ============================================
  function loadSongs() {
    outputEl.textContent = '⏳ Loading songs...';

    db.collection('songs')
      .orderBy('title')
      .get()
      .then((snapshot) => {
        songs = [];
        if (snapshot.empty) {
          outputEl.textContent = '📭 No songs found. Go to Admin to create one.';
          return;
        }
        snapshot.forEach((doc) => {
          const song = { id: doc.id, ...doc.data() };
          songs.push(song);
        });
        console.log(`✅ ${songs.length} songs loaded`);
        loadFirstSong();
      })
      .catch((error) => {
        console.error('Error loading songs:', error);
        outputEl.textContent = '❌ Error loading songs. Please refresh.';
      });
  }

  function loadSongsWithCallback(callback) {
    db.collection('songs')
      .orderBy('title')
      .get()
      .then((snapshot) => {
        songs = [];
        if (snapshot.empty) {
          outputEl.textContent = '📭 No songs found. Go to Admin to create one.';
          return;
        }
        snapshot.forEach((doc) => {
          const song = { id: doc.id, ...doc.data() };
          songs.push(song);
        });
        console.log(`✅ ${songs.length} songs loaded`);
        if (callback) callback();
      })
      .catch((error) => {
        console.error('Error loading songs:', error);
        outputEl.textContent = '❌ Error loading songs. Please refresh.';
      });
  }

  function loadFirstSong() {
    if (songs.length > 0) {
      selectSong(songs[0].id);
    } else {
      outputEl.textContent = '📭 No songs available';
    }
  }

  // ============================================
  // OPEN SONGS LIST
  // ============================================
  function openSongsList() {
    window.location.href = "songslist.html";
  }

  // ============================================
  // SELECT SONG - FIXED: Use keyMajor from database
  // ============================================
  function selectSong(songId) {
    stopScroll();
    currentSongId = songId;
    const song = songs.find(s => s.id === songId);
    if (!song) {
      outputEl.textContent = 'Song not found';
      return;
    }
    songTitleEl.textContent = song.title || 'Untitled';

    // FIX: Use keyMajor from database
    const keyName = song.keyMajor || 'C';
    const keyData = findKeyData(keyName);
    
    currentKeyMajor = keyData.major;
    currentKeyMinor = keyData.minor;
    currentKeySignature = keyData.sig;
    currentKeyIndex = keyData.index;

    updateKeyDisplay();
    displaySong(song);
  }

  // ============================================
  // CONVERT CHORD SYMBOLS
  // ============================================
  function convertChordSymbols(text) {
    text = text.replace(/<br>/g, '<<BR>>');
    text = text.replace(/m7b5/g, 'ø');
    text = text.replace(/dim/g, '°');
    text = text.replace(/#/g, '♯');
    text = text.replace(/b/g, '♭');
    text = text.replace(/<<BR>>/g, '<br>');
    return text;
  }

  // ============================================
  // SLASH CHORD STYLING - ADDED
  // ============================================
  function applySlashChordStyling(html) {
    const chordRows = html.match(/<div class="chord-row">.*?<\/div>/g);
    if (!chordRows) return html;
    
    chordRows.forEach(row => {
      const styledRow = row.replace(/([A-G][♯♭]?)(maj7|m7|m|dim|aug|sus[24]|add[0-9])?\/?([A-G][♯♭]?)?/g, (match, root, quality, bass) => {
        if (bass) {
          return `<span class="slash-chord">${root}${quality || ''}<span class="bass-note">/${bass}</span></span>`;
        }
        return match;
      });
      html = html.replace(row, styledRow);
    });
    
    return html;
  }

  // ============================================
  // TRANSPOSE SINGLE NOTE
  // ============================================
  function transposeSingleNote(noteWithQuality, scale, steps) {
    const rootMatch = noteWithQuality.match(/^[A-G][♯♭]?/);
    if (!rootMatch) return noteWithQuality;
    
    const root = rootMatch[0];
    const quality = noteWithQuality.substring(root.length);
    
    let index = scale.indexOf(root);
    if (index === -1) {
      const altRoot = root.replace('♯', '#').replace('♭', 'b');
      index = scale.indexOf(altRoot);
    }
    
    if (index === -1) {
      const neutralIndex = neutralScale.indexOf(root);
      if (neutralIndex === -1) return noteWithQuality;
      const newIndex = (neutralIndex + steps) % 12;
      return neutralScale[newIndex] + quality;
    }
    
    const newIndex = (index + steps) % 12;
    return scale[newIndex] + quality;
  }

  // ============================================
  // TRANSPOSE LYRICS BY SEMITONE
  // ============================================
  function transposeLyricsBySemitone(lyrics, semitoneOffset) {
    const steps = ((semitoneOffset % 12) + 12) % 12;
    
    const targetKeyData = circleOfFifths[currentKeyIndex];
    const useSharp = targetKeyData.keySig === '♯';
    const scale = useSharp ? sharpScale : flatScale;
    
    return lyrics.replace(/\[([^\]]+)\]/g, (match, chord) => {
      const parts = chord.split('/');
      const rootChord = parts[0];
      const bassNote = parts.length > 1 ? parts[1] : null;
      
      let transposedRoot = transposeSingleNote(rootChord, scale, steps);
      
      let transposedBass = null;
      if (bassNote) {
        transposedBass = transposeSingleNote(bassNote, scale, steps);
      }
      
      if (transposedBass) {
        return `[${transposedRoot}/${transposedBass}]`;
      }
      return `[${transposedRoot}]`;
    });
  }

  // ============================================
  // DISPLAY SONG - FIXED: Use keyMajor from database
  // ============================================
  function displaySong(song) {
    let lyrics = song.lyrics || song.content || '';
    if (!lyrics) {
      outputEl.innerHTML = '<div class="no-lyrics">No lyrics available</div>';
      return;
    }
    
    // FIX: Use keyMajor from database
    const keyName = song.keyMajor || 'C';
    const originalKeyData = findKeyData(keyName);
    const originalIndex = originalKeyData.index;
    
    const semitoneOffset = getSemitoneOffset(currentKeyIndex, originalIndex);
    
    if (semitoneOffset !== 0) {
      lyrics = transposeLyricsBySemitone(lyrics, semitoneOffset);
    }
    
    lyrics = formatChordsAboveLyrics(lyrics);
    lyrics = convertChordSymbols(lyrics);
    lyrics = applySlashChordStyling(lyrics);
    
    outputEl.innerHTML = lyrics;
    outputEl.scrollTop = 0;
    applyFontSize(fontSize);
  }

  // ============================================
  // UPDATE KEY DISPLAY
  // ============================================
  function updateKeyDisplay() {
    const keyData = circleOfFifths[currentKeyIndex];
    const sigDisplay = keyData.sig.replace('#', '♯').replace('b', '♭');
    keyDisplayEl.textContent = `Key: ${keyData.major} / ${keyData.minor} (${sigDisplay})`;
    modalCurrentKey.textContent = `${keyData.major} / ${keyData.minor}`;
  }

  // ============================================
  // TRANSPOSE FUNCTIONS
  // ============================================
  function transposeUp() {
    let newIndex = currentKeyIndex + 1;
    if (newIndex >= circleOfFifths.length) newIndex = circleOfFifths.length - 1;
    applyTranspose(newIndex);
  }

  function transposeDown() {
    let newIndex = currentKeyIndex - 1;
    if (newIndex < 0) newIndex = 0;
    applyTranspose(newIndex);
  }

  function applyTranspose(newIndex) {
    currentKeyIndex = newIndex;
    const keyData = circleOfFifths[currentKeyIndex];
    currentKeyMajor = keyData.major;
    currentKeyMinor = keyData.minor;
    currentKeySignature = keyData.sig;
    
    updateKeyDisplay();
    if (currentSongId) {
      const song = songs.find(s => s.id === currentSongId);
      if (song) displaySong(song);
    }
  }

  // ============================================
  // TRANSPOSE POPUP
  // ============================================
  function openTransposePopup() {
    modal.style.display = 'flex';
    renderKeyList();
    updateModalEnharmonicState();
  }

  function closeTransposePopup() {
    modal.style.display = 'none';
  }

  function renderKeyList() {
    keyListContainer.innerHTML = '';
    let keysToRender = circleOfFifths;

    if (isEnharmonicMode) {
      keysToRender = circleOfFifths.map(k => {
        if (enharmonicMap[k.id]) {
          const target = enharmonicMap[k.id];
          const targetData = circleOfFifths.find(k2 => k2.id === target.targetId);
          if (targetData) {
            return { ...k, major: targetData.major, minor: targetData.minor, id: k.id + '_enh' };
          }
        }
        return k;
      });
    }

    keysToRender.forEach((key) => {
      const div = document.createElement('div');
      div.className = 'key-item';
      const isCurrent = key.id === circleOfFifths[currentKeyIndex].id ||
                        (enharmonicMap[key.id] && isEnharmonicMode);
      if (isCurrent) {
        div.classList.add('highlight-key');
      }
      const sigDisplay = key.sig.replace('#', '♯').replace('b', '♭');
      let label = `${sigDisplay}  ${key.major} / ${key.minor}`;
      if (enharmonicMap[key.id] && isEnharmonicMode) {
        const target = enharmonicMap[key.id];
        const targetData = circleOfFifths.find(k => k.id === target.targetId);
        if (targetData) {
          label += ` (${targetData.major} / ${targetData.minor})`;
        }
      }
      div.textContent = label;
      div.dataset.keyId = key.id;
      div.onclick = () => selectKey(key.id);
      keyListContainer.appendChild(div);
    });
  }

  function selectKey(keyId) {
    let keyData = circleOfFifths.find(k => k.id === keyId);
    if (!keyData) return;

    let selectedMajor = keyData.major;
    let selectedMinor = keyData.minor;
    let selectedSig = keyData.sig;
    let selectedIndex = keyData.index;

    if (isEnharmonicMode && enharmonicMap[keyId]) {
      const target = enharmonicMap[keyId];
      const targetData = circleOfFifths.find(k => k.id === target.targetId);
      if (targetData) {
        selectedMajor = targetData.major;
        selectedMinor = targetData.minor;
        selectedSig = targetData.sig;
        selectedIndex = targetData.index;
      }
    }

    currentKeyMajor = selectedMajor;
    currentKeyMinor = selectedMinor;
    currentKeySignature = selectedSig;
    currentKeyIndex = selectedIndex;
    updateKeyDisplay();

    if (currentSongId) {
      const song = songs.find(s => s.id === currentSongId);
      if (song) displaySong(song);
    }

    closeTransposePopup();
  }

  function toggleEnharmonic() {
    isEnharmonicMode = enharmonicToggle.checked;
    enharmonicLabel.textContent = `Enharmonic: ${isEnharmonicMode ? 'ON' : 'OFF'}`;
    renderKeyList();
    updateKeyDisplay();
    if (currentSongId) {
      const song = songs.find(s => s.id === currentSongId);
      if (song) displaySong(song);
    }
  }

  function updateModalEnharmonicState() {
    const sig = currentKeySignature;
    const isActive = ['6♯', '7♯', '6♭', '7♭'].includes(sig);
    enharmonicToggle.disabled = !isActive;
    if (!isActive) {
      enharmonicToggle.checked = false;
      isEnharmonicMode = false;
      enharmonicLabel.textContent = 'Enharmonic: OFF (not available)';
    } else {
      enharmonicLabel.textContent = `Enharmonic: ${isEnharmonicMode ? 'ON' : 'OFF'}`;
    }
  }

  // ============================================
  // FORMAT CHORDS ABOVE LYRICS
  // ============================================
  function formatChordsAboveLyrics(text) {
    const lines = text.split('\n');
    const result = [];
    for (let line of lines) {
      if (!line.trim()) {
        result.push('<br>');
        continue;
      }
      const parts = [];
      let current = '';
      let i = 0;
      while (i < line.length) {
        if (line[i] === '[') {
          const j = line.indexOf(']', i);
          if (j !== -1) {
            if (current) {
              parts.push({ type: 'text', content: current });
              current = '';
            }
            parts.push({ type: 'chord', content: line.substring(i + 1, j) });
            i = j + 1;
          } else {
            current += line[i];
            i++;
          }
        } else {
          current += line[i];
          i++;
        }
      }
      if (current) {
        parts.push({ type: 'text', content: current });
      }
      let lyricLine = '';
      const chordMap = [];
      for (let part of parts) {
        if (part.type === 'text') {
          const startPos = lyricLine.length;
          lyricLine += part.content;
          if (chordMap.length > 0 && chordMap[chordMap.length - 1].position === undefined) {
            chordMap[chordMap.length - 1].position = startPos;
          }
        } else if (part.type === 'chord') {
          chordMap.push({
            chord: part.content,
            position: lyricLine.length
          });
        }
      }
      let chordLine = '';
      for (let item of chordMap) {
        const spaces = item.position - chordLine.length;
        if (spaces > 0) {
          chordLine += ' '.repeat(spaces);
        }
        chordLine += item.chord;
      }
      chordLine = chordLine.trimEnd();
      if (chordMap.length > 0) {
        result.push(`<div class="chord-row">${chordLine}</div>`);
      }
      result.push(`<div class="lyric-row">${lyricLine}</div>`);
    }
    return result.join('\n');
  }

  // ============================================
  // FONT SIZE
  // ============================================
  function changeFontSize(delta) {
    fontSize = Math.min(32, Math.max(10, fontSize + delta));
    applyFontSize(fontSize);
  }

  function applyFontSize(size) {
    outputEl.style.fontSize = size + 'px';
    document.querySelectorAll('.chord-row, .lyric-row').forEach(el => {
      el.style.fontSize = size + 'px';
    });
  }

  // ============================================
  // AUTO-SCROLL
  // ============================================
  function startScroll() {
    if (isScrolling) return;
    if (!outputEl.innerHTML || outputEl.innerHTML === 'No Song Selected' || outputEl.innerHTML === 'Loading songs...') return;
    if (outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 5) return;
    isScrolling = true;
    if (playBtn) {
      playBtn.textContent = '▶️';
      playBtn.style.background = '#2a5a2e';
    }
    outputEl.classList.add('scrolling');
    scrollInterval = setInterval(() => {
      if (outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 5) {
        stopScroll();
        return;
      }
      outputEl.scrollTop += scrollSpeed;
    }, 50);
  }

  function stopScroll() {
    if (scrollInterval) {
      clearInterval(scrollInterval);
      scrollInterval = null;
    }
    isScrolling = false;
    if (playBtn) {
      playBtn.textContent = '▶';
      playBtn.style.background = '#1a1a2e';
    }
    if (outputEl) {
      outputEl.classList.remove('scrolling');
    }
  }

  function toggleScroll() {
    if (isScrolling) {
      stopScroll();
    } else {
      startScroll();
    }
  }

  // ============================================
  // TAP TO STOP
  // ============================================
  function setupTapToStop() {
    if (!outputEl) return;
    let touchStartY = 0;
    let isSwiping = false;
    outputEl.addEventListener('touchstart', function(e) {
      touchStartY = e.touches[0].clientY;
      isSwiping = false;
    }, { passive: true });
    outputEl.addEventListener('touchmove', function(e) {
      const touchEndY = e.touches[0].clientY;
      const diff = touchStartY - touchEndY;
      if (Math.abs(diff) > 10) {
        isSwiping = true;
      }
    }, { passive: true });
    outputEl.addEventListener('touchend', function(e) {
      if (!isSwiping && isScrolling) {
        stopScroll();
        e.preventDefault();
      }
    }, { passive: true });
    outputEl.addEventListener('click', function() {
      if (isScrolling) {
        stopScroll();
      }
    });
  }

  // ============================================
  // FULLSCREEN
  // ============================================
  function toggleFullscreen() {
    const app = document.querySelector('.app');
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
      app.classList.add('fullscreen-mode');
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
      app.classList.remove('fullscreen-mode');
    }
  }

  document.addEventListener('fullscreenchange', function() {
    const app = document.querySelector('.app');
    if (!document.fullscreenElement) {
      app.classList.remove('fullscreen-mode');
    }
  });

  // ============================================
  // AUTO-LOGOUT
  // ============================================
  function resetLogoutTimer() {
    if (logoutTimer) clearTimeout(logoutTimer);
    logoutTimer = setTimeout(function() {
      console.log('⏰ Auto-logout: Idle for 30 minutes');
      logoutUser();
    }, IDLE_TIMEOUT);
  }

  function setupIdleTimer() {
    const events = ['mousemove', 'mousedown', 'click', 'scroll', 'touchstart', 'keydown'];
    events.forEach(event => {
      document.addEventListener(event, resetLogoutTimer);
    });
    resetLogoutTimer();
  }

  function logoutUser() {
    if (logoutTimer) clearTimeout(logoutTimer);
    stopScroll();
    auth.signOut().then(() => {
      window.location.href = "login.html";
    }).catch(() => {
      window.location.href = "login.html";
    });
  }

  // ============================================
  // GO HOME
  // ============================================
  function goHome() {
    window.location.href = "index.html";
  }

  // ============================================
  // KEYBOARD SHORTCUTS
  // ============================================
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Space') {
      e.preventDefault();
      toggleScroll();
    }
    if (e.key === 'ArrowUp' && isScrolling) {
      e.preventDefault();
      scrollSpeed = Math.min(scrollSpeed + 0.3, 3);
    }
    if (e.key === 'ArrowDown' && isScrolling) {
      e.preventDefault();
      scrollSpeed = Math.max(scrollSpeed - 0.3, 0.3);
    }
    if (e.key === 'Escape') {
      if (modal.style.display === 'flex') {
        closeTransposePopup();
      }
    }
  });

  // ============================================
  // INITIALIZE
  // ============================================
  document.addEventListener('DOMContentLoaded', function() {
    setupTapToStop();
    outputEl.style.fontSize = fontSize + 'px';
    setupIdleTimer();
    modal.addEventListener('click', function(e) {
      if (e.target === modal) {
        closeTransposePopup();
      }
    });
  });

  // ============================================
  // CLEANUP
  // ============================================
  window.addEventListener('beforeunload', function() {
    if (scrollInterval) {
      clearInterval(scrollInterval);
      scrollInterval = null;
    }
    if (logoutTimer) {
      clearTimeout(logoutTimer);
      logoutTimer = null;
    }
  });

  console.log('🎵 Song Viewer Pro loaded!');
  console.log('✅ Key signature loads from keyMajor field in database');
  console.log('✅ Slash chord styling added');
  console.log('✅ Transpose system FIXED with proper semitone mapping');
  console.log('Controls:');
  console.log('  ⬆  - Transpose Up');
  console.log('  ⬇  - Transpose Down');
  console.log('  🎵 Transpose - Open key selector');
  console.log('  ▶  - Start auto-scroll');
  console.log('  ⏹  - Stop auto-scroll');
  console.log('  Tap (not swipe) on lyrics - Stop scrolling');
  console.log('  Space bar - Toggle scroll');
  console.log('  ↑/↓ arrows - Adjust scroll speed');
  console.log('  📋 Songs List - Open songs list');
  console.log('  ⛶ Fullscreen - Only lyrics & chords');
</script>
