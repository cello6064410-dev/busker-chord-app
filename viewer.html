<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">

      <div style="display: flex; gap: 8px; align-items: center;">
        <span id="userName" style="color: #aaa; font-size: 0.8rem; font-family: Arial, sans-serif; display: none;"></span>
        <button onclick="logoutUser()" class="logout-btn" title="Logout" style="background: #4a2a2a; border: none; color: white; padding: 6px 12px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; min-height: 40px; min-width: 40px;">≡اأز</button>
        <button onclick="goHome()" class="home-btn" title="Go to Home">≡اب</button>

  <!-- SEARCH BAR -->

  <!-- LYRICS OUTPUT -->
  <div id="output" class="output">Loading songs...</div>

  <!-- LINK TO ALL SONGS LIST -->
  <div style="text-align: center; padding: 8px 0; flex-shrink: 0;">
    <a href="list.html" style="color: #4fc3f7; font-family: Arial, sans-serif; font-size: 0.9rem; text-decoration: none; padding: 8px 16px; background: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4e; display: inline-block;">
      ≡اôï All Songs
    </a>
  </div>

  <!-- FLOATING CONTROL BAR -->
  <div class="floating-bar">

    <button onclick="transposeSemitone(-1)" title="Transpose -1 Semitone (Flat)">ظئû</button>
    <button onclick="changeFontSize(2)" title="Increase Font">A+</button>
    <button onclick="changeFontSize(-2)" title="Decrease Font">A-</button>
    <button onclick="toggleScroll()" title="Start/Stop Auto-Scroll" id="playBtn">ظû╢</button>
    <button onclick="stopScroll()" title="Stop Auto-Scroll" id="stopBtn">ظ╣</button>
    <button onclick="toggleFullscreen()" title="Toggle Fullscreen">ظؤ╢</button>

</div>

<!-- TRANSPOSE POPUP MODAL -->
<div id="transposeModal" class="modal-overlay" style="display:none;">
  <div class="modal-content">
    <div class="modal-header">
      <h2>≡ا╡ Transpose</h2>
      <button onclick="closeTransposePopup()" class="modal-close">ظ£ـ</button>
    </div>
    <div class="modal-body">
      <div class="modal-current-key">
        <span>Current Key: </span>
        <span id="modalCurrentKey" style="color: #ffcc00; font-weight: bold;">C / Am</span>

      <div class="modal-enharmonic">

    </div>

</div>
<script>
  // ============================================
  // FIREBASE CONFIGURATION
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ============================================
  // GLOBAL VARIABLES
  // ============================================
  let songs = [];
  let filteredSongs = [];
  let currentSongId = null;
  let currentKey = 0;
  let currentKeyMajor = 'C';
  let currentKeyMinor = 'Am';
  let currentKeySignature = '0';
  let fontSize = 16;
  let isEnharmonicMode = false;

  // Auto-scroll variables
  let scrollInterval = null;
  let isScrolling = false;
  let scrollSpeed = 0.4;

  // Auto-logout timer
  let logoutTimer = null;
  const IDLE_TIMEOUT = 30 * 60 * 1000;

  // Search results limit
  const MAX_SEARCH_RESULTS = 10;
  const DISPLAY_RESULTS = 5;

  // ============================================
  // KEY SIGNATURE DATA
  // ============================================
  const allKeys = [
    { id: '1ظآص',  major: 'F',  minor: 'Dm',  sig: '1ظآص' },
    { id: '2ظآص',  major: 'Bظآص', minor: 'Gm',  sig: '2ظآص' },
    { id: '3ظآص',  major: 'Eظآص', minor: 'Cm',  sig: '3ظآص' },
    { id: '4ظآص',  major: 'Aظآص', minor: 'Fm',  sig: '4ظآص' },
    { id: '5ظآص',  major: 'Dظآص', minor: 'Bظآصm', sig: '5ظآص' },
    { id: '6ظآص',  major: 'Gظآص', minor: 'Eظآصm', sig: '6ظآص' },
    { id: '7ظآص',  major: 'Cظآص', minor: 'Aظآصm', sig: '7ظآص' },
    { id: '0',   major: 'C',  minor: 'Am',  sig: '0' },
    { id: '1ظآ»',  major: 'G',  minor: 'Em',  sig: '1ظآ»' },
    { id: '2ظآ»',  major: 'D',  minor: 'Bm',  sig: '2ظآ»' },
    { id: '3ظآ»',  major: 'A',  minor: 'Fظآ»m', sig: '3ظآ»' },
    { id: '4ظآ»',  major: 'E',  minor: 'Cظآ»m', sig: '4ظآ»' },
    { id: '5ظآ»',  major: 'B',  minor: 'Gظآ»m', sig: '5ظآ»' },
    { id: '6ظآ»',  major: 'Fظآ»', minor: 'Dظآ»m', sig: '6ظآ»' },
    { id: '7ظآ»',  major: 'Cظآ»', minor: 'Aظآ»m', sig: '7ظآ»' }
  ];

  const enharmonicMap = {
    '6ظآ»': { targetId: '6ظآص', label: 'Fظآ» / Gظآص' },
    '7ظآ»': { targetId: '5ظآص', label: 'Cظآ» / Dظآص' },
    '6ظآص': { targetId: '6ظآ»', label: 'Gظآص / Fظآ»' },
    '7ظآص': { targetId: '5ظآ»', label: 'Cظآص / B' }
  };

  const keyMap = {
    'C':  { sig: '0',  minor: 'Am' },
    'G':  { sig: '1ظآ»', minor: 'Em' },
    'D':  { sig: '2ظآ»', minor: 'Bm' },
    'A':  { sig: '3ظآ»', minor: 'Fظآ»m' },
    'E':  { sig: '4ظآ»', minor: 'Cظآ»m' },
    'B':  { sig: '5ظآ»', minor: 'Gظآ»m' },
    'Fظآ»': { sig: '6ظآ»', minor: 'Dظآ»m' },
    'Cظآ»': { sig: '7ظآ»', minor: 'Aظآ»m' },
    'F':  { sig: '1ظآص', minor: 'Dm' },
    'Bظآص': { sig: '2ظآص', minor: 'Gm' },
    'Eظآص': { sig: '3ظآص', minor: 'Cm' },
    'Aظآص': { sig: '4ظآص', minor: 'Fm' },
    'Dظآص': { sig: '5ظآص', minor: 'Bظآصm' },
    'Gظآص': { sig: '6ظآص', minor: 'Eظآصm' },
    'Cظآص': { sig: '7ظآص', minor: 'Aظآصm' }
  };

  const sigToKey = {
    '0':  { major: 'C',  minor: 'Am' },
    '1ظآ»': { major: 'G',  minor: 'Em' },
    '2ظآ»': { major: 'D',  minor: 'Bm' },
    '3ظآ»': { major: 'A',  minor: 'Fظآ»m' },
    '4ظآ»': { major: 'E',  minor: 'Cظآ»m' },
    '5ظآ»': { major: 'B',  minor: 'Gظآ»m' },
    '6ظآ»': { major: 'Fظآ»', minor: 'Dظآ»m' },
    '7ظآ»': { major: 'Cظآ»', minor: 'Aظآ»m' },
    '1ظآص': { major: 'F',  minor: 'Dm' },
    '2ظآص': { major: 'Bظآص', minor: 'Gm' },
    '3ظآص': { major: 'Eظآص', minor: 'Cm' },
    '4ظآص': { major: 'Aظآص', minor: 'Fm' },
    '5ظآص': { major: 'Dظآص', minor: 'Bظآصm' },
    '6ظآص': { major: 'Gظآص', minor: 'Eظآصm' },
    '7ظآص': { major: 'Cظآص', minor: 'Aظآصm' }
  };

  // ============================================
  // DOM REFERENCES
  // ============================================
  const songListEl = document.getElementById('songList');
  const outputEl = document.getElementById('output');
  const songTitleEl = document.getElementById('songTitle');
  const keyDisplayEl = document.getElementById('keyDisplay');
  const playBtn = document.getElementById('playBtn');
  const searchInput = document.getElementById('searchInput');
  const clearSearchBtn = document.getElementById('clearSearchBtn');
  const userNameEl = document.getElementById('userName');

  const modal = document.getElementById('transposeModal');
  const modalCurrentKey = document.getElementById('modalCurrentKey');
  const keyListContainer = document.getElementById('keyListContainer');
  const enharmonicToggle = document.getElementById('enharmonicToggle');
  const enharmonicLabel = document.getElementById('enharmonicLabel');

  // ============================================
  // AUTH - CHECK LOGIN STATUS
  // ============================================
  auth.onAuthStateChanged(function(user) {
    if (!user) {
      window.location.href = "login.html";
      return;
    }
    console.log('ظ£à Logged in as:', user.displayName || user.email);
    if (user.displayName) {
      userNameEl.textContent = '≡اّج ' + user.displayName;
      userNameEl.style.display = 'inline';
    }
    db.collection('users').doc(user.uid).set({
      lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
      loginCount: firebase.firestore.FieldValue.increment(1)
    }, { merge: true }).catch(err => console.error('Error updating login:', err));
    loadSongs();
  });

  // ============================================
  // AUTO-LOGOUT
  // ============================================
  function resetLogoutTimer() {
    if (logoutTimer) clearTimeout(logoutTimer);
    logoutTimer = setTimeout(function() {
      console.log('ظ░ Auto-logout: Idle for 30 minutes');
      logoutUser();
    }, IDLE_TIMEOUT);
  }

  function setupIdleTimer() {
    const events = ['mousemove', 'mousedown', 'click', 'scroll', 'touchstart', 'keydown'];
    events.forEach(event => {
      document.addEventListener(event, resetLogoutTimer);
    });
    resetLogoutTimer();
  }

  function logoutUser() {
    if (logoutTimer) clearTimeout(logoutTimer);
    stopScroll();
    auth.signOut().then(() => {
      window.location.href = "login.html";
    }).catch(() => {
      window.location.href = "login.html";
    });
  }

  // ============================================
  // LOAD SONGS
  // ============================================
  function loadSongs() {
    outputEl.textContent = 'ظ│ Loading songs...';
    songListEl.innerHTML = '<div class="loading-text">ظ│ Loading songs...</div>';

    db.collection('songs')
      .orderBy('title')
      .get()
      .then((snapshot) => {
        songs = [];
        songListEl.innerHTML = '';
        if (snapshot.empty) {
          outputEl.textContent = '≡اôص No songs found. Go to Admin to create one.';
          songListEl.innerHTML = `
            <div class="empty-text">
              ≡اôص No songs found<br>
              <small>Go to Admin to create your first song!</small>
            </div>
          `;
          return;
        }
        snapshot.forEach((doc) => {
          const song = { id: doc.id, ...doc.data() };
          songs.push(song);
        });
        outputEl.textContent = 'Select a song to begin';
        songListEl.innerHTML = `
          <div class="empty-text">
            ≡ا¤ Type a song title to search
          </div>
        `;
        console.log(`ظ£à ${songs.length} songs loaded`);
      })
      .catch((error) => {
        console.error('Error loading songs:', error);
        outputEl.textContent = 'ظإî Error loading songs. Please refresh.';
        songListEl.innerHTML = `
          <div class="error-text">
            ظإî Error loading songs<br>
            <small>${error.message}</small>
          </div>
        `;
      });
  }

  // ============================================
  // SEARCH / FILTER
  // ============================================
  function filterSongs() {
    const query = searchInput.value.toLowerCase().trim();
    if (query.length > 0) {
      clearSearchBtn.style.display = 'block';
    } else {
      clearSearchBtn.style.display = 'none';
    }
    if (query === '') {
      songListEl.innerHTML = `
        <div class="empty-text">
          ≡ا¤ Type a song title to search
        </div>
      `;
      return;
    }
    const results = songs.filter(song =>
      song.title && song.title.toLowerCase().includes(query)
    );
    const limitedResults = results.slice(0, MAX_SEARCH_RESULTS);
    renderSongList(limitedResults, results.length);
  }

  function renderSongList(results, totalFound) {
    songListEl.innerHTML = '';
    if (results.length === 0) {
      songListEl.innerHTML = `
        <div class="empty-text">
          ≡ا¤ No songs found matching "<span id="searchTerm">${searchInput.value}</span>"
        </div>
      `;
      return;
    }
    const resultCount = document.createElement('div');
    resultCount.className = 'result-count';
    resultCount.textContent = `Showing ${results.length} of ${totalFound} results`;
    songListEl.appendChild(resultCount);
    const displayResults = results.slice(0, DISPLAY_RESULTS);
    const hiddenResults = results.slice(DISPLAY_RESULTS);
    displayResults.forEach((song) => {
      const btn = createSongButton(song);
      songListEl.appendChild(btn);
    });
    if (hiddenResults.length > 0) {
      const hint = document.createElement('div');
      hint.className = 'scroll-hint';
      hint.textContent = `ظشçي╕ ${hiddenResults.length} more results (scroll down)`;
      songListEl.appendChild(hint);
      hiddenResults.forEach((song) => {
        const btn = createSongButton(song);
        btn.className += ' hidden-result';
        songListEl.appendChild(btn);
      });
    }
  }

  function createSongButton(song) {
    const btn = document.createElement('button');
    btn.textContent = song.title || 'Untitled';
    btn.className = 'song-item';
    btn.setAttribute('data-id', song.id);
    btn.onclick = () => selectSong(song.id);
    return btn;
  }

  function clearSearch() {
    searchInput.value = '';
    clearSearchBtn.style.display = 'none';
    songListEl.innerHTML = `
      <div class="empty-text">
        ≡ا¤ Type a song title to search
      </div>
    `;
    searchInput.focus();
  }

  // ============================================
  // SELECT SONG
  // ============================================
  function selectSong(songId) {
    stopScroll();
    currentSongId = songId;
    const song = songs.find(s => s.id === songId);
    if (!song) {
      outputEl.textContent = 'Song not found';
      return;
    }
    songTitleEl.textContent = song.title || 'Untitled';

    if (song.keyMajor && song.keyMinor) {
      currentKeyMajor = song.keyMajor;
      currentKeyMinor = song.keyMinor;
      currentKeySignature = song.keySignature || '0';
    } else {
      const sig = song.keySignature || '0';
      const keyData = sigToKey[sig] || { major: 'C', minor: 'Am' };
      currentKeyMajor = keyData.major;
      currentKeyMinor = keyData.minor;
      currentKeySignature = sig;
    }

    currentKey = 0;
    updateKeyDisplay();
    displaySong(song);
  }

  // ============================================
  // DISPLAY SONG
  // ============================================
  function displaySong(song) {
    let lyrics = song.lyrics || song.content || '';
    if (!lyrics) {
      outputEl.innerHTML = '<div class="no-lyrics">No lyrics available</div>';
      return;
    }
    if (currentKey !== 0) {
      lyrics = transposeLyricsBySemitone(lyrics, currentKey);
    }
    lyrics = formatChordsAboveLyrics(lyrics);
    outputEl.innerHTML = lyrics;
    outputEl.scrollTop = 0;
    applyFontSize(fontSize);
  }

  // ============================================
  // UPDATE KEY DISPLAY
  // ============================================
  function updateKeyDisplay() {
    const displayKey = getDisplayKey();
    keyDisplayEl.textContent = `Key: ${displayKey}`;
    modalCurrentKey.textContent = displayKey;
  }

  function getDisplayKey() {
    let major = currentKeyMajor;
    let minor = currentKeyMinor;

    if (isEnharmonicMode) {
      const sig = currentKeySignature;
      if (enharmonicMap[sig]) {
        const target = enharmonicMap[sig];
        const targetData = allKeys.find(k => k.id === target.targetId);
        if (targetData) {
          major = targetData.major;
          minor = targetData.minor;
        }
      }
    }

    const offset = currentKey;
    if (offset === 0) {
      return `${major} / ${minor}`;
    }
    return `${major} / ${minor} ${offset > 0 ? '+' : ''}${offset}`;
  }

  // ============================================
  // TRANSPOSE FUNCTIONS
  // ============================================
  function transposeSemitone(steps) {
    currentKey += steps;
    updateKeyDisplay();
    if (currentSongId) {
      const song = songs.find(s => s.id === currentSongId);
      if (song) displaySong(song);
    }
  }

  function transposeLyricsBySemitone(lyrics, steps) {
    const sharpScale = ['C', 'Cظآ»', 'D', 'Dظآ»', 'E', 'F', 'Fظآ»', 'G', 'Gظآ»', 'A', 'Aظآ»', 'B'];
    const flatScale = ['C', 'Dظآص', 'D', 'Eظآص', 'E', 'F', 'Gظآص', 'G', 'Aظآص', 'A', 'Bظآص', 'B'];

    const useSharp = steps >= 0;
    const scale = useSharp ? sharpScale : flatScale;
    const semitoneSteps = ((steps % 12) + 12) % 12;

    return lyrics.replace(/\[([^\]]+)\]/g, (match, chord) => {
      let transposed = chord;
      for (let i = 0; i < scale.length; i++) {
        const root = scale[i];
        if (chord.startsWith(root)) {
          const newIndex = (i + semitoneSteps + 12) % 12;
          const newRoot = scale[newIndex];
          const quality = chord.substring(root.length);
          transposed = newRoot + quality;
          break;
        }
      }
      transposed = transposed.replace('Eظآ»', 'F');
      transposed = transposed.replace('Bظآ»', 'C');
      transposed = transposed.replace('Fظآص', 'E');
      transposed = transposed.replace('Cظآص', 'B');
      return `[${transposed}]`;
    });
  }

  // ============================================
  // TRANSPOSE POPUP
  // ============================================
  function openTransposePopup() {
    modal.style.display = 'flex';
    renderKeyList();
    updateModalEnharmonicState();
  }

  function closeTransposePopup() {
    modal.style.display = 'none';
  }

  function renderKeyList() {
    keyListContainer.innerHTML = '';
    let keysToRender = allKeys;

    if (isEnharmonicMode) {
      keysToRender = allKeys.map(k => {
        if (enharmonicMap[k.id]) {
          const target = enharmonicMap[k.id];
          const targetData = allKeys.find(k2 => k2.id === target.targetId);
          if (targetData) {
            return { ...k, major: targetData.major, minor: targetData.minor, id: k.id + '_enh' };
          }
        }
        return k;
      });
    }

    keysToRender.forEach((key, index) => {
      const div = document.createElement('div');
      div.className = 'key-item';
      const isCurrent = (key.major === currentKeyMajor && key.minor === currentKeyMinor) ||
                        (enharmonicMap[key.id] && isEnharmonicMode);
      if (isCurrent) {
        div.classList.add('highlight-key');
      }
      let label = `${key.sig}  ${key.major} / ${key.minor}`;
      if (enharmonicMap[key.id] && isEnharmonicMode) {
        const target = enharmonicMap[key.id];
        const targetData = allKeys.find(k => k.id === target.targetId);
        if (targetData) {
          label += ` (${targetData.major} / ${targetData.minor})`;
        }
      }
      div.textContent = label;
      div.dataset.keyId = key.id;
      div.onclick = () => selectKey(key.id);
      keyListContainer.appendChild(div);
    });
  }

  function selectKey(keyId) {
    console.log('≡ا¤ّ selectKey called with:', keyId);
    
    let keyData = allKeys.find(k => k.id === keyId);
    if (!keyData) {
      console.log('ظإî Key not found:', keyId);
      return;
    }

    let selectedMajor = keyData.major;
    let selectedMinor = keyData.minor;
    let selectedSig = keyData.sig;

    if (isEnharmonicMode && enharmonicMap[keyId]) {
      const target = enharmonicMap[keyId];
      const targetData = allKeys.find(k => k.id === target.targetId);
      if (targetData) {
        selectedMajor = targetData.major;
        selectedMinor = targetData.minor;
        selectedSig = targetData.sig;
        console.log('≡ا¤ Enharmonic: using', selectedMajor, '/', selectedMinor);
      }
    }

    console.log('ظ£à Applying new key:', selectedMajor, '/', selectedMinor);
    
    // Calculate semitone offset from original key signature
    const song = songs.find(s => s.id === currentSongId);
    if (song && song.keySignature) {
      const originalSig = song.keySignature;
      const originalKey = allKeys.find(k => k.sig === originalSig);
      const newKey = allKeys.find(k => k.sig === selectedSig);
      
      if (originalKey && newKey) {
        const originalIndex = allKeys.indexOf(originalKey);
        const newIndex = allKeys.indexOf(newKey);
        const semitoneDiff = newIndex - originalIndex;
        currentKey = semitoneDiff;
        console.log('≡ا¤ Semitone offset:', currentKey);
      } else {
        currentKey = 0;
      }
    } else {
      // Fallback: use the key signature index
      const newKey = allKeys.find(k => k.sig === selectedSig);
      if (newKey) {
        const targetIndex = allKeys.indexOf(newKey);
        const currentIndex = allKeys.findIndex(k => k.sig === currentKeySignature);
        currentKey = targetIndex - (currentIndex >= 0 ? currentIndex : 0);
      } else {
        currentKey = 0;
      }
    }

    currentKeyMajor = selectedMajor;
    currentKeyMinor = selectedMinor;
    currentKeySignature = selectedSig;
    updateKeyDisplay();

    if (currentSongId) {
      const song = songs.find(s => s.id === currentSongId);
      if (song) {
        console.log('≡ا╡ Displaying song with new key');
        displaySong(song);
      } else {
        console.log('ظإî Song not found');
      }
    } else {
      console.log('ظإî No song selected');
    }

    closeTransposePopup();
  }

  function toggleEnharmonic() {
    isEnharmonicMode = enharmonicToggle.checked;
    enharmonicLabel.textContent = `Enharmonic: ${isEnharmonicMode ? 'ON' : 'OFF'}`;
    renderKeyList();
    updateKeyDisplay();
    if (currentSongId) {
      const song = songs.find(s => s.id === currentSongId);
      if (song) displaySong(song);
    }
  }

  function updateModalEnharmonicState() {
    const sig = currentKeySignature;
    const isActive = ['6ظآ»', '7ظآ»', '6ظآص', '7ظآص'].includes(sig);
    enharmonicToggle.disabled = !isActive;
    if (!isActive) {
      enharmonicToggle.checked = false;
      isEnharmonicMode = false;
      enharmonicLabel.textContent = 'Enharmonic: OFF (not available)';
    } else {
      enharmonicLabel.textContent = `Enharmonic: ${isEnharmonicMode ? 'ON' : 'OFF'}`;
    }
  }

  // ============================================
  // FORMAT CHORDS ABOVE LYRICS
  // ============================================
  function formatChordsAboveLyrics(text) {
    const lines = text.split('\n');
    const result = [];
    for (let line of lines) {
      if (!line.trim()) {
        result.push('<br>');
        continue;
      }
      const parts = [];
      let current = '';
      let i = 0;
      while (i < line.length) {
        if (line[i] === '[') {
          const j = line.indexOf(']', i);
          if (j !== -1) {
            if (current) {
              parts.push({ type: 'text', content: current });
              current = '';
            }
            parts.push({ type: 'chord', content: line.substring(i + 1, j) });
            i = j + 1;
          } else {
            current += line[i];
            i++;
          }
        } else {
          current += line[i];
          i++;
        }
      }
      if (current) {
        parts.push({ type: 'text', content: current });
      }
      let lyricLine = '';
      const chordMap = [];
      for (let part of parts) {
        if (part.type === 'text') {
          const startPos = lyricLine.length;
          lyricLine += part.content;
          if (chordMap.length > 0 && chordMap[chordMap.length - 1].position === undefined) {
            chordMap[chordMap.length - 1].position = startPos;
          }
        } else if (part.type === 'chord') {
          chordMap.push({
            chord: part.content,
            position: lyricLine.length
          });
        }
      }
      let chordLine = '';
      for (let item of chordMap) {
        const spaces = item.position - chordLine.length;
        if (spaces > 0) {
          chordLine += ' '.repeat(spaces);
        }
        chordLine += item.chord;
      }
      chordLine = chordLine.trimEnd();
      if (chordMap.length > 0) {
        result.push(`<div class="chord-row">${chordLine}</div>`);
      }
      result.push(`<div class="lyric-row">${lyricLine}</div>`);
    }
    return result.join('\n');
  }

  // ============================================
  // FONT SIZE
  // ============================================
  function changeFontSize(delta) {
    fontSize = Math.min(32, Math.max(10, fontSize + delta));
    applyFontSize(fontSize);
  }

  function applyFontSize(size) {
    outputEl.style.fontSize = size + 'px';
    document.querySelectorAll('.chord-row, .lyric-row').forEach(el => {
      el.style.fontSize = size + 'px';
    });
  }

  // ============================================
  // AUTO-SCROLL
  // ============================================
  function startScroll() {
    const output = document.getElementById('output');
    if (isScrolling) return;
    if (!output.innerHTML || output.innerHTML === 'Select a song to begin' || output.innerHTML === 'Loading songs...') return;
    if (output.scrollTop + output.clientHeight >= output.scrollHeight - 5) return;
    isScrolling = true;
    const playBtn = document.getElementById('playBtn');
    if (playBtn) {
      playBtn.textContent = 'ظû╢ي╕';
      playBtn.style.background = '#2a5a2e';
    }
    output.classList.add('scrolling');
    scrollInterval = setInterval(() => {
      const output = document.getElementById('output');
      if (output.scrollTop + output.clientHeight >= output.scrollHeight - 5) {
        stopScroll();
        return;
      }
      output.scrollTop += scrollSpeed;
    }, 50);
  }

  function stopScroll() {
    if (scrollInterval) {
      clearInterval(scrollInterval);
      scrollInterval = null;
    }
    isScrolling = false;
    const playBtn = document.getElementById('playBtn');
    if (playBtn) {
      playBtn.textContent = 'ظû╢';
      playBtn.style.background = '#1a1a2e';
    }
    const output = document.getElementById('output');
    if (output) {
      output.classList.remove('scrolling');
    }
  }

  function toggleScroll() {
    if (isScrolling) {
      stopScroll();
    } else {
      startScroll();
    }
  }

  // ============================================
  // TAP TO STOP
  // ============================================
  function setupTapToStop() {
    const output = document.getElementById('output');
    if (!output) return;
    let touchStartY = 0;
    let isSwiping = false;
    output.addEventListener('touchstart', function(e) {
      touchStartY = e.touches[0].clientY;
      isSwiping = false;
    }, { passive: true });
    output.addEventListener('touchmove', function(e) {
      const touchEndY = e.touches[0].clientY;
      const diff = touchStartY - touchEndY;
      if (Math.abs(diff) > 10) {
        isSwiping = true;
      }
    }, { passive: true });
    output.addEventListener('touchend', function(e) {
      if (!isSwiping && isScrolling) {
        stopScroll();
        e.preventDefault();
      }
    }, { passive: true });
    output.addEventListener('click', function() {
      if (isScrolling) {
        stopScroll();
      }
    });
  }

  // ============================================
  // FULLSCREEN
  // ============================================
  function toggleFullscreen() {
    const app = document.querySelector('.app');
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
      app.classList.add('fullscreen-mode');
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
      app.classList.remove('fullscreen-mode');
    }
  }

  document.addEventListener('fullscreenchange', function() {
    const app = document.querySelector('.app');
    if (!document.fullscreenElement) {
      app.classList.remove('fullscreen-mode');
    }
  });

  // ============================================
  // KEYBOARD SHORTCUTS
  // ============================================
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Space') {
      e.preventDefault();
      toggleScroll();
    }
    if (e.key === 'ArrowUp' && isScrolling) {
      e.preventDefault();
      scrollSpeed = Math.min(scrollSpeed + 0.3, 3);
    }
    if (e.key === 'ArrowDown' && isScrolling) {
      e.preventDefault();
      scrollSpeed = Math.max(scrollSpeed - 0.3, 0.3);
    }
    if (e.key === 'Escape') {
      if (modal.style.display === 'flex') {
        closeTransposePopup();
      }
    }
  });

  // ============================================
  // GO HOME
  // ============================================
  function goHome() {
    window.location.href = "index.html";
  }

  // ============================================
  // INITIALIZE
  // ============================================
  document.addEventListener('DOMContentLoaded', function() {
    setupTapToStop();
    outputEl.style.fontSize = fontSize + 'px';
    setupIdleTimer();
    modal.addEventListener('click', function(e) {
      if (e.target === modal) {
        closeTransposePopup();
      }
    });
  });

  // ============================================
  // CLEANUP
  // ============================================
  window.addEventListener('beforeunload', function() {
    if (scrollInterval) {
      clearInterval(scrollInterval);
      scrollInterval = null;
    }
    if (logoutTimer) {
      clearTimeout(logoutTimer);
      logoutTimer = null;
    }
  });

  console.log('≡ا╡ Song Viewer Pro loaded!');
  console.log('Controls:');
  console.log('  ظû╢  - Start auto-scroll');
  console.log('  ظ╣  - Stop auto-scroll');
  console.log('  ≡ا╡ Transpose - Open key selector');
  console.log('  Tap (not swipe) on lyrics - Stop scrolling');
  console.log('  Space bar - Toggle scroll');
  console.log('  ظّ/ظô arrows - Adjust scroll speed');
  console.log('  ≡ا¤ Search - Type to filter songs');
  console.log('  ظؤ╢ Fullscreen - Only lyrics & chords');
</script>
