<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Busker App</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="icon" href="icons/violinman.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/violinman.png">

<body>

<div class="index-wrapper">
  <div class="index-card">
    
    <!-- Header -->
    <div class="index-header">
      <div class="index-icon">🎸</div>
      <h1>
        <span class="color-asli">Asli</span>
        <span class="color-busker">Busker</span>
        <span class="color-chords">Chords</span>
      </h1>
      <p class="index-subtitle">Penolong Anda Dikala Pening Dengan Chords Lagu-Lagu Asli Melayu</p>
      
      <!-- Logout Button -->
      <button onclick="logoutUser()" class="logout-btn-index" title="Logout">
        🚪 Logout
      </button>
    </div>

    <div class="index-divider"></div>

    <!-- Buttons - TULIS (Admin) di Atas -->
    <div class="index-buttons">
      
      <!-- 1. Tulis Lirik & Kord - ADMIN -->
      <button onclick="admin()" class="index-btn admin-btn">
        <div class="index-btn-icon">✍️</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Tulis Lirik &amp; Kord</span>
          <span class="index-btn-desc">Tulis lirik &amp; kord lagu</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>

      <!-- 2. Tulis Leadsheet - ADMIN -->
      <button onclick="adminLeadsheet()" class="index-btn leadsheet-admin-btn">
        <div class="index-btn-icon">🖋️</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Tulis Leadsheet</span>
          <span class="index-btn-desc">Tulis leadsheet (upload .txt)</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>

    </div>

    <!-- Divider Antara Tulis dan Baca -->
    <div class="index-divider-light"></div>

    <!-- Buttons - BACA (Public) di Bawah -->
    <div class="index-buttons">
      
      <!-- 3. Baca Lirik & Kord - FREE -->
      <button onclick="viewer()" class="index-btn viewer-btn">
        <div class="index-btn-icon">📖</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Baca Lirik &amp; Kord</span>
          <span class="index-btn-desc">Baca lirik &amp; kord (termasuk transpose)</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>

      <!-- 4. Baca Leadsheet - FREE -->
      <button onclick="viewerLeadsheet()" class="index-btn leadsheet-viewer-btn">
        <div class="index-btn-icon">🎼</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Baca Leadsheet</span>
          <span class="index-btn-desc">Baca leadsheet (icon &amp; region color)</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>

      <!-- 5. Dashboard - ADMIN -->
      <button onclick="dashboard()" class="index-btn dashboard-btn">
        <div class="index-btn-icon">📊</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Dashboard</span>
          <span class="index-btn-desc">Lihat statistik pengguna &amp; lagu</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>
      
    </div>

    <div class="index-footer">
      <span>From Kamarul for buskers - Hawau -</span>
    </div>

  </div>
</div>

<script>
  // ============================================
  // FIREBASE CONFIG
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ============================================
  // CHECK LOGIN STATUS
  // ============================================
  auth.onAuthStateChanged(function(user) {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  // ============================================
  // TULIS LIRIK & KORD - ADMIN
  // ============================================
  function admin() {
    let pass = prompt("Enter admin password:");
    if (pass === "admin123") {
      window.location.href = "create.html";
    } else if (pass !== null) {
      alert("Wrong password");
    }
  }

  // ============================================
  // TULIS LEADSHEET - ADMIN
  // ============================================
  function adminLeadsheet() {
    let pass = prompt("Enter admin password:");
    if (pass === "admin123") {
      window.location.href = "createleadsheet.html";
    } else if (pass !== null) {
      alert("Wrong password");
    }
  }

  // ============================================
  // BACA LIRIK & KORD - FREE
  // ============================================
  function viewer() {
    window.location.href = "songslist.html";
  }

  // ============================================
  // BACA LEADSHEET - FREE
  // ============================================
  function viewerLeadsheet() {
    window.location.href = "leadsheetslist.html";
  }

  // ============================================
  // DASHBOARD - ADMIN
  // ============================================
  function dashboard() {
    let pass = prompt("Enter admin password:");
    if (pass === "admin123") {
      window.location.href = "dashboard.html";
    } else if (pass !== null) {
      alert("Wrong password");
    }
  }

  // ============================================
  // LOGOUT
  // ============================================
  function logoutUser() {
    if (confirm("Are you sure you want to logout?")) {
      auth.signOut()
        .then(() => {
          window.location.href = "login.html";
        })
        .catch(() => {
          window.location.href = "login.html";
        });
    }
  }
</script>

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('✅ Service Worker registered'))
    .catch(err => console.error('❌ SW registration failed:', err));
}
</script>

    height: 1px;
