<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Busker App</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>

<div class="index-wrapper">
  <div class="index-card">
    
    <!-- Header -->
    <div class="index-header">
      <div class="index-icon">🎸</div>
      <h1>
        <span class="color-asli">Asli</span>
        <span class="color-busker">Busker</span>
        <span class="color-chords">Chords</span>
      </h1>
      <p class="index-subtitle">Penolong Anda Dikala Pening Dengan Chords Lagu-Lagu Asli Melayu</p>
      <button onclick="logoutUser()" style="
        background: #4a2a2a;
        border: 1px solid #ff4444;
        color: white;
        padding: 8px 20px;
        border-radius: 8px;
        font-size: 0.9rem;
        cursor: pointer;
        font-family: Arial, sans-serif;
        margin-top: 10px;
        transition: background 0.2s;
      " onmouseover="this.style.background='#5a3a3a'" onmouseout="this.style.background='#4a2a2a'">
        🚪 Logout
      </button>
    </div>

    <div class="index-divider"></div>

    <!-- Buttons -->
    <div class="index-buttons">
      
      <!-- 1. Baca Lirik & Kord - FREE -->
      <button onclick="viewer()" class="index-btn viewer-btn">
        <div class="index-btn-icon">📖</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Baca Lirik &amp; Kord</span>
          <span class="index-btn-desc">Baca lirik &amp; kord (termasuk transpose)</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>
      
      <!-- 2. Tulis Lirik & Kord - ADMIN -->
      <button onclick="admin()" class="index-btn admin-btn">
        <div class="index-btn-icon">✍️</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Tulis Lirik &amp; Kord</span>
          <span class="index-btn-desc">Tulis lirik &amp; kord lagu</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>

      <!-- 3. Baca Leadsheet - FREE -->
      <button onclick="viewerLeadsheet()" class="index-btn leadsheet-viewer-btn">
        <div class="index-btn-icon">🎼</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Baca Leadsheet</span>
          <span class="index-btn-desc">Baca leadsheet (icon &amp; region color)</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>

      <!-- 4. Tulis Leadsheet - ADMIN -->
      <button onclick="adminLeadsheet()" class="index-btn leadsheet-admin-btn">
        <div class="index-btn-icon">🖋️</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Tulis Leadsheet</span>
          <span class="index-btn-desc">Tulis leadsheet (upload .txt)</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>

      <!-- 5. Dashboard - ADMIN -->
      <button onclick="dashboard()" class="index-btn dashboard-btn">
        <div class="index-btn-icon">📊</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Dashboard</span>
          <span class="index-btn-desc">Lihat statistik pengguna &amp; lagu</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>
      
    </div>

    <div class="index-footer">
      <span>From Kamarul for buskers - Hawau -</span>
    </div>

  </div>
</div>

<script>
  // ============================================
  // FIREBASE CONFIG
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ============================================
  // CHECK LOGIN STATUS
  // ============================================
  auth.onAuthStateChanged(function(user) {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  // ============================================
  // 1. BACA LIRIK & KORD - FREE
  // ============================================
  function viewer() {
    window.location.href = "songslist.html";
  }

  // ============================================
  // 2. TULIS LIRIK & KORD - ADMIN
  // ============================================
  function admin() {
    let pass = prompt("Enter admin password:");
    if (pass === "admin123") {
      window.location.href = "create.html";
    } else if (pass !== null) {
      alert("Wrong password");
    }
  }

  // ============================================
  // 3. BACA LEADSHEET - FREE
  // ============================================
  function viewerLeadsheet() {
    window.location.href = "leadsheetslist.html";
  }

  // ============================================
  // 4. TULIS LEADSHEET - ADMIN
  // ============================================
  function adminLeadsheet() {
    let pass = prompt("Enter admin password:");
    if (pass === "admin123") {
      window.location.href = "createleadsheet.html";
    } else if (pass !== null) {
      alert("Wrong password");
    }
  }

  // ============================================
  // 5. DASHBOARD - ADMIN
  // ============================================
  function dashboard() {
    let pass = prompt("Enter admin password:");
    if (pass === "admin123") {
      window.location.href = "dashboard.html";
    } else if (pass !== null) {
      alert("Wrong password");
    }
  }
</script>

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('✅ Service Worker registered'))
    .catch(err => console.error('❌ SW registration failed:', err));
}
</script>

    background: rgba(58, 142, 158, 0.3) !important;
  }

  .leadsheet-viewer-btn:hover {
    border-color: rgba(58, 142, 158, 0.8) !important;
    box-shadow: 0 8px 30px rgba(58, 142, 158, 0.3) !important;
  }

  /* Leadsheet Admin Button - Warna Ungu */
  .leadsheet-admin-btn {
    background: linear-gradient(135deg, #2a1a4e, #4a2a7e) !important;

  .leadsheet-admin-btn:hover {

  }

  .viewer-btn {
    background: linear-gradient(135deg, #1a2a4e, #2a4a6e) !important;

  .admin-btn {

  }

  }

  /* Dashboard Button - Warna Hijau */
  .dashboard-btn {
    background: linear-gradient(135deg, #1a3a2e, #2a5a4e) !important;

  }

  .dashboard-btn .index-btn-icon {
    background: rgba(58, 142, 106, 0.3) !important;
  }

  .dashboard-btn:hover {
    border-color: rgba(58, 142, 106, 0.8) !important;
    box-shadow: 0 8px 30px rgba(58, 142, 106, 0.3) !important;
  }

  @media (max-width: 480px) {
    .index-btn-label {
      font-size: 0.9rem !important;
    }
    .index-btn-desc {
      font-size: 0.65rem !important;
    }
    .index-btn-icon {
      font-size: 1.3rem !important;

    }
    .index-btn {

</body>
</html>
