<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Busker App</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div class="index-wrapper">
  <div class="index-card">
    
    <!-- Header -->
    <div class="index-header">
      <div class="index-icon">🎸</div>
      <h1>Busker<span>Chords</span></h1>
      <p class="index-subtitle">Penolong Anda Dikala X Jumpa Chords</p>
    </div>

    <!-- Decorative Line -->
    <div class="index-divider"></div>

    <!-- Buttons -->
    <div class="index-buttons">
      
      <!-- Admin Button -->
      <button onclick="admin()" class="index-btn admin-btn">
        <div class="index-btn-icon">🎼</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Admin</span>
          <span class="index-btn-desc">Create &amp; Manage Songs</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>
      
      <!-- Viewer Button -->
      <button onclick="viewer()" class="index-btn viewer-btn">
        <div class="index-btn-icon">🎵</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Viewer</span>
          <span class="index-btn-desc">Play &amp; Read Songs</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>
      
    </div>

    <!-- Footer -->
    <div class="index-footer">
      <span>Made with ❤️ for buskers</span>
    </div>

  </div>
</div>

<script>
function admin() {
  let pass = prompt("Enter admin password:");
  if (pass === "admin123") {
    window.location.href = "create.html";
  } else if (pass !== null) {
    alert("Wrong password");
  }
}

function viewer() {
  window.location.href = "viewer.html";
}
</script>

</body>
</html>
