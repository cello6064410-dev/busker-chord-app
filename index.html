<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Busker App</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<div class="index-wrapper">
  <div class="index-card">
    
    <!-- Header -->
    <div class="index-header">
      <div class="index-icon">🎸</div>
      <h1>
        <span class="color-asli">Asli</span>
        <span class="color-busker">Busker</span>
        <span class="color-chords">Chords</span>
      </h1>
      <p class="index-subtitle">Penolong Anda Dikala Pening Dengan Chords Lagu-Lagu Asli Melayu</p>
    </div>

    <div class="index-divider"></div>

    <!-- Buttons -->
    <div class="index-buttons">
      
      <!-- Viewer Button - FREE (sudah login) -->
      <button onclick="viewer()" class="index-btn viewer-btn">
        <div class="index-btn-icon">🎵</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Tukang Baca</span>
          <span class="index-btn-desc">Baca Lirik &amp; Kords (Termasuk Transpose)</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>
      
      <!-- Admin Button - PERLU PASSWORD -->
      <button onclick="admin()" class="index-btn admin-btn">
        <div class="index-btn-icon">🎼</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Tukang Tulis</span>
          <span class="index-btn-desc">Tulis Lirik &amp; Kords Lagu</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>

      <!-- Dashboard Button - PERLU PASSWORD -->
      <button onclick="dashboard()" class="index-btn dashboard-btn">
        <div class="index-btn-icon">📊</div>
        <div class="index-btn-content">
          <span class="index-btn-label">Dashboard</span>
          <span class="index-btn-desc">Lihat Statistik Pengguna &amp; Lagu</span>
        </div>
        <div class="index-btn-arrow">→</div>
      </button>
      
    </div>

    <div class="index-footer">
      <span>From Kamarul for buskers - Hawau -</span>
    </div>

  </div>
</div>

<script>
  // ============================================
  // FIREBASE CONFIG
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>

<script>
  // ============================================
  // CHECK LOGIN STATUS
  // ============================================
  auth.onAuthStateChanged(function(user) {
    if (!user) {
      // Not logged in - redirect to login
      window.location.href = "login.html";
    }
  });

  // ============================================
  // VIEWER - FREE ACCESS
  // ============================================
  function viewer() {
    window.location.href = "viewer.html";
  }

  // ============================================
  // ADMIN - NEED PASSWORD
  // ============================================
  function admin() {
    let pass = prompt("Enter admin password:");
    if (pass === "admin123") {
      window.location.href = "create.html";
    } else if (pass !== null) {
      alert("Wrong password");
    }
  }

  // ============================================
  // DASHBOARD - NEED PASSWORD
  // ============================================
  function dashboard() {
    let pass = prompt("Enter admin password:");
    if (pass === "admin123") {
      window.location.href = "dashboard.html";
    } else if (pass !== null) {
      alert("Wrong password");
    }
  }
</script>

</body>
</html>
