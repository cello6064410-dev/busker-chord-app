<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>All Songs - List</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
</head>
<body>

<div class="app" style="padding-bottom: 80px;">
  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <h2>📋 All Songs</h2>
      <button onclick="goBack()" class="home-btn" title="Go Back">⬅</button>
    </div>
    <p style="color: #888; font-size: 0.9rem; font-family: Arial, sans-serif; margin-top: 4px;" id="songCount">Loading...</p>
  </div>

  <!-- SONG LIST -->
  <div id="songList" class="song-list" style="flex: 1; max-height: none; overflow-y: auto; height: 0; padding: 10px;"></div>

  <!-- FLOATING BACK BUTTON -->
  <div class="floating-bar" style="justify-content: center;">
    <button onclick="goBack()" style="flex: 0 1 auto; padding: 12px 30px; min-width: 120px;">⬅ Back to Viewer</button>
  </div>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  // ============================================
  // FIREBASE CONFIGURATION
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<script>
  // ============================================
  // GLOBAL VARIABLES
  // ============================================
  const songListEl = document.getElementById('songList');
  const songCountEl = document.getElementById('songCount');

  // ============================================
  // LOAD ALL SONGS
  // ============================================
  function loadAllSongs() {
    songListEl.innerHTML = '<div class="loading-text">⏳ Loading songs...</div>';

    db.collection('songs')
      .orderBy('title')
      .get()
      .then((snapshot) => {
        songListEl.innerHTML = '';

        if (snapshot.empty) {
          songListEl.innerHTML = `
            <div class="empty-text">
              📭 No songs found<br>
              <small>Go to Admin to create your first song!</small>
            </div>
          `;
          songCountEl.textContent = '0 songs';
          return;
        }

        // Show song count
        songCountEl.textContent = `${snapshot.size} songs`;

        // List all songs
        snapshot.forEach((doc) => {
          const song = doc.data();
          const div = document.createElement('div');
          div.style.cssText = `
            padding: 12px 16px;
            margin-bottom: 4px;
            background: #1a1a2e;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            font-family: Arial, sans-serif;
            border-left: 3px solid #ffcc00;
          `;
          div.textContent = song.title || 'Untitled';
          songListEl.appendChild(div);
        });
      })
      .catch((error) => {
        console.error('Error loading songs:', error);
        songListEl.innerHTML = `
          <div class="error-text">
            ❌ Error loading songs<br>
            <small>${error.message}</small>
          </div>
        `;
        songCountEl.textContent = 'Error';
      });
  }

  // ============================================
  // GO BACK
  // ============================================
  function goBack() {
    window.location.href = "viewer.html";
  }

  // ============================================
  // INITIALIZE
  // ============================================
  document.addEventListener('DOMContentLoaded', function() {
    loadAllSongs();
  });
</script>

</body>
</html>
