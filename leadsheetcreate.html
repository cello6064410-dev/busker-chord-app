<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Create Leadsheet</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<div class="app" style="padding-bottom: 80px;">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <h2>📊 Leadsheet</h2>
      <div style="display: flex; gap: 8px; align-items: center;">
        <button onclick="goHome()" class="home-btn" title="Go to Home">🏠</button>
      </div>
    </div>
    <p style="color: #888; font-size: 0.9rem; font-family: Arial, sans-serif;">Create, edit, or delete leadsheets</p>
  </div>

  <!-- SEARCH BAR -->
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="🔍 Search leadsheets..." oninput="filterLeadsheets()">
    <button onclick="clearSearch()" id="clearSearchBtn" style="display:none;">✕</button>
  </div>

  <!-- LEADSHEET LIST (hanya muncul bila search) -->
  <div id="leadsheetList" class="song-list" style="display:none;"></div>

  <hr style="border-color: #2a2a4e; margin: 15px 0;">

  <!-- FORM -->
  <div style="display: flex; flex-direction: column; gap: 12px;">

    <!-- Title -->
    <div>
      <label style="color: #aaa; font-family: Arial, sans-serif; font-size: 0.9rem;">🎵 Title</label>
      <input type="text" id="titleInput" placeholder="Enter leadsheet title..." style="width:100%; padding: 10px 14px; background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 10px; color: white; font-size: 1rem; font-family: Arial, sans-serif; min-height: 44px;">
    </div>

    <!-- Time Signature -->
    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
      <label style="color: #aaa; font-family: Arial, sans-serif;">Time:</label>
      <button onclick="setTime('4/4')" class="time-btn" id="time44" style="background: #2a5a2e; border: none; color: white; padding: 6px 16px; border-radius: 8px; cursor: pointer; font-family: Arial, sans-serif;">4/4</button>
      <button onclick="setTime('3/4')" class="time-btn" id="time34" style="background: #2a2a4e; border: none; color: white; padding: 6px 16px; border-radius: 8px; cursor: pointer; font-family: Arial, sans-serif;">3/4</button>
      <span id="timeDisplay" style="color: #ffcc00; font-family: Arial, sans-serif;">4/4</span>
    </div>

    <!-- Content -->
    <div>
      <label style="color: #aaa; font-family: Arial, sans-serif; font-size: 0.9rem;">📝 Leadsheet Code</label>
      <textarea id="contentInput" rows="8" style="width:100%; padding: 12px; background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 10px; color: white; font-size: 1rem; font-family: 'Courier New', monospace; resize: vertical; min-height: 150px;" placeholder='Example: |a.|[C]\\|[G]\\|[Am]\\|[F]\\|'></textarea>
      <small style="color: #666; font-family: Arial, sans-serif;">Use: [C] for chords, \ for beats, | for bar lines, |a.| for section</small>
    </div>

    <!-- Buttons -->
    <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center; padding:12px; background:#2a2a4e; border-radius:12px; border:2px solid #ffcc00;">
      <button onclick="saveLeadsheet()" id="saveBtn" style="background:#00c853; color:#fff; border:none; padding:12px 30px; border-radius:10px; font-weight:bold; font-size:1rem; cursor:pointer;">💾 Save</button>
      <button onclick="clearForm()" style="background:#4a4a4a; color:#fff; border:none; padding:12px 30px; border-radius:10px; font-weight:bold; font-size:1rem; cursor:pointer;">🔄 Clear</button>
      <button onclick="deleteLeadsheet()" id="deleteBtn" style="background:#6e2a2a; color:#fff; border:none; padding:12px 30px; border-radius:10px; font-weight:bold; font-size:1rem; cursor:pointer; display:none;">🗑️ Delete</button>
    </div>

    <!-- Status -->
    <div id="statusMessage" style="padding:12px; border-radius:10px; text-align:center; font-family:Arial; min-height:44px;"></div>
  </div>

</div>

<script>
  // ============================================
  // FIREBASE CONFIGURATION
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyAACiSmGKOByLt2IaymEYbRqSxhvzl9ZN4",
    authDomain: "busker-chord-app.firebaseapp.com",
    projectId: "busker-chord-app"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>

<script>
  // ============================================
  // GLOBAL VARIABLES
  // ============================================
  let allLeadsheets = [];
  let currentEditId = null;
  let currentTime = '4/4';
  const MAX_SEARCH_RESULTS = 10;
  const DISPLAY_RESULTS = 5;

  // ============================================
  // DOM REFERENCES
  // ============================================
  const listEl = document.getElementById('leadsheetList');
  const titleInput = document.getElementById('titleInput');
  const contentInput = document.getElementById('contentInput');
  const statusMsg = document.getElementById('statusMessage');
  const saveBtn = document.getElementById('saveBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const searchInput = document.getElementById('searchInput');
  const clearSearchBtn = document.getElementById('clearSearchBtn');
  const timeDisplay = document.getElementById('timeDisplay');

  // ============================================
  // AUTH
  // ============================================
  auth.onAuthStateChanged(function(user) {
    loadLeadsheets();
  });

  // ============================================
  // SET TIME
  // ============================================
  function setTime(time) {
    currentTime = time;
    timeDisplay.textContent = time;
    document.getElementById('time44').style.background = time === '4/4' ? '#2a5a2e' : '#2a2a4e';
    document.getElementById('time34').style.background = time === '3/4' ? '#2a5a2e' : '#2a2a4e';
  }

  // ============================================
  // LOAD LEADSHEETS (simpan dalam memory)
  // ============================================
  function loadLeadsheets() {
    db.collection('leadsheets')
      .orderBy('title')
      .get()
      .then((snapshot) => {
        allLeadsheets = [];
        if (snapshot.empty) {
          listEl.innerHTML = '<div class="empty-text">📭 No leadsheets found</div>';
          return;
        }
        snapshot.forEach((doc) => {
          const data = doc.data();
          allLeadsheets.push({ id: doc.id, ...data });
        });
      })
      .catch((err) => {
        console.error('Error loading leadsheets:', err);
        listEl.innerHTML = '<div class="error-text">❌ Error loading leadsheets</div>';
      });
  }

  // ============================================
  // SEARCH / FILTER (hanya bila taip)
  // ============================================
  function filterLeadsheets() {
    const query = searchInput.value.toLowerCase().trim();
    clearSearchBtn.style.display = query.length > 0 ? 'block' : 'none';

    if (query === '') {
      listEl.style.display = 'none';
      listEl.innerHTML = '';
      return;
    }

    const results = allLeadsheets.filter(s => s.title && s.title.toLowerCase().includes(query));
    listEl.style.display = 'block';

    if (results.length === 0) {
      listEl.innerHTML = '<div class="empty-text">🔍 No leadsheets found</div>';
      return;
    }

    listEl.innerHTML = '';
    const displayResults = results.slice(0, MAX_SEARCH_RESULTS);
    const hiddenResults = results.slice(MAX_SEARCH_RESULTS);

    displayResults.forEach((sheet) => {
      const item = createListItem(sheet);
      listEl.appendChild(item);
    });

    if (hiddenResults.length > 0) {
      const hint = document.createElement('div');
      hint.className = 'scroll-hint';
      hint.textContent = '⬇️ ' + hiddenResults.length + ' more results (scroll down)';
      listEl.appendChild(hint);
      hiddenResults.forEach((sheet) => {
        const item = createListItem(sheet);
        item.className += ' hidden-result';
        listEl.appendChild(item);
      });
    }
  }

  function createListItem(sheet) {
    const div = document.createElement('div');
    div.className = 'admin-song-item';
    div.style.cursor = 'pointer';
    div.innerHTML = `
      <span class="song-title">${sheet.title || 'Untitled'}</span>
      <span style="color: #666; font-size: 0.7rem; font-family: Arial, sans-serif;">${sheet.timeSignature || '4/4'}</span>
    `;
    div.onclick = () => loadForEdit(sheet.id);
    return div;
  }

  function clearSearch() {
    searchInput.value = '';
    clearSearchBtn.style.display = 'none';
    listEl.style.display = 'none';
    listEl.innerHTML = '';
    searchInput.focus();
  }

  // ============================================
  // LOAD FOR EDIT (klik nama lagu)
  // ============================================
  function loadForEdit(id) {
    const sheet = allLeadsheets.find(s => s.id === id);
    if (!sheet) {
      statusMsg.textContent = '❌ Leadsheet not found';
      statusMsg.style.cssText = 'background:rgba(255,68,68,0.2); color:#ff4444; border:1px solid #ff4444; padding:12px; border-radius:10px;';
      return;
    }
    currentEditId = id;
    titleInput.value = sheet.title || '';
    contentInput.value = sheet.content || '';
    if (sheet.timeSignature) {
      setTime(sheet.timeSignature);
    }
    saveBtn.textContent = '✏️ Update';
    deleteBtn.style.display = 'inline-block';
    statusMsg.textContent = '✅ Editing: ' + (sheet.title || 'Untitled');
    statusMsg.style.cssText = 'background:rgba(0,200,83,0.2); color:#00e676; border:1px solid #00c853; padding:12px; border-radius:10px;';
    titleInput.focus();
  }

  // ============================================
  // SAVE LEADSHEET
  // ============================================
  function saveLeadsheet() {
    const title = titleInput.value.trim();
    const content = contentInput.value.trim();

    if (!title) {
      statusMsg.textContent = '⚠️ Please enter a title';
      statusMsg.style.cssText = 'background:rgba(255,68,68,0.2); color:#ff4444; border:1px solid #ff4444; padding:12px; border-radius:10px;';
      return;
    }
    if (!content) {
      statusMsg.textContent = '⚠️ Please enter leadsheet content';
      statusMsg.style.cssText = 'background:rgba(255,68,68,0.2); color:#ff4444; border:1px solid #ff4444; padding:12px; border-radius:10px;';
      return;
    }

    const data = {
      title: title,
      content: content,
      timeSignature: currentTime,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    let promise;
    if (currentEditId) {
      promise = db.collection('leadsheets').doc(currentEditId).update(data);
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      promise = db.collection('leadsheets').add(data);
    }

    statusMsg.textContent = '⏳ Saving...';
    statusMsg.style.cssText = 'background:rgba(79,195,247,0.2); color:#4fc3f7; border:1px solid #4fc3f7; padding:12px; border-radius:10px;';

    promise
      .then(() => {
        statusMsg.textContent = '✅ Leadsheet saved successfully!';
        statusMsg.style.cssText = 'background:rgba(0,200,83,0.2); color:#00e676; border:1px solid #00c853; padding:12px; border-radius:10px;';
        clearForm();
        loadLeadsheets();
      })
      .catch(err => {
        statusMsg.textContent = '❌ Error: ' + err.message;
        statusMsg.style.cssText = 'background:rgba(255,68,68,0.2); color:#ff4444; border:1px solid #ff4444; padding:12px; border-radius:10px;';
      });
  }

  // ============================================
  // DELETE
  // ============================================
  function deleteLeadsheet() {
    if (!currentEditId) {
      statusMsg.textContent = '⚠️ No leadsheet selected';
      statusMsg.style.cssText = 'background:rgba(255,68,68,0.2); color:#ff4444; border:1px solid #ff4444; padding:12px; border-radius:10px;';
      return;
    }
    if (!confirm('Delete this leadsheet permanently?')) return;
    statusMsg.textContent = '⏳ Deleting...';
    statusMsg.style.cssText = 'background:rgba(79,195,247,0.2); color:#4fc3f7; border:1px solid #4fc3f7; padding:12px; border-radius:10px;';
    db.collection('leadsheets').doc(currentEditId).delete()
      .then(() => {
        statusMsg.textContent = '✅ Leadsheet deleted!';
        statusMsg.style.cssText = 'background:rgba(0,200,83,0.2); color:#00e676; border:1px solid #00c853; padding:12px; border-radius:10px;';
        clearForm();
        loadLeadsheets();
      })
      .catch(err => {
        statusMsg.textContent = '❌ Delete failed: ' + err.message;
        statusMsg.style.cssText = 'background:rgba(255,68,68,0.2); color:#ff4444; border:1px solid #ff4444; padding:12px; border-radius:10px;';
      });
  }

  // ============================================
  // CLEAR FORM
  // ============================================
  function clearForm() {
    currentEditId = null;
    titleInput.value = '';
    contentInput.value = '';
    setTime('4/4');
    saveBtn.textContent = '💾 Save';
    deleteBtn.style.display = 'none';
    statusMsg.textContent = '';
    statusMsg.style.cssText = '';
    titleInput.focus();
  }

  // ============================================
  // GO HOME
  // ============================================
  function goHome() {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
